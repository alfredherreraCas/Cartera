                  <div>
                    <label className="text-xs font-bold uppercase tracking-wider text-slate-400 block mb-1">Nombre</label>
                    <input 
                      type="text" 
                      placeholder="Ej. Gasolina, Netflix, Sueldo" 
                      value={catForm.name} 
                      onChange={e => setCatForm({ ...catForm, name: e.target.value })}
                      className="w-full bg-[#0a0f19] border border-[#1e293b] rounded-xl py-3 px-4 text-white text-sm focus:border-indigo-500 outline-none"
                    />
                  </div>

                  <div>
                    <label className="text-xs font-bold uppercase tracking-wider text-slate-400 block mb-2">Tipo de flujo</label>
                    <div className="flex gap-2">
                      <button 
                        onClick={() => setCatForm({ ...catForm, type: "expense" })}
                        className={`flex-1 py-3 rounded-xl border text-xs font-bold uppercase tracking-wider transition-all ${
                          catForm.type === "expense" 
                            ? "bg-rose-500/10 text-rose-400 border-rose-500/40" 
                            : "border-[#1e293b] text-slate-400 hover:bg-slate-800/40"
                        }`}
                      >
                        ↓ Gasto
                      </button>
                      <button 
                        onClick={() => setCatForm({ ...catForm, type: "income" })}
                        className={`flex-1 py-3 rounded-xl border text-xs font-bold uppercase tracking-wider transition-all ${
                          catForm.type === "income" 
                            ? "bg-emerald-500/10 text-emerald-400 border-emerald-500/40" 
                            : "border-[#1e293b] text-slate-400 hover:bg-slate-800/40"
                        }`}
                      >
                        ↑ Ingreso
                      </button>
                    </div>
                  </div>

                  <button 
                    onClick={submitCategory}
                    className="w-full bg-indigo-600 hover:bg-indigo-500 py-3.5 rounded-xl font-bold text-sm transition-all"
                  >
                    Agregar categoría
                  </button>
                </div>

                <div className="grid grid-cols-2 gap-4">
                  <div>
                    <h4 className="text-xs font-bold uppercase tracking-wider text-rose-400 mb-2">Gastos</h4>
                    <div className="space-y-1.5">
                      {state.categories.filter(c => c.type === "expense").map(c => (
                        <div key={c.id} className="bg-[#121824] border border-[#1e293b] px-3 py-1.5 rounded-xl flex items-center justify-between text-xs">
                          <span className="font-semibold text-slate-300">{c.name}</span>
                          <button onClick={() => deleteCategory(c.id)} className="text-slate-500 hover:text-rose-400 p-1">✕</button>
                        </div>
                      ))}
                    </div>
                  </div>

                  <div>
                    <h4 className="text-xs font-bold uppercase tracking-wider text-emerald-400 mb-2">Ingresos</h4>
                    <div className="space-y-1.5">
                      {state.categories.filter(c => c.type === "income").map(c => (
                        <div key={c.id} className="bg-[#121824] border border-[#1e293b] px-3 py-1.5 rounded-xl flex items-center justify-between text-xs">
                          <span className="font-semibold text-slate-300">{c.name}</span>
                          <button onClick={() => deleteCategory(c.id)} className="text-slate-500 hover:text-rose-400 p-1">✕</button>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
              </div>
            )}

            {/* PANTALLA: TRANSFERENCIAS */}
            {screen === "transfers" && (
              <div className="p-4 space-y-6">
                <div className="bg-[#121824] border border-[#1e293b] rounded-3xl p-6 space-y-4">
                  <div>
                    <label className="text-xs font-bold uppercase tracking-wider text-slate-400 block mb-1">Cuenta origen</label>
                    <select 
                      value={trfForm.fromId} 
                      onChange={e => setTrfForm({ ...trfForm, fromId: e.target.value })}
                      className="w-full bg-[#0a0f19] border border-[#1e293b] rounded-xl py-3 px-4 text-white text-sm focus:border-indigo-500 outline-none"
                    >
                      <option value="">— Selecciona origen —</option>
                      {state.accounts.map(a => (
                        <option key={a.id} value={a.id}>{a.name} ({a.isCreditCard ? `Disp: ${fmt(a.availableLimit)}` : a.isLoan ? `Amortizado: ${fmt(a.availableLimit)}` : fmt(a.balance)})</option>
                      ))}
                    </select>
                  </div>

                  <div>
                    <label className="text-xs font-bold uppercase tracking-wider text-slate-400 block mb-1">Cuenta destino</label>
                    <select 
                      value={trfForm.toId} 
                      onChange={e => setTrfForm({ ...trfForm, toId: e.target.value })}
                      className="w-full bg-[#0a0f19] border border-[#1e293b] rounded-xl py-3 px-4 text-white text-sm focus:border-indigo-500 outline-none"
                    >
                      <option value="">— Selecciona destino —</option>
                      {state.accounts.filter(a => a.id !== trfForm.fromId).map(a => (
                        <option key={a.id} value={a.id}>{a.name} ({a.isCreditCard ? `Deuda: ${fmt(a.cardDebt)}` : a.isLoan ? `Deuda: ${fmt(a.cardDebt)}` : fmt(a.balance)})</option>
                      ))}
                    </select>
                  </div>

                  <div>
                    <label className="text-xs font-bold uppercase tracking-wider text-slate-400 block mb-1">Monto a Transferir / Pagar</label>
                    <div className="relative">
                      <span className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 font-bold">$</span>
                      <input 
                        type="number" 
                        placeholder="0.00" 
                        value={trfForm.amount} 
                        onChange={e => setTrfForm({ ...trfForm, amount: e.target.value })}
                        className="w-full bg-[#0a0f19] border border-[#1e293b] rounded-xl py-3 pl-8 pr-4 text-white text-base font-bold focus:border-indigo-500 outline-none"
                      />
                    </div>
                  </div>

                  <button 
                    onClick={submitTransfer}
                    className="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-xl font-bold uppercase text-xs text-white"
                  >
                    🔄 Realizar Pago o Transferencia
                  </button>
                </div>

                {/* LISTADO DE TRANSFERENCIAS REALIZADAS */}
                <div className="space-y-3">
                  <h3 className="text-xs font-bold uppercase text-slate-400 tracking-wider">Historial de Transferencias</h3>
                  
                  <div className="space-y-2">
                    {transfersHistory.map(t => (
                      <div key={t.id} className="bg-[#121824] border border-[#1e293b] rounded-2xl p-4 flex items-center justify-between transition-all hover:border-[#2a364f]">
                        <div className="space-y-1">
                          <div className="font-semibold text-sm text-slate-200">
                            {t.fromName} ➔ {t.toName}
                          </div>
                          <div className="text-[11px] text-slate-500">{t.date}</div>
                          {t.note && <div className="text-xs text-slate-400 italic">"{t.note}"</div>}
                        </div>
                        
                        <div className="flex items-center gap-3">
                          <span className="font-extrabold text-sm text-indigo-400">{maskAmount(t.amount, false)}</span>
                          <button 
                            onClick={() => setEditingTransfer({
                              id: t.id,
                              fromId: t.fromId,
                              toId: t.toId,
                              amount: t.amount.toString(),
                              date: t.date,
                              note: t.note || ""
                            })}
                            className="px-3 py-1.5 bg-indigo-600/20 hover:bg-indigo-600/30 text-indigo-400 rounded-xl text-xs font-bold transition-all border border-indigo-500/10 active:scale-95"
                          >
                            ✏️ Editar
                          </button>
                        </div>
                      </div>
                    ))}

                    {transfersHistory.length === 0 && (
                      <div className="bg-[#121824] border border-dashed border-[#1e293b] rounded-2xl p-8 text-center text-slate-500 text-xs">
                        No hay transferencias registradas todavía.
                      </div>
                    )}
                  </div>
                </div>
              </div>
            )}

            {/* PANTALLA: CONSULTAS Y FILTROS */}
            {screen === "queries" && (
              <div className="p-4 space-y-4">
                {/* Filtros */}
                <div className="bg-[#121824] border border-[#1e293b] rounded-3xl p-5 space-y-3">
                  <div className="grid grid-cols-2 gap-2">
                    <select 
                      value={qFilter.categoryId} 
                      onChange={e => setQFilter({ ...qFilter, categoryId: e.target.value })}
                      className="w-full bg-[#0a0f19] border border-[#1e293b] rounded-lg py-2 px-3 text-xs text-white outline-none"
                    >
                      <option value="">Todas Categorías</option>
                      {state.categories.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
                    </select>
                    <select 
                      value={qFilter.accountId} 
                      onChange={e => setQFilter({ ...qFilter, accountId: e.target.value })}
                      className="w-full bg-[#0a0f19] border border-[#1e293b] rounded-lg py-2 px-3 text-xs text-white outline-none"
                    >
                      <option value="">Todas Cuentas</option>
                      {state.accounts.map(a => <option key={a.id} value={a.id}>{a.name}</option>)}
                    </select>
                  </div>
                  <button 
                    onClick={() => setQFilter({ categoryId: "", accountId: "", from: "", to: "" })}
                    className="w-full bg-slate-800 hover:bg-slate-700 py-2 rounded-lg text-xs font-semibold text-slate-300"
                  >
                    Borrar Filtros
                  </button>
                // --- HTML PARA SECCIÓN CONSULTAS ---
				  // (Asegúrate de que este bloque esté dentro de tu renderizado de 'queries')
				  /* 
				  <div className="bg-[#121824] p-4 rounded-3xl border border-slate-800 space-y-4">
					<div className="space-y-2">
					  <div className="text-[10px] font-bold text-slate-500 uppercase tracking-wider ml-1">Flujo del Periodo Filtrado</div>
					  <div className="grid grid-cols-3 gap-2 text-center text-xs">
						<div className="bg-emerald-500/10 p-2 rounded-xl border border-emerald-500/20">
						  <div className="text-emerald-500 font-semibold">Ingreso</div>
						  <div className="font-bold text-emerald-400">{fmt(qIncome)}</div>
						</div>
						<div className="bg-rose-500/10 p-2 rounded-xl border border-rose-500/20">
						  <div className="text-rose-500 font-semibold">Gasto</div>
						  <div className="font-bold text-rose-400">{fmt(qExpense)}</div>
						</div>
						<div className="bg-slate-800/50 p-2 rounded-xl border border-slate-700">
						  <div className="text-slate-400 font-semibold">Neto</div>
						  <div className="font-bold">{fmt(qIncome - qExpense)}</div>
						</div>
					  </div>
					</div>
					<hr className="border-slate-800" />
					<div className="space-y-2">
					  <div className="text-[10px] font-bold text-slate-500 uppercase tracking-wider ml-1">Estado Acumulado</div>
					  <div className="grid grid-cols-2 gap-2 text-center text-xs">
						<div className="bg-slate-800/30 p-2 rounded-xl border border-slate-700/50">
						  <div className="text-slate-500 font-semibold">Saldo Inicial (Arrastre)</div>
						  <div className="text-slate-300 font-medium">{fmt(accountBalanceContext - truePeriodNetForAccounts)}</div>
						</div>
						<div className="bg-indigo-500/10 p-2 rounded-xl border border-indigo-500/30">
						  <div className="text-indigo-400 font-semibold">Saldo Final Actual</div>
						  <div className="text-indigo-300 font-bold text-sm">{fmt(accountBalanceContext)}</div>
						</div>
					  </div>
					</div>
				  </div> 
				  */
							
				</div>

                {/* GRÁFICO DE CATEGORÍAS AUTOMÁTICO */}
                {categoryChartData.length > 0 && (
                  <div className="bg-[#121824] border border-[#1e293b] rounded-3xl p-5 space-y-3">
                    <h3 className="text-xs font-bold uppercase text-slate-400 tracking-wider">📊 Distribución de Gastos</h3>
                    
                    <div className="space-y-3">
                      {categoryChartData.map(c => (
                        <div key={c.categoryId} className="space-y-1">
                          <div className="flex justify-between items-center text-xs">
                            <span className="font-semibold text-slate-300">{c.name}</span>
                            <span className="font-bold text-slate-200">{fmt(c.amount)} ({c.pct.toFixed(0)}%)</span>
                          </div>
                          <div className="w-full bg-slate-800 rounded-full h-2.5 overflow-hidden">
                            <div 
                              className="h-full rounded-full" 
                              style={{ width: `${c.pct}%`, backgroundColor: c.color }}
                            />
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                {/* Botones de Exportación */}
                <div className="grid grid-cols-2 gap-2.5">
                  <button 
                    onClick={exportToCSV}
                    className="bg-[#1e293b] hover:bg-[#334155] text-[#38bdf8] font-bold text-xs py-3 px-4 rounded-xl transition-all flex items-center justify-center gap-1 border border-slate-700/50"
                  >
                    📊 Descargar CSV
                  </button>
                  <button 
                    onClick={() => setScreen("print_preview")}
                    className="bg-[#1e293b] hover:bg-[#334155] text-[#818cf8] font-bold text-xs py-3 px-4 rounded-xl transition-all flex items-center justify-center gap-1 border border-slate-700/50"
                  >
                    🖨️ Previsualizar PDF
                  </button>
                </div>

                {/* Resumen - SIEMPRE MUESTRA VALORES EN ESTA PANTALLA */}
                <div className="grid grid-cols-3 gap-2 text-center text-xs">
                  <div className="bg-[#121c17] p-3 rounded-2xl border border-emerald-500/15">
                    <div className="text-emerald-400">Ingresos</div>
                    <div className="font-bold mt-1 text-emerald-400">{fmt(qIncome)}</div>
                  </div>
                  <div className="bg-[#201416] p-3 rounded-2xl border border-rose-500/15">
                    <div className="text-rose-400">Gastos</div>
                    <div className="font-bold mt-1 text-rose-400">{fmt(qExpense)}</div>
                  </div>
                  <div className="bg-[#121c2c] p-3 rounded-2xl border border-blue-500/15">
                    <div className="text-blue-400">Neto</div>
                    <div className="font-bold mt-1 text-blue-400">{fmt(qIncome - qExpense)}</div>
                  </div>
                </div>

                {/* Listado con Botones de Modificación / Edición de Transacciones y Transferencias */}
                <div className="space-y-2">
                  {qResults.map(t => (
                    <div key={t.id} className="bg-[#121824] border border-[#1e293b] rounded-2xl p-4 flex items-center justify-between transition-all hover:border-slate-800">
                      <div>
                        <div className="font-semibold text-sm text-slate-200 flex items-center gap-2">
                          {t.categoryName}
                          {t.type !== "transfer" ? (
                            <button 
                              onClick={() => handleOpenEditTx(t)}
                              className="text-xs p-1 text-indigo-400 hover:text-indigo-300 transition-all bg-indigo-500/10 rounded-md"
                              title="Modificar transacción"
                            >
                              ✏️ Editar
                            </button>
                          ) : (
                            <button 
                              onClick={() => {
                                const origId = t.id.replace("_from", "").replace("_to", "");
                                const origTrf = state.transactions.find(x => x.id === origId);
                                if (origTrf) {
                                  setEditingTransfer({
                                    id: origTrf.id,
                                    fromId: origTrf.fromId,
                                    toId: origTrf.toId,
                                    amount: origTrf.amount.toString(),
                                    date: origTrf.date,
                                    note: origTrf.note || ""
                                  });
                                }
                              }}
                              className="text-xs p-1 text-indigo-400 hover:text-indigo-300 transition-all bg-indigo-500/10 rounded-md"
                              title="Modificar transferencia"
                            >
                              ✏️ Editar
                            </button>
                          )}
                        </div>
                        <div className="text-[11px] text-slate-500">{t.accountName} • {t.date}</div>
                        {t.note && <div className="text-xs text-slate-400 italic mt-1">"{t.note}"</div>}
                      </div>
                      <div className={`font-bold text-sm ${t.virtualType === "income" ? "text-emerald-400" : "text-rose-400"}`}>
                        {t.virtualType === "income" ? "+" : "-"}{fmt(Math.abs(t.displayAmount))}
                      </div>
                    </div>
                  ))}

                  {qResults.length === 0 && (
                    <div className="text-center text-slate-500 py-10">
                      No hay transacciones registradas que coincidan con los filtros.
                    </div>
                  )}
                </div>
              </div>
            )}

            {/* PANTALLA: PREVISUALIZADOR DE PDF INTEGRADO */}
            {screen === "print_preview" && (
              <div className="bg-white text-slate-900 min-h-screen p-6 print-container space-y-6 flex flex-col absolute inset-0 z-[100] overflow-y-auto">
                {/* Barra flotante de comandos - no se imprime */}
                <div className="no-print bg-slate-900 text-white p-4 rounded-2xl flex justify-between items-center shadow-lg sticky top-0 z-50">
                  <button 
                    onClick={() => setScreen("queries")} 
                    className="bg-slate-800 hover:bg-slate-700 text-slate-300 px-4 py-2.5 rounded-xl text-xs font-bold transition-all border border-slate-700"
                  >
                    ← Regresar a Consultas
                  </button>
                  <button 
                    onClick={() => window.print()}
                    className="bg-indigo-600 hover:bg-indigo-500 text-white px-5 py-2.5 rounded-xl text-xs font-bold transition-all shadow-md"
                  >
                    🖨️ Imprimir / Guardar PDF
                  </button>
                </div>

                {/* Hoja de Reporte */}
                <div className="space-y-4 max-w-xl mx-auto w-full">
                  <div className="border-b-2 border-indigo-600 pb-4">
                    <h2 className="text-2xl font-extrabold text-indigo-600">Mi Cartera Pro</h2>
                    <p className="text-xs text-slate-500 mt-1">Reporte Financiero de Movimientos - Generado el {new Date().toLocaleDateString()}</p>
                    {state.currentPeriodStart && (
                      <p className="text-[10px] text-slate-400 mt-0.5">Período de corte: desde {state.currentPeriodStart}</p>
                    )}
                  </div>

                  <table className="w-full text-left border-collapse mt-4 text-xs">
                    <thead>
                      <tr className="border-b border-slate-300 bg-slate-100">
                        <th className="p-2">Fecha</th>
                        <th className="p-2">Categoría</th>
                        <th className="p-2">Cuenta</th>
                        <th className="p-2">Nota</th>
                        <th className="p-2 text-right">Monto</th>
                      </tr>
                    </thead>
                    <tbody>
                      {qResults.map(t => (
                        <tr key={t.id} className="border-b border-slate-200">
                          <td className="p-2 whitespace-nowrap">{t.date}</td>
                          <td className="p-2 font-semibold">{t.categoryName}</td>
                          <td className="p-2">{t.accountName}</td>
                          <td className="p-2 italic text-slate-500">{t.note || "-"}</td>
                          <td className={`p-2 text-right font-bold ${t.virtualType === 'income' ? 'text-emerald-600' : 'text-rose-600'}`}>
                            {t.virtualType === 'income' ? '+' : '-'}{fmt(Math.abs(t.displayAmount))}
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>

                  {/* Resumen Final en Papel */}
                  <div className="bg-slate-50 border border-slate-200 p-4 rounded-xl flex justify-between items-center text-xs mt-6">
                    <div>Total Ingresos: <strong className="text-emerald-600 text-sm block">{fmt(qIncome)}</strong></div>
                    <div className="border-l border-slate-300 h-8"></div>
                    <div>Total Gastos: <strong className="text-rose-600 text-sm block">{fmt(qExpense)}</strong></div>
                    <div className="border-l border-slate-300 h-8"></div>
                    <div>Saldo Neto: <strong className="text-indigo-600 text-sm block">{fmt(qIncome - qExpense)}</strong></div>
                  </div>
                </div>
              </div>
            )}

            {/* PANTALLA: HISTORIAL ARCHIVADO */}
            {screen === "archive" && (
              <div className="p-4 space-y-4">
                {[...state.archivedPeriods].reverse().map(p => {
                  const inc = p.transactions.filter(t => t.type === "income").reduce((s, t) => s + t.amount, 0);
                  const exp = p.transactions.filter(t => t.type === "expense").reduce((s, t) => s + t.amount, 0);
                  return (
                    <div key={p.id} className="bg-[#121824] border border-[#1e293b] rounded-3xl p-5 space-y-3">
                      <div>
                        <h4 className="font-extrabold text-base text-indigo-400 capitalize">{p.label}</h4>
                        <span className="text-[10px] text-slate-500">{p.start} ➔ {p.end}</span>
                        {p.type && <span className="ml-2 text-[9px] bg-slate-800 text-indigo-300 font-bold px-2 py-0.5 rounded-full">{p.type}</span>}
                      </div>
                      <div className="grid grid-cols-3 gap-2 text-center text-xs pt-2 border-t border-[#1e293b]">
                        <div>
                          <div className="text-emerald-400">Ingresos</div>
                          <div className="font-extrabold text-emerald-400">{fmt(inc)}</div>
                        </div>
                        <div>
                          <div className="text-rose-400">Gastos</div>
                          <div className="font-extrabold text-rose-400">{fmt(exp)}</div>
                        </div>
                        <div>
                          <div className="text-blue-400">Balance</div>
                          <div className="font-extrabold text-blue-400">{fmt(inc - exp)}</div>
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}

            {/* PANTALLA: CONFIGURACION DE SINCRONIZACIÓN */}
            {screen === "sync_settings" && (
              <div className="p-4 space-y-6">
                <div className="bg-[#121824] border border-[#1e293b] rounded-3xl p-6 space-y-4">
                  <h3 className="font-bold text-base text-slate-200">Sincronización en la Nube</h3>
                  <div className="p-4 rounded-2xl bg-[#0a0f19] border border-[#1e293b] flex items-center gap-3">
                    <span className={`w-3 h-3 rounded-full ${syncStatus === "connected" ? "bg-emerald-400 animate-pulse" : "bg-slate-600"}`} />
                    <div>
                      <div className="text-xs font-bold">{syncStatus === "connected" ? "Conectado a Google Drive" : "Desconectado"}</div>
                      {lastSyncTime && <div className="text-[10px] text-slate-500">Sincronizado: {lastSyncTime}</div>}
                    </div>
                  </div>
                  <div className="flex gap-2">
                    {syncStatus === "connected" ? (
                      <button onClick={disconnectGoogleDrive} className="w-full bg-slate-800 hover:bg-slate-700 py-3 rounded-xl font-bold text-xs uppercase text-slate-300">Desconectar</button>
                    ) : (
                      <button onClick={connectGoogleDrive} className="w-full bg-blue-600 hover:bg-blue-500 py-3 rounded-xl font-bold text-xs uppercase text-white">⚡ Conectar Google Drive</button>
                    )}
                  </div>
                </div>

                <div className="bg-[#121824] border border-[#1e293b] rounded-3xl p-6 space-y-4">
                  <h4 className="font-bold text-xs text-slate-400 uppercase">Credenciales de API</h4>
                  <div className="space-y-2">
                    <input 
                      type="password" 
                      placeholder="Google Client ID" 
                      value={gdriveConfig.clientId}
                      onChange={e => setGdriveConfig({ ...gdriveConfig, clientId: e.target.value })}
                      className="w-full bg-[#0a0f19] border border-[#1e293b] rounded-xl py-2 px-3 text-xs text-white outline-none"
                    />
                    <input 
                      type="password" 
                      placeholder="Google API Key" 
                      value={gdriveConfig.apiKey}
                      onChange={e => setGdriveConfig({ ...gdriveConfig, apiKey: e.target.value })}
                      className="w-full bg-[#0a0f19] border border-[#1e293b] rounded-xl py-2 px-3 text-xs text-white outline-none"
                    />
                  </div>
                  <button 
                    onClick={() => {
                      localStorage.setItem("gdrive_config", JSON.stringify(gdriveConfig));
                      showToast("Credenciales guardadas");
                    }}
                    className="w-full bg-slate-800 hover:bg-slate-700 py-2 rounded-xl text-xs font-bold text-slate-200"
                  >
                    Guardar Credenciales
                  </button>
                </div>

                <div className="bg-[#121824] border border-[#1e293b] rounded-3xl p-6 space-y-4">
                  <h4 className="font-bold text-xs text-slate-400 uppercase">Respaldos Offline</h4>
                  <div className="grid grid-cols-2 gap-2">
                    <button onClick={exportLocalJSON} className="bg-indigo-600/10 hover:bg-indigo-600/20 text-indigo-400 border border-indigo-500/20 py-2.5 rounded-xl text-xs font-bold">💾 Exportar</button>
                    <label className="bg-slate-800 hover:bg-slate-700 text-slate-300 py-2.5 rounded-xl text-xs font-bold text-center cursor-pointer block border border-slate-700">
                      📁 Importar
                      <input type="file" accept=".json" onChange={importLocalJSON} className="hidden" />
                    </label>
                  </div>
                </div>
              </div>
            )}

          </main>

          {/* MENÚ DE NAVEGACIÓN INFERIOR */}
          <nav className="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-md bg-[#0e1320]/95 backdrop-blur-md border-t border-[#1e293b] grid grid-cols-5 py-2.5 px-2 z-40 no-print">
            {[
              { label: "Inicio", icon: "🏠", screen: "home" },
              { label: "Cuentas", icon: "💳", screen: "accounts" },
              { label: "Consultas", icon: "🔍", screen: "queries" },
              { label: "Pagos", icon: "📅", screen: "payments" },
              { label: "Nube", icon: "☁️", screen: "sync_settings" }
            ].map(tab => (
              <button 
                key={tab.screen}
                onClick={() => setScreen(tab.screen)}
                className="flex flex-col items-center justify-center transition-all active:scale-90"
              >
                <span className="text-lg">{tab.icon}</span>
                <span className={`text-[10px] font-semibold mt-0.5 ${
                  screen === tab.screen ? "text-indigo-400" : "text-[#64748b]"
                }`}>
                  {tab.label}
                </span>
              </button>
            ))}
          </nav>

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(App ? <App /> : <div>Error cargando componente react</div>);
  </script>
</body>
</html>
