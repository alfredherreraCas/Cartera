                        onClick={() => setCatForm({ ...catForm, type: "expense" })}
                        className={`flex-1 py-3 rounded-xl border text-xs font-bold uppercase tracking-wider transition-all ${
                          catForm.type === "expense" 
                            ? "bg-rose-500/10 text-rose-400 border-rose-500/40" 
                            : "border-[#1e293b] text-slate-400 hover:bg-slate-800/40"
                        }`}
                      >
                        ↓ Gasto
                      </button>
                      <button 
                        onClick={() => setCatForm({ ...catForm, type: "income" })}
                        className={`flex-1 py-3 rounded-xl border text-xs font-bold uppercase tracking-wider transition-all ${
                          catForm.type === "income" 
                            ? "bg-emerald-500/10 text-emerald-400 border-emerald-500/40" 
                            : "border-[#1e293b] text-slate-400 hover:bg-slate-800/40"
                        }`}
                      >
                        ↑ Ingreso
                      </button>
                    </div>
                  </div>

                  <button 
                    onClick={submitCategory}
                    className="w-full bg-indigo-600 hover:bg-indigo-500 py-3.5 rounded-xl font-bold text-sm transition-all shadow-lg"
                  >
                    Agregar categoría
                  </button>
                </div>

                <div className="grid grid-cols-2 gap-4">
                  {/* GASTOS */}
                  <div>
                    <h4 className="text-xs font-bold uppercase tracking-wider text-rose-400 mb-2">Categorías de Gasto</h4>
                    <div className="space-y-1.5">
                      {state.categories.filter(c => c.type === "expense").map(c => (
                        <div key={c.id} className="bg-[#121824] border border-[#1e293b] px-3.5 py-2 rounded-xl flex items-center justify-between text-sm">
                          <span className="font-medium text-slate-300">{c.name}</span>
                          <button 
                            onClick={() => deleteCategory(c.id)}
                            className="text-slate-500 hover:text-rose-400 p-1"
                          >
                            ✕
                          </button>
                        </div>
                      ))}
                    </div>
                  </div>

                  {/* INGRESOS */}
                  <div>
                    <h4 className="text-xs font-bold uppercase tracking-wider text-emerald-400 mb-2">Categorías de Ingreso</h4>
                    <div className="space-y-1.5">
                      {state.categories.filter(c => c.type === "income").map(c => (
                        <div key={c.id} className="bg-[#121824] border border-[#1e293b] px-3.5 py-2 rounded-xl flex items-center justify-between text-sm">
                          <span className="font-medium text-slate-300">{c.name}</span>
                          <button 
                            onClick={() => deleteCategory(c.id)}
                            className="text-slate-500 hover:text-rose-400 p-1"
                          >
                            ✕
                          </button>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
              </div>
            )}

            {/* PANTALLA: NUEVA TRANSFERENCIA */}
            {screen === "transfers" && (
              <div className="p-4">
                <div className="bg-[#121824] border border-[#1e293b] rounded-3xl p-6 space-y-4">
                  <div>
                    <label className="text-xs font-bold uppercase tracking-wider text-slate-400 block mb-1">Cuenta origen</label>
                    <select 
                      value={trfForm.fromId} 
                      onChange={e => setTrfForm({ ...trfForm, fromId: e.target.value })}
                      className="w-full bg-[#0a0f19] border border-[#1e293b] rounded-xl py-3 px-4 text-white text-sm focus:border-indigo-500 outline-none"
                    >
                      <option value="">— Selecciona origen —</option>
                      {state.accounts.map(a => (
                        <option key={a.id} value={a.id}>
                          {a.name} ({(a.isCreditCard || a.isLoan) ? `Disp: ${fmt(a.availableLimit)}` : fmt(a.balance)})
                        </option>
                      ))}
                    </select>
                  </div>

                  <div>
                    <label className="text-xs font-bold uppercase tracking-wider text-slate-400 block mb-1">Cuenta destino</label>
                    <select 
                      value={trfForm.toId} 
                      onChange={e => setTrfForm({ ...trfForm, toId: e.target.value })}
                      className="w-full bg-[#0a0f19] border border-[#1e293b] rounded-xl py-3 px-4 text-white text-sm focus:border-indigo-500 outline-none"
                    >
                      <option value="">— Selecciona destino —</option>
                      {state.accounts.filter(a => a.id !== trfForm.fromId).map(a => (
                        <option key={a.id} value={a.id}>
                          {a.name} ({(a.isCreditCard || a.isLoan) ? `Deuda: ${fmt(a.cardDebt)}` : fmt(a.balance)})
                        </option>
                      ))}
                    </select>
                  </div>

                  <div>
                    <label className="text-xs font-bold uppercase tracking-wider text-slate-400 block mb-1">Monto a Transferir</label>
                    <div className="relative">
                      <span className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 font-bold">$</span>
                      <input 
                        type="number" 
                        placeholder="0.00" 
                        value={trfForm.amount} 
                        onChange={e => setTrfForm({ ...trfForm, amount: e.target.value })}
                        className="w-full bg-[#0a0f19] border border-[#1e293b] rounded-xl py-3 pl-8 pr-4 text-white text-base font-bold focus:border-indigo-500 outline-none"
                      />
                    </div>
                  </div>

                  <div>
                    <label className="text-xs font-bold uppercase tracking-wider text-slate-400 block mb-1">Fecha de la transacción</label>
                    <input 
                      type="date" 
                      value={trfForm.date} 
                      onChange={e => setTrfForm({ ...trfForm, date: e.target.value })}
                      className="w-full bg-[#0a0f19] border border-[#1e293b] rounded-xl py-3 px-4 text-white text-sm focus:border-indigo-500 outline-none"
                    />
                  </div>

                  <button 
                    onClick={submitTransfer}
                    className="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-xl font-bold uppercase tracking-wider text-xs text-white transition-all shadow-lg"
                  >
                    🔄 Confirmar Transferencia
                  </button>
                </div>
              </div>
            )}

            {/* PANTALLA: CONSULTAS Y FILTROS */}
            {screen === "queries" && (
              <div className="p-4 space-y-4">
                
                {/* FILTROS CARD */}
                <div className="bg-[#121824] border border-[#1e293b] rounded-3xl p-5 space-y-3">
                  <div className="grid grid-cols-2 gap-2">
                    <div>
                      <label className="text-[10px] font-bold uppercase text-slate-400 mb-1 block">Categoría</label>
                      <select 
                        value={qFilter.categoryId} 
                        onChange={e => setQFilter({ ...qFilter, categoryId: e.target.value })}
                        className="w-full bg-[#0a0f19] border border-[#1e293b] rounded-lg py-2 px-3 text-xs text-white outline-none"
                      >
                        <option value="">Todas</option>
                        {state.categories.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
                      </select>
                    </div>

                    <div>
                      <label className="text-[10px] font-bold uppercase text-slate-400 mb-1 block">Cuenta</label>
                      <select 
                        value={qFilter.accountId} 
                        onChange={e => setQFilter({ ...qFilter, accountId: e.target.value })}
                        className="w-full bg-[#0a0f19] border border-[#1e293b] rounded-lg py-2 px-3 text-xs text-white outline-none"
                      >
                        <option value="">Todas</option>
                        {state.accounts.map(a => <option key={a.id} value={a.id}>{a.name}</option>)}
                      </select>
                    </div>
                  </div>

                  <div className="grid grid-cols-2 gap-2">
                    <div>
                      <label className="text-[10px] font-bold uppercase text-slate-400 mb-1 block">Desde</label>
                      <input 
                        type="date" 
                        value={qFilter.from} 
                        onChange={e => setQFilter({ ...qFilter, from: e.target.value })}
                        className="w-full bg-[#0a0f19] border border-[#1e293b] rounded-lg py-2 px-3 text-xs text-white outline-none"
                      />
                    </div>
                    <div>
                      <label className="text-[10px] font-bold uppercase text-slate-400 mb-1 block">Hasta</label>
                      <input 
                        type="date" 
                        value={qFilter.to} 
                        onChange={e => setQFilter({ ...qFilter, to: e.target.value })}
                        className="w-full bg-[#0a0f19] border border-[#1e293b] rounded-lg py-2 px-3 text-xs text-white outline-none"
                      />
                    </div>
                  </div>

                  <button 
                    onClick={() => setQFilter({ categoryId: "", accountId: "", from: "", to: "" })}
                    className="w-full bg-slate-800 hover:bg-slate-700 py-2 rounded-lg text-xs font-semibold text-slate-300 transition-all"
                  >
                    Borrar Filtros
                  </button>
                </div>

                {/* RESUMEN DE FILTRADO */}
                <div className="grid grid-cols-3 gap-2 text-center">
                  <div className="bg-[#121c17] border border-emerald-500/10 p-3 rounded-2xl">
                    <div className="text-[10px] font-bold text-emerald-400 uppercase tracking-wider">Ingresos</div>
                    <div className="text-sm font-bold text-emerald-400 mt-1">{fmt(qIncome)}</div>
                  </div>
                  
                  <div className="bg-[#201416] border border-rose-500/10 p-3 rounded-2xl">
                    <div className="text-[10px] font-bold text-rose-400 uppercase tracking-wider">Gastos</div>
                    <div className="text-sm font-bold text-rose-400 mt-1">{fmt(qExpense)}</div>
                  </div>

                  <div className="bg-[#121c2c] border border-blue-500/10 p-3 rounded-2xl">
                    <div className="text-[10px] font-bold text-blue-400 uppercase tracking-wider">Neto</div>
                    <div className="text-sm font-bold text-blue-400 mt-1">{fmt(qIncome - qExpense)}</div>
                  </div>
                </div>

                {/* BOTONES DE EXPORTACIÓN Y REPORTES */}
                <div className="grid grid-cols-2 gap-2">
                  <button 
                    onClick={exportCSV}
                    className="bg-emerald-600/10 hover:bg-emerald-600/20 text-emerald-400 border border-emerald-500/30 font-bold py-3 px-4 rounded-xl text-xs flex items-center justify-center gap-1.5 transition-all"
                  >
                    📥 Descargar CSV (Excel)
                  </button>
                  <button 
                    onClick={printReport}
                    className="bg-indigo-600/10 hover:bg-indigo-600/20 text-indigo-400 border border-indigo-500/30 font-bold py-3 px-4 rounded-xl text-xs flex items-center justify-center gap-1.5 transition-all"
                  >
                    🖨️ Guardar PDF / Imprimir
                  </button>
                </div>

                {/* LISTA DE RESULTADOS */}
                <div className="space-y-2">
                  <div className="text-xs text-slate-500 font-semibold">{qResults.length} movimiento(s) encontrado(s)</div>
                  
                  {qResults.map(t => (
                    <div key={t.id} className="bg-[#121824] border border-[#1e293b] rounded-2xl p-4 flex items-center justify-between">
                      <div>
                        <div className="font-semibold text-sm text-slate-200">{t.categoryName}</div>
                        <div className="text-[11px] text-slate-500">{t.accountName} • {t.date}</div>
                        {t.note && <div className="text-xs text-slate-400 italic mt-1">"{t.note}"</div>}
                      </div>
                      
                      <div className={`font-bold text-sm ${t.type === "income" ? "text-emerald-400" : "text-rose-400"}`}>
                        {t.type === "income" ? "+" : "-"}{fmt(t.amount)}
                      </div>
                    </div>
                  ))}

                  {qResults.length === 0 && (
                    <div className="text-center text-[#64748b] text-sm py-8 bg-[#121824] rounded-2xl border border-dashed border-[#1e293b]">
                      No hay transacciones que coincidan con los filtros.
                    </div>
                  )}
                </div>

              </div>
            )}

            {/* PANTALLA: CORTES DE PERÍODO / MES */}
            {screen === "period" && (
              <div className="p-4">
                <div className="bg-[#121824] border border-[#1e293b] rounded-3xl p-6 text-center space-y-4">
                  <div className="text-5xl my-4">📅</div>
                  <h2 className="font-extrabold text-xl text-slate-200">Inicio de Nuevo Período</h2>
                  
                  <p className="text-sm text-slate-400 leading-relaxed">
                    Esto guardará de forma permanente y archivará todos los movimientos del período actual para comenzar el mes desde cero.
                  </p>
                  
                  <p className="text-xs text-slate-400">
                     Los saldos actuales de tus cuentas <span className="font-bold text-emerald-400">se mantendrán intactos</span> como balances iniciales para el nuevo período.
                  </p>

                  <div className="bg-amber-500/10 border border-amber-500/20 text-amber-300 text-left p-4 rounded-2xl space-y-1">
                    <div className="text-xs font-bold uppercase">Estado actual a archivar:</div>
                    <div className="text-xs">• Movimientos registrados: <span className="font-bold text-white">{state.transactions.length}</span></div>
                    <div className="text-xs">• Período activo desde: <span className="font-bold text-white">{state.currentPeriodStart}</span></div>
                  </div>

                  {!periodConfirm ? (
                    <button 
                      onClick={() => setPeriodConfirm(true)}
                      className="w-full bg-amber-600 hover:bg-amber-500 text-white font-bold py-4 rounded-xl transition-all shadow-lg"
                    >
                      Realizar Corte Mensual
                    </button>
                  ) : (
                    <div className="space-y-3 pt-2">
                      <div className="text-xs font-semibold text-rose-400">⚠️ ¿Confirmas realizar el cierre de mes? No podrás agregar nuevos movimientos a este período.</div>
                      <div className="flex gap-2">
                        <button 
                          onClick={doMonthEnd}
                          className="flex-1 bg-rose-600 hover:bg-rose-500 text-white py-3.5 rounded-xl font-bold text-xs uppercase"
                        >
                          Sí, realizar corte
                        </button>
                        <button 
                          onClick={() => setPeriodConfirm(false)}
                          className="bg-slate-700 hover:bg-slate-600 text-slate-300 px-6 py-3.5 rounded-xl font-semibold text-xs"
                        >
                          Cancelar
                        </button>
                      </div>
                    </div>
                  )}
                </div>
              </div>
            )}

            {/* PANTALLA: ARCHIVO DE PERÍODOS */}
            {screen === "archive" && (
              <div className="p-4 space-y-4">
                {state.archivedPeriods.length === 0 && (
                  <div className="text-center text-slate-500 py-12 bg-[#121824] rounded-2xl border border-dashed border-[#1e293b]">
                    <div className="text-4xl mb-3">📦</div>
                    <p className="text-sm">No tienes períodos archivados todavía.</p>
                  </div>
                )}

                {[...state.archivedPeriods].reverse().map(p => {
                  const inc = p.transactions.filter(t => t.type === "income").reduce((s, t) => s + t.amount, 0);
                  const exp = p.transactions.filter(t => t.type === "expense").reduce((s, t) => s + t.amount, 0);
                  
                  return (
                    <div key={p.id} className="bg-[#121824] border border-[#1e293b] rounded-3xl p-5 space-y-4">
                      <div className="flex justify-between items-start">
                        <div>
                          <h4 className="font-extrabold text-base text-indigo-400 capitalize">{p.label}</h4>
                          <span className="text-[10px] text-slate-500 block mt-0.5">{p.start} ➔ {p.end}</span>
                        </div>
                        <span className="text-[11px] bg-slate-800 text-slate-400 px-3 py-1 rounded-full font-semibold">
                          {p.transactions.length} movs
                        </span>
                      </div>

                      <div className="grid grid-cols-3 gap-2 text-center pt-2 border-t border-[#1e293b]">
                        <div>
                          <div className="text-[9px] font-bold text-emerald-400 uppercase">Ingresos</div>
                          <div className="text-xs font-extrabold text-emerald-400 mt-0.5">{fmt(inc)}</div>
                        </div>
                        <div>
                          <div className="text-[9px] font-bold text-rose-400 uppercase">Gastos</div>
                          <div className="text-xs font-extrabold text-rose-400 mt-0.5">{fmt(exp)}</div>
                        </div>
                        <div>
                          <div className="text-[9px] font-bold text-blue-400 uppercase">Balance</div>
                          <div className="text-xs font-extrabold text-blue-400 mt-0.5">{fmt(inc - exp)}</div>
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}

            {/* PANTALLA: AJUSTES DE SINCRO (GOOGLE DRIVE) */}
            {screen === "sync_settings" && (
              <div className="p-4 space-y-6">
                
                {/* TARJETA DE ESTADO ACTUAL */}
                <div className="bg-[#121824] border border-[#1e293b] rounded-3xl p-6 space-y-4">
                  <div className="flex items-center justify-between">
                    <h3 className="font-bold text-base text-slate-200">Sincronización en la Nube</h3>
                    <span className="text-2xl">☁️</span>
                  </div>

                  <p className="text-xs text-slate-400 leading-relaxed">
                    Al habilitar la sincronización, tus datos se guardarán de forma segura en tu propio Google Drive en un archivo invisible llamado <code className="text-indigo-400">mi_cartera_data.json</code>.
                  </p>

                  <div className="p-4 rounded-2xl bg-[#0a0f19] border border-[#1e293b]">
                    <div className="flex items-center gap-3">
                      <span className={`w-3.5 h-3.5 rounded-full ${
                        syncStatus === "connected" ? "bg-emerald-400 animate-pulse" :
                        syncStatus === "syncing" ? "bg-indigo-400" :
                        syncStatus === "error" ? "bg-rose-400" : "bg-slate-600"
                      }`} />
                      <div>
                        <div className="text-xs font-bold text-slate-300">
                          {syncStatus === "connected" ? "Conectado a Google Drive" :
                           syncStatus === "syncing" ? "Sincronizando Archivos..." :
                           syncStatus === "connecting" ? "Autorizando Cuenta..." :
                           syncStatus === "error" ? "Error en la Conexión" : "Desconectado de la Nube"}
                        </div>
                        <div className="text-[10px] text-slate-500 mt-0.5">
                          {lastSyncTime ? `Última sincronización realizada a las ${lastSyncTime}` : "No se ha sincronizado en esta sesión"}
                        </div>
                      </div>
                    </div>
                  </div>

                  <div className="flex gap-2">
                    {syncStatus === "connected" ? (
                      <>
                        <button 
                          onClick={() => uploadDataToDrive(gdFileId, state)}
                          className="flex-1 bg-indigo-600 hover:bg-indigo-500 py-3.5 rounded-xl font-bold text-xs uppercase transition-all"
                        >
                          Sincronizar Ahora
                        </button>
                        <button 
                          onClick={disconnectGoogleDrive}
                          className="bg-slate-800 hover:bg-slate-700 text-slate-300 px-4 rounded-xl font-semibold text-xs"
                        >
                          Desconectar
                        </button>
                      </>
                    ) : (
                      <button 
                        onClick={connectGoogleDrive}
                        className="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-xl font-bold text-xs uppercase tracking-wider text-white transition-all shadow-lg"
                      >
                        ⚡ Conectar Google Drive
                      </button>
                    )}
                  </div>
                </div>

                {/* CREDIENCIALES DE DESARROLLADOR */}
                <div className="bg-[#121824] border border-[#1e293b] rounded-3xl p-6 space-y-4">
                  <div className="flex justify-between items-center">
                    <h4 className="font-bold text-xs text-slate-400 uppercase tracking-wider">Credenciales de API de Google</h4>
                    <button 
                      onClick={() => setScreen("help")}
                      className="text-xs text-indigo-400 font-semibold"
                    >
                      ¿Cómo obtenerlas?
                    </button>
                  </div>

                  <p className="text-[11px] text-slate-400">
                    Por seguridad, debes ingresar tus propias credenciales de Google Developer para que la aplicación local pueda comunicarse directamente desde tu PC con tu Drive.
                  </p>

                  <div className="space-y-3">
                    <div>
                      <label className="text-[10px] font-bold text-slate-400 uppercase block mb-1">Google Client ID</label>
                      <input 
                        type="password" 
                        placeholder="Ingresa tu Client ID (.apps.googleusercontent.com)" 
                        value={gdriveConfig.clientId}
                        onChange={e => setGdriveConfig({ ...gdriveConfig, clientId: e.target.value })}
                        className="w-full bg-[#0a0f19] border border-[#1e293b] rounded-xl py-2.5 px-4 text-xs text-white outline-none focus:border-indigo-500"
                      />
                    </div>

                    <div>
                      <label className="text-[10px] font-bold text-slate-400 uppercase block mb-1">Google API Key</label>
                      <input 
                        type="password" 
                        placeholder="Ingresa tu API Key de Google" 
                        value={gdriveConfig.apiKey}
                        onChange={e => setGdriveConfig({ ...gdriveConfig, apiKey: e.target.value })}
                        className="w-full bg-[#0a0f19] border border-[#1e293b] rounded-xl py-2.5 px-4 text-xs text-white outline-none focus:border-indigo-500"
                      />
                    </div>
                  </div>

                  <button 
                    onClick={() => {
                      localStorage.setItem("gdrive_config", JSON.stringify(gdriveConfig));
                      showToast("Credenciales de Google guardadas localmente");
                    }}
                    className="w-full bg-slate-800 hover:bg-slate-700 py-3 rounded-xl text-xs font-bold text-slate-200 transition-all"
                  >
                    Guardar Credenciales
                  </button>
                </div>

                {/* RESPALDO TOTALMENTE OFFLINE */}
                <div className="bg-[#121824] border border-[#1e293b] rounded-3xl p-6 space-y-4">
                  <h4 className="font-bold text-xs text-[#94a3b8] uppercase tracking-wider">Respaldos Manuales Locales (100% Offline)</h4>
                  <p className="text-[11px] text-slate-400">
                    Si no deseas configurar Google Drive, puedes descargar tus datos en tu PC y cargarlos después cuando gustes. ¡Totalmente compatible!
                  </p>

                  <div className="grid grid-cols-2 gap-2">
                    <button 
                      onClick={exportLocalJSON}
                      className="bg-indigo-600/10 hover:bg-indigo-600/20 text-indigo-400 border border-indigo-500/20 py-3 rounded-xl text-xs font-bold transition-all"
                    >
                      💾 Exportar Backup
                    </button>
                    
                    <label className="bg-slate-800 hover:bg-slate-700 text-slate-300 py-3 rounded-xl text-xs font-bold text-center cursor-pointer block border border-slate-700 transition-all">
                      📁 Importar Backup
                      <input 
                        type="file" 
                        accept=".json" 
                        onChange={importLocalJSON}
                        className="hidden" 
                      />
                    </label>
                  </div>
                </div>

              </div>
            )}

            {/* PANTALLA: AYUDA E INSTALACIÓN */}
            {screen === "help" && (
              <div className="p-4 space-y-6">
                
                {/* GUÍA DE ACCESO DIRECTO ESCRITORIO */}
                <div className="bg-[#121824] border border-[#1e293b] rounded-3xl p-6 space-y-4">
                  <h3 className="font-bold text-base text-slate-200 flex items-center gap-2">
                    🖥️ Crear acceso directo en tu Escritorio (PC)
                  </h3>

                  <p className="text-xs text-slate-400 leading-relaxed">
                    Puedes instalar este archivo para usarlo como si fuera un programa nativo de Windows o Mac sin necesidad de abrir el navegador manualmente:
                  </p>

                  <ol className="list-decimal pl-4 space-y-2 text-xs text-slate-300">
                    <li>Primero, guarda esta página en tu PC haciendo clic derecho y seleccionando <strong>Guardar página como...</strong> (nombre: <code className="text-indigo-400">index.html</code>).</li>
                    <li>Abre ese archivo guardado con tu navegador habitual (<strong>Google Chrome</strong> o <strong>Microsoft Edge</strong>).</li>
                    <li>En el menú de tres puntos de la esquina superior derecha, ve a:
                      <ul className="list-disc pl-4 mt-1 space-y-1 text-slate-400">
                        <li><strong>Google Chrome:</strong> Guardar y compartir ➔ <strong className="text-white">Instalar esta página como aplicación</strong>.</li>
                        <li><strong>Microsoft Edge:</strong> Aplicaciones ➔ <strong className="text-white">Instalar este sitio como una aplicación</strong>.</li>
                      </ul>
                    </li>
                    <li>¡Listo! Se creará un acceso directo precioso en tu escritorio y barra de tareas que se iniciará inmediatamente en su propia pantalla de forma independiente.</li>
                  </ol>
                </div>

                {/* GUÍA DE CONFIGURACIÓN GOOGLE CLOUD */}
                <div className="bg-[#121824] border border-[#1e293b] rounded-3xl p-6 space-y-4">
                  <h3 className="font-bold text-base text-slate-200 flex items-center gap-2">
                    🔑 Cómo configurar la API de Google Drive gratis (3 Minutos)
                  </h3>

                  <p className="text-xs text-slate-400 leading-relaxed">
                    Para que la app de tu PC se conecte de forma privada a tu propio espacio de Google Drive, sigue estos breves pasos:
                  </p>

                  <ul className="space-y-3 text-xs text-slate-300">
                    <li className="flex gap-2">
                      <span className="font-bold text-indigo-400">1.</span>
                      <span>Ingresa a <a href="https://console.cloud.google.com/" target="_blank" className="text-indigo-400 underline">Google Cloud Console</a> y crea un nuevo proyecto rápido.</span>
                    </li>
                    <li className="flex gap-2">
                      <span className="font-bold text-indigo-400">2.</span>
                      <span>En el buscador de arriba busca <strong className="text-white">"Google Drive API"</strong> y haz clic en el botón <strong className="text-emerald-400">Habilitar (Enable)</strong>.</span>
                    </li>
                    <li className="flex gap-2">
                      <span className="font-bold text-indigo-400">3.</span>
                      <span>Ve a la pestaña de <strong className="text-white">Pantalla de consentimiento de OAuth</strong>, selecciona tipo "Externo", escribe un nombre de app y tu correo de contacto (los demás campos déjalos vacíos), y agrega tu propio correo como <strong className="text-white">Usuario de prueba (Test user)</strong>.</span>
                    </li>
                    <li className="flex gap-2">
                      <span className="font-bold text-indigo-400">4.</span>
                      <span>Ve a <strong className="text-white">Credenciales</strong>, haz clic en <strong className="text-indigo-400">Crear credenciales</strong>:
                        <ul className="list-disc pl-4 mt-1.5 space-y-1 text-slate-400">
                          <li><strong>Clave de API (API Key):</strong> Cópiala y pégala en la pestaña de sincronización de la app.</li>
                          <li><strong>ID de cliente de OAuth (Client ID):</strong> Elige "Aplicación web". En <em>Orígenes de JavaScript autorizados</em> agrega <code className="text-white">http://localhost</code> y si usas algún host agrega la URL. Copia el ID generado y pégalo en la app.</li>
                        </ul>
                      </span>
                    </li>
                  </ul>
                </div>

              </div>
            )}

          </main>

          {/* MENÚ DE NAVEGACIÓN INFERIOR (ESTILO APP NATIVA) */}
          <nav className="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-md bg-[#0e1320]/90 backdrop-blur-md border-t border-[#1e293b] grid grid-cols-5 py-2.5 px-2 z-40">
            {[
              { label: "Inicio", icon: "🏠", screen: "home" },
              { label: "Cuentas", icon: "💳", screen: "accounts" },
              { label: "Consultas", icon: "🔍", screen: "queries" },
              { label: "Drive", icon: "☁️", screen: "sync_settings" },
              { label: "Ayuda", icon: "❓", screen: "help" }
            ].map(tab => (
              <button 
                key={tab.screen}
                onClick={() => setScreen(tab.screen)}
                className="flex flex-col items-center justify-center transition-all active:scale-90"
              >
                <span className="text-lg">{tab.icon}</span>
                <span className={`text-[10px] font-semibold mt-0.5 ${
                  screen === tab.screen ? "text-indigo-400" : "text-[#64748b]"
                }`}>
                  {tab.label}
                </span>
              </button>
            ))}
          </nav>

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
