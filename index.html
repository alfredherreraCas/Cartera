                </div>

                <div className="pt-4 border-t border-[#1e293b] text-center text-xs text-[#64748b]">
                  Mi Cartera Pro v2.6 • Sincronización Flexible
                </div>
              </div>
            </div>
          )}

          {/* DESGLOSE DE SALDOS POR CUENTA MODAL */}
          {showBreakdown && (
            <div className="fixed inset-0 z-50 flex items-end justify-center bg-black/60 backdrop-blur-xs">
              <div className="w-full max-w-md bg-[#121824] rounded-t-3xl border-t border-[#1e293b] p-6 pb-8 max-h-[90vh] flex flex-col animate-slide-up">
                <div className="w-12 h-1 bg-slate-700 rounded-full mx-auto mb-6 flex-shrink-0" />
                <div className="text-center font-bold text-lg mb-4">💰 Desglose General de Saldos</div>
                
                {/* Selector de Pestañas */}
                <div className="flex bg-[#0b0f19] p-1 rounded-xl mb-4 border border-[#1e293b] text-xs font-semibold flex-shrink-0">
                  <button 
                    onClick={() => setBreakdownTab("debit")}
                    className={`flex-1 py-2.5 rounded-lg transition-all ${breakdownTab === "debit" ? "bg-indigo-600 text-white shadow-md" : "text-slate-400 hover:text-[#f1f5f9]"}`}
                  >
                    💵 Débito/Cash
                  </button>
                  <button 
                    onClick={() => setBreakdownTab("credit")}
                    className={`flex-1 py-2.5 rounded-lg transition-all ${breakdownTab === "credit" ? "bg-indigo-600 text-white shadow-md" : "text-slate-400 hover:text-[#f1f5f9]"}`}
                  >
                    💳 Tarjetas
                  </button>
                  <button 
                    onClick={() => setBreakdownTab("loan")}
                    className={`flex-1 py-2.5 rounded-lg transition-all ${breakdownTab === "loan" ? "bg-indigo-600 text-white shadow-md" : "text-slate-400 hover:text-[#f1f5f9]"}`}
                  >
                    🤝 Préstamos
                  </button>
                </div>

                {/* Contenido */}
                <div className="space-y-4 overflow-y-auto pr-1 flex-1">
                  {breakdownTab === "debit" && (
                    <div className="space-y-3">
                      <div className="text-xs font-bold uppercase tracking-wider text-slate-400 mb-2">Efectivo y Débito</div>
                      {state.accounts.filter(a => !a.isCreditCard && !a.isLoan).map(a => (
                        <div key={a.id} className="bg-[#1a2336] p-4 rounded-xl border border-[#27354f] flex justify-between items-center">
                          <span className="font-semibold text-slate-200">{a.name}</span>
                          <span className="font-bold text-emerald-400">{maskAmount(a.balance)}</span>
                        </div>
                      ))}
                      <div className="flex justify-between items-center font-bold text-base mt-4 pt-3 border-t border-[#1e293b] text-slate-300">
                        <span>Total Patrimonio Neto:</span>
                        <span className="text-emerald-400 text-lg">{maskAmount(totalBalance)}</span>
                      </div>
                    </div>
                  )}

                  {breakdownTab === "credit" && (
                    <div className="space-y-3">
                      <div className="text-xs font-bold uppercase tracking-wider text-slate-400 mb-2">Límites y Deuda de Tarjetas</div>
                      {state.accounts.filter(a => a.isCreditCard).map(a => (
                        <div key={a.id} className="bg-[#1a2336] p-4 rounded-xl border border-[#27354f] space-y-2">
                          <div className="flex justify-between items-center font-semibold">
                            <span className="text-slate-200">{a.name}</span>
                            <span className="text-rose-400">Deuda: {maskAmount(a.cardDebt)}</span>
                          </div>
                          <div className="text-[11px] text-slate-400 flex justify-between">
                            <span>Disponible: <strong className="text-emerald-400">{maskAmount(a.availableLimit)}</strong></span>
                            <span>Crédito Total: {maskAmount(a.totalLimit)}</span>
                          </div>
                          {a.dueDay && <div className="text-[10px] text-indigo-300 font-semibold">Día de Pago: cada {a.dueDay}</div>}
                        </div>
                      ))}
                      <div className="flex justify-between items-center font-bold text-base mt-4 pt-3 border-t border-[#1e293b] text-slate-300">
                        <span>Total Deuda Tarjetas:</span>
                        <span className="text-rose-400 text-lg">{maskAmount(totalCreditDebt)}</span>
                      </div>
                    </div>
                  )}

                  {breakdownTab === "loan" && (
                    <div className="space-y-3">
                      <div className="text-xs font-bold uppercase tracking-wider text-slate-400 mb-2">Financiamientos y Préstamos</div>
                      {state.accounts.filter(a => a.isLoan).map(a => (
                        <div key={a.id} className="bg-[#1a2336] p-4 rounded-xl border border-[#27354f] space-y-2">
                          <div className="flex justify-between items-center font-semibold">
                            <span className="text-slate-200">{a.name}</span>
                            <span className="text-orange-400">Deuda: {maskAmount(a.cardDebt)}</span>
                          </div>
                          <div className="text-[11px] text-slate-400 flex justify-between">
                            <span>Monto Pagado: <strong className="text-emerald-400">{maskAmount(a.availableLimit)}</strong></span>
                            <span>Monto Prestado: {maskAmount(a.totalLimit)}</span>
                          </div>
                          {a.loanFrequency && (
                            <div className="text-[10px] text-indigo-300 font-semibold">
                              Frecuencia: {a.loanFrequency === "quincenal" ? `Quincenal (Días ${a.dueDay} y ${a.dueDay2})` : `Mensual (Día ${a.dueDay})`}
                            </div>
                          )}
                        </div>
                      ))}
                      <div className="flex justify-between items-center font-bold text-base mt-4 pt-3 border-t border-[#1e293b] text-slate-300">
                        <span>Total Deuda Préstamos:</span>
                        <span className="text-orange-400 text-lg">{maskAmount(totalLoanDebt)}</span>
                      </div>
                    </div>
                  )}
                </div>

                <button 
                  onClick={() => setShowBreakdown(false)}
                  className="w-full bg-indigo-600 hover:bg-indigo-500 py-3 rounded-xl font-bold mt-6 transition-all flex-shrink-0"
                >
                  Listo
                </button>
              </div>
            </div>
          )}

          {/* HEADER PRINCIPAL */}
          <header className="sticky top-0 bg-[#0e1320]/90 backdrop-blur-md z-40 border-b border-[#1e293b] px-4 py-4 flex items-center justify-between no-print">
            {screen !== "home" ? (
              <button onClick={() => setScreen("home")} className="p-2 hover:bg-slate-800/60 rounded-xl transition-all">
                <span className="text-xl">←</span>
              </button>
            ) : (
              <button onClick={() => setMenuOpen(true)} className="p-2 hover:bg-slate-800/60 rounded-xl transition-all">
                <span className="text-xl">☰</span>
              </button>
            )}

            <h1 className="font-bold text-sm tracking-wide uppercase text-slate-200">
              {screen === "home" ? "Mi Cartera" :
               screen === "accounts" ? "Cuentas" :
               screen === "categories" ? "Categorías" :
               screen === "transfers" ? "Transferencias" :
               screen === "queries" ? "Consultas & Filtros" :
               screen === "period" ? "Corte del Período" :
               screen === "archive" ? "Períodos Archivados" :
               screen === "income" ? "Registrar Ingreso" :
               screen === "expense" ? "Registrar Gasto" :
               screen === "budgets" ? "Presupuestos" :
               screen === "lock_settings" ? "Seguridad NIP" :
               screen === "payments" ? "Vencimientos" : "Google Drive Sync"}
            </h1>

            <div className="flex items-center gap-1">
              {/* Botón de bloqueo manual rápido */}
              {state.nip && (
                <button 
                  onClick={() => setIsLocked(true)}
                  className="p-2 hover:bg-slate-800/60 rounded-xl transition-all"
                  title="Bloquear Aplicación"
                >
                  🔒
                </button>
              )}

              {/* Conector Nube */}
              <button onClick={() => setScreen("sync_settings")} className="p-2 hover:bg-slate-800/60 rounded-xl transition-all relative">
                <span className={`absolute top-1.5 right-1.5 w-2 h-2 rounded-full ${
                  syncStatus === "connected" ? "bg-emerald-400" :
                  syncStatus === "syncing" ? "bg-indigo-400 animate-pulse" : "bg-slate-600"
                }`} />
                <span className="text-lg">☁️</span>
              </button>
            </div>
          </header>

          {/* CONTENIDO PRINCIPAL */}
          <main className="flex-1 pb-24 overflow-y-auto">

            {/* PANTALLA: HOME */}
            {screen === "home" && (
              <div className="p-4 space-y-6">
                
                {/* TARJETA DE BALANCE PRINCIPAL CON BOTONES INTEGRADOS */}
                <div className="bg-gradient-to-br from-indigo-950 to-indigo-850 rounded-3xl p-6 text-white shadow-lg shadow-indigo-950/40 border border-indigo-500/20 relative overflow-hidden space-y-4">
                  <div className="absolute -right-10 -bottom-10 opacity-5 text-9xl">💰</div>
                  
                  {/* Botón del Ojo de Privacidad */}
                  <button 
                    onClick={() => setHideAmounts(!hideAmounts)}
                    className="absolute top-5 right-5 p-2 bg-white/5 hover:bg-white/10 active:scale-95 transition-all rounded-full z-10"
                    title={hideAmounts ? "Mostrar saldos" : "Ocultar saldos"}
                  >
                    {hideAmounts ? (
                      <span className="text-lg">🙈</span> 
                    ) : (
                      <span className="text-lg">👁️</span>
                    )}
                  </button>
                  
                  <div>
                    <div className="text-indigo-200 text-xs font-semibold uppercase tracking-wider mb-1">Patrimonio Neto Disponible</div>
                    <div className="text-3xl font-extrabold tracking-tight">{maskAmount(totalBalance)}</div>
                    <div className="text-[10px] text-indigo-300 mt-1">(Suma de efectivo y cuentas de débito)</div>
                  </div>

                  {/* RUBRO: DISPONIBLE EN TARJETAS DE CRÉDITO */}
                  <div className="bg-[#121824]/60 p-3 rounded-2xl border border-indigo-500/10 flex items-center justify-between">
                    <div>
                      <span className="text-[10px] text-slate-300 uppercase font-bold tracking-wider block">Disponible en Tarjetas</span>
                      <span className="text-sm font-extrabold text-indigo-400 mt-0.5 inline-block">{maskAmount(totalCreditAvailable)}</span>
                    </div>
                    <span className="text-xl">💳</span>
                  </div>

                  {/* BOTONES INGRESO/EGRESO INTEGRADOS */}
                  <div className="grid grid-cols-2 gap-3 pt-3 border-t border-indigo-500/20">
                    <button 
                      onClick={() => openScreen("income", "income")}
                      className="bg-emerald-600/30 hover:bg-emerald-600/40 text-emerald-300 py-3 rounded-2xl flex items-center justify-center gap-2 text-xs font-extrabold transition-all border border-emerald-500/20 active:scale-95"
                    >
                      <span>📈</span> Ingreso
                    </button>
                    <button 
                      onClick={() => openScreen("expense", "expense")}
                      className="bg-rose-600/30 hover:bg-rose-600/40 text-rose-300 py-3 rounded-2xl flex items-center justify-center gap-2 text-xs font-extrabold transition-all border border-rose-500/20 active:scale-95"
                    >
                      <span>📉</span> Egreso
                    </button>
                  </div>
                  
                  <div className="flex justify-between items-center pt-1">
                    <button 
                      onClick={() => {
                        setBreakdownTab("debit");
                        setShowBreakdown(true);
                      }}
                      className="text-[11px] text-indigo-300 hover:text-indigo-200 hover:underline transition-all flex items-center gap-1 font-medium"
                    >
                      Ver desglose detallado ➔
                    </button>
                    {syncStatus === "connected" && (
                      <span className="text-[10px] text-emerald-300 font-medium flex items-center gap-1">
                        <span className="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-ping" />
                        Nube Conectada
                      </span>
                    )}
                  </div>
                </div>

                {/* BANNER DE PAGOS PRÓXIMOS/URGENTES */}
                {urgentPayments.length > 0 && (
                  <div className="bg-rose-950/20 border border-rose-500/30 rounded-2xl p-4 flex justify-between items-center animate-soft-pulse">
                    <div>
                      <span className="text-xs font-bold text-rose-300 uppercase tracking-wide block">⚠️ ¡Pagos Próximos!</span>
                      <span className="text-[11px] text-slate-300 mt-0.5 block">
                        Tienes {urgentPayments.length} deudas que vencen pronto.
                      </span>
                    </div>
                    <button 
                      onClick={() => setScreen("payments")}
                      className="bg-rose-600 hover:bg-rose-500 text-white text-[11px] font-bold px-3 py-1.5 rounded-lg transition-all"
                    >
                      Revisar
                    </button>
                  </div>
                )}

                {/* INDICADORES DE DEUDAS */}
                <div className="grid grid-cols-2 gap-4">
                  {/* INDICADOR DEUDA DE TARJETAS */}
                  <button 
                    onClick={() => {
                      setBreakdownTab("credit");
                      setShowBreakdown(true);
                    }}
                    className={`p-4 rounded-2xl border transition-all text-left flex flex-col justify-between ${
                      totalCreditDebt > 0 
                        ? "bg-rose-950/20 border-rose-500/30 text-rose-300 hover:bg-rose-950/30" 
                        : "bg-[#121824] border-[#1e293b] text-slate-400 hover:border-slate-800"
                    }`}
                  >
                    <div className="flex justify-between items-center w-full mb-2">
                      <span className="text-[10px] font-bold uppercase tracking-wider block">Deuda Tarjetas</span>
                      <span className="text-sm">💳</span>
                    </div>
                    <div>
                      <span className="text-base font-extrabold tracking-tight block">
                        {maskAmount(totalCreditDebt)}
                      </span>
                      {totalCreditDebt > 0 && <span className="text-[8px] text-rose-400 block mt-0.5">⚠️ Requiere Pago - Ver Detalle</span>}
                    </div>
                  </button>

                  {/* INDICADOR DEUDA DE PRÉSTAMOS */}
                  <button 
                    onClick={() => {
                      setBreakdownTab("loan");
                      setShowBreakdown(true);
                    }}
                    className={`p-4 rounded-2xl border transition-all text-left flex flex-col justify-between ${
                      totalLoanDebt > 0 
                        ? "bg-amber-950/20 border-amber-500/30 text-amber-300 hover:bg-amber-950/30" 
                        : "bg-[#121824] border-[#1e293b] text-slate-400 hover:border-slate-800"
                    }`}
                  >
                    <div className="flex justify-between items-center w-full mb-2">
                      <span className="text-[10px] font-bold uppercase tracking-wider block">Deuda Préstamos</span>
                      <span className="text-sm">🤝</span>
                    </div>
                    <div>
                      <span className="text-base font-extrabold tracking-tight block">
                        {maskAmount(totalLoanDebt)}
                      </span>
                      {totalLoanDebt > 0 && <span className="text-[8px] text-amber-400 block mt-0.5">📋 En Amortización - Ver Detalle</span>}
                    </div>
                  </button>
                </div>

                {/* MOVIMIENTOS RECIENTES */}
                <div>
                  <div className="flex justify-between items-center mb-3">
                    <h3 className="text-xs font-bold uppercase text-slate-400 tracking-wider">Últimos Movimientos</h3>
                    <button onClick={() => setScreen("queries")} className="text-xs text-indigo-400 font-semibold">Ver todos</button>
                  </div>

                  <div className="space-y-2">
                    {recentTx.map(t => (
                      <div key={t.id} className="bg-[#121824] border border-[#1e293b] rounded-2xl p-4 flex items-center justify-between transition-all hover:border-[#2a364f]">
                        <div className="flex items-center gap-3">
                          <div className={`w-10 h-10 rounded-xl flex items-center justify-center text-lg font-bold ${
                            t.type === "income" ? "bg-emerald-500/10 text-emerald-400" :
                            t.type === "transfer" ? "bg-blue-500/10 text-blue-400" : "bg-rose-500/10 text-rose-400"
                          }`}>
                            {t.type === "income" ? "📈" : t.type === "transfer" ? "⇄" : "📉"}
                          </div>
                          <div>
                            <div className="font-semibold text-sm text-slate-200">{t.categoryName}</div>
                            <div className="text-[11px] text-slate-500">{t.accountName} • {t.date}</div>
                            {t.note && <div className="text-xs text-[#94a3b8] italic mt-0.5">"{t.note}"</div>}
                          </div>
                        </div>

                        <div className={`font-bold text-sm tracking-tight ${
                          t.type === "income" ? "text-emerald-400" : 
                          t.type === "transfer" ? "text-blue-400" : "text-rose-400"
                        }`}>
                          {t.type === "income" ? "+" : t.type === "transfer" ? "" : "-"}{maskAmount(t.amount)}
                        </div>
                      </div>
                    ))}
                  </div>
                </div>

              </div>
            )}

            {/* PANTALLA: GESTIONAR CUENTAS */}
            {screen === "accounts" && (
              <div className="p-4 space-y-6">
                <div className="bg-[#121824] border border-[#1e293b] rounded-3xl p-6 space-y-4">
                  <h3 className="font-bold text-sm uppercase text-slate-400 tracking-wider">
                    {editAcc ? "✏️ Editar Cuenta" : "💳 Agregar Nueva Cuenta"}
                  </h3>
                  
                  {/* Selector de Tipo de Cuenta */}
                  <div>
                    <label className="text-xs font-bold uppercase tracking-wider text-slate-400 block mb-2">Tipo de Cuenta</label>
                    <div className="grid grid-cols-3 gap-1.5">
                      <button 
                        onClick={() => setAccForm({ ...accForm, isCreditCard: false, isLoan: false })}
                        className={`py-3 rounded-xl border text-[10px] font-bold uppercase tracking-wider transition-all text-center ${
                          (!accForm.isCreditCard && !accForm.isLoan) 
                            ? "bg-indigo-600/20 text-indigo-400 border-indigo-500/40" 
                            : "border-[#1e293b] text-slate-400 hover:bg-slate-800/40"
                        }`}
                      >
                        💵 Débito
                      </button>
                      <button 
                        onClick={() => setAccForm({ ...accForm, isCreditCard: true, isLoan: false })}
                        className={`py-3 rounded-xl border text-[10px] font-bold uppercase tracking-wider transition-all text-center ${
                          accForm.isCreditCard 
                            ? "bg-rose-500/10 text-rose-400 border-rose-500/40" 
                            : "border-[#1e293b] text-slate-400 hover:bg-slate-800/40"
                        }`}
                      >
                        💳 Tarjeta
                      </button>
                      <button 
                        onClick={() => setAccForm({ ...accForm, isCreditCard: false, isLoan: true })}
                        className={`py-3 rounded-xl border text-[10px] font-bold uppercase tracking-wider transition-all text-center ${
                          accForm.isLoan 
                            ? "bg-amber-500/10 text-amber-400 border-amber-500/40" 
                            : "border-[#1e293b] text-slate-400 hover:bg-slate-800/40"
                        }`}
                      >
                        🤝 Préstamo
                      </button>
                    </div>
                  </div>

                  <div>
                    <label className="text-xs font-bold uppercase tracking-wider text-slate-400 block mb-1">Nombre de la Cuenta</label>
                    <input 
                      type="text" 
                      placeholder="Ej. Banamex Oro, Efectivo, Crédito Personal" 
                      value={accForm.name} 
                      onChange={e => setAccForm({ ...accForm, name: e.target.value })}
                      className="w-full bg-[#0a0f19] border border-[#1e293b] rounded-xl py-3 px-4 text-white text-sm focus:border-indigo-500 outline-none"
                    />
                  </div>

                  {(!accForm.isCreditCard && !accForm.isLoan) ? (
                    <div>
                      <label className="text-xs font-bold uppercase tracking-wider text-slate-400 block mb-1">Saldo inicial</label>
                      <input 
                        type="number" 
                        placeholder="0.00" 
                        value={accForm.balance} 
                        onChange={e => setAccForm({ ...accForm, balance: e.target.value })}
                        className="w-full bg-[#0a0f19] border border-[#1e293b] rounded-xl py-3 px-4 text-white text-sm focus:border-indigo-500 outline-none"
                      />
                    </div>
                  ) : (
                    <div className="space-y-4 border-t border-slate-700/50 pt-4">
                      <div className="grid grid-cols-2 gap-3">
                        <div>
                          <label className="text-[10px] font-bold uppercase tracking-wider text-slate-400 block mb-1">
                            {accForm.isCreditCard ? "Límite Otorgado" : "Monto Prestado"}
                          </label>
                          <input 
                            type="number" 
                            placeholder="Ej. 15000" 
                            value={accForm.totalLimit} 
                            onChange={e => {
                              const limit = parseFloat(e.target.value) || 0;
                              const debt = parseFloat(accForm.cardDebt) || 0;
                              setAccForm({ 
                                ...accForm, 
                                totalLimit: e.target.value,
                                availableLimit: (limit - debt).toString()
                              });
                            }}
                            className="w-full bg-[#0a0f19] border border-[#1e293b] rounded-xl py-2.5 px-3 text-white text-xs focus:border-indigo-500 outline-none"
                          />
                        </div>
                        <div>
                          <label className="text-[10px] font-bold uppercase tracking-wider text-slate-400 block mb-1">Deuda actual</label>
                          <input 
                            type="number" 
                            placeholder="Ej. 3000" 
                            value={accForm.cardDebt} 
                            onChange={e => {
                              const limit = parseFloat(accForm.totalLimit) || 0;
                              const debt = parseFloat(e.target.value) || 0;
                              setAccForm({ 
                                ...accForm, 
                                cardDebt: e.target.value,
                                availableLimit: (limit - debt).toString()
                              });
                            }}
                            className="w-full bg-[#0a0f19] border border-[#1e293b] rounded-xl py-2.5 px-3 text-white text-xs focus:border-indigo-500 outline-none"
                          />
                        </div>
                      </div>

                      <div className="grid grid-cols-2 gap-3">
                        <div>
                          <label className="text-[10px] font-bold uppercase tracking-wider text-slate-400 block mb-1">
                            {accForm.isCreditCard ? "Monto Disponible" : "Monto Amortizado"}
                          </label>
                          <input 
                            type="number" 
                            placeholder="Monto" 
                            value={accForm.availableLimit} 
                            onChange={e => setAccForm({ ...accForm, availableLimit: e.target.value })}
                            className="w-full bg-[#0a0f19]/60 border border-slate-700/50 text-indigo-300 rounded-xl py-2.5 px-3 text-xs outline-none"
                          />
                        </div>
                      </div>

                      {/* CONFIGURACIÓN EXCLUSIVA PARA PRÉSTAMOS */}
                      {accForm.isLoan && (
                        <div className="space-y-3 bg-[#0a0f19] p-3 rounded-2xl border border-[#1e293b]">
                          <div>
                            <label className="text-[10px] font-bold uppercase tracking-wider text-slate-400 block mb-1.5">¿Cómo se pagará este préstamo?</label>
                            <div className="grid grid-cols-2 gap-2">
                              <button
                                type="button"
                                onClick={() => setAccForm({ ...accForm, loanFrequency: "mensual" })}
                                className={`py-2 rounded-xl text-xs font-bold transition-all ${
                                  accForm.loanFrequency !== "quincenal"
                                    ? "bg-indigo-600/25 text-indigo-400 border border-indigo-500/30"
                                    : "bg-slate-900 text-slate-400 border border-slate-800"
                                }`}
                              >
                                Mensual
                              </button>
                              <button
                                type="button"
                                onClick={() => setAccForm({ ...accForm, loanFrequency: "quincenal" })}
                                className={`py-2 rounded-xl text-xs font-bold transition-all ${
                                  accForm.loanFrequency === "quincenal"
                                    ? "bg-indigo-600/25 text-indigo-400 border border-indigo-500/30"
                                    : "bg-slate-900 text-slate-400 border border-slate-800"
                                }`}
                              >
                                Quincenal
                              </button>
                            </div>
                          </div>

                          {accForm.loanFrequency === "quincenal" ? (
                            <div className="grid grid-cols-2 gap-2">
                              <div>
                                <label className="text-[9px] font-bold uppercase tracking-wider text-slate-400 block mb-1">1er Día de Pago</label>
                                <input 
                                  type="number" 
                                  min="1" 
                                  max="31" 
                                  placeholder="Ej. 15" 
                                  value={accForm.dueDay} 
                                  onChange={e => setAccForm({ ...accForm, dueDay: e.target.value })}
                                  className="w-full bg-[#0d1320] border border-[#1e293b] rounded-xl py-2 px-3 text-white text-xs outline-none focus:border-indigo-500"
                                />
                              </div>
                              <div>
                                <label className="text-[9px] font-bold uppercase tracking-wider text-slate-400 block mb-1">2do Día de Pago</label>
                                <input 
                                  type="number" 
                                  min="1" 
                                  max="31" 
                                  placeholder="Ej. 30" 
                                  value={accForm.dueDay2} 
                                  onChange={e => setAccForm({ ...accForm, dueDay2: e.target.value })}
                                  className="w-full bg-[#0d1320] border border-[#1e293b] rounded-xl py-2 px-3 text-white text-xs outline-none focus:border-indigo-500"
                                />
                              </div>
                            </div>
                          ) : (
                            <div>
                              <label className="text-[10px] font-bold uppercase tracking-wider text-slate-400 block mb-1">Día de Pago Mensual (1-31)</label>
                              <input 
                                type="number" 
                                min="1" 
                                max="31" 
                                placeholder="Ej. 10" 
                                value={accForm.dueDay} 
                                onChange={e => setAccForm({ ...accForm, dueDay: e.target.value })}
                                className="w-full bg-[#0d1320] border border-[#1e293b] rounded-xl py-2 px-3 text-white text-xs outline-none focus:border-indigo-500"
                              />
                            </div>
                          )}
                        </div>
                      )}

                      {/* DIA DE PAGO DIRECTO SI ES TARJETA DE CRÉDITO */}
                      {accForm.isCreditCard && (
                        <div>
                          <label className="text-[10px] font-bold uppercase tracking-wider text-slate-400 block mb-1">Día de Pago (1-31)</label>
                          <input 
                            type="number" 
                            min="1" 
                            max="31" 
                            placeholder="Ej. 10" 
                            value={accForm.dueDay} 
                            onChange={e => setAccForm({ ...accForm, dueDay: e.target.value })}
                            className="w-full bg-[#0a0f19] border border-[#1e293b] rounded-xl py-2.5 px-3 text-white text-xs focus:border-indigo-500 outline-none"
                          />
                        </div>
                      )}
                    </div>
                  )}

                  <div className="flex gap-2 pt-2">
                    <button 
                      onClick={submitAccount}
                      className="flex-1 bg-indigo-600 hover:bg-indigo-500 py-3.5 rounded-xl font-bold text-sm transition-all"
                    >
                      {editAcc ? "Guardar" : "Agregar Cuenta"}
                    </button>
                    {editAcc && (
                      <button 
                        onClick={() => { 
                          setEditAcc(null); 
                          setAccForm({ 
                            name: "", balance: "", isCreditCard: false, isLoan: false, totalLimit: "", cardDebt: "", availableLimit: "", dueDay: "", dueDay2: "", loanFrequency: "mensual" 
                          }); 
                        }}
                        className="bg-slate-700 hover:bg-slate-600 px-5 py-3.5 rounded-xl font-semibold text-sm transition-all"
                      >
                        Cancelar
                      </button>
                    )}
                  </div>
                </div>

                {/* Lista de Cuentas actualizadas */}
                <div className="space-y-2">
                  <h4 className="text-xs font-bold uppercase text-slate-400 tracking-wider">Cuentas creadas</h4>
                  {state.accounts.map(a => (
                    <div key={a.id} className="bg-[#121824] border border-[#1e293b] rounded-2xl p-4 flex items-center justify-between">
                      <div className="space-y-1">
                        <div className="font-semibold text-sm text-slate-200 flex items-center gap-1.5">
                          {a.name}
                          {a.isCreditCard && <span className="text-[9px] bg-rose-950 text-rose-300 px-2 py-0.5 rounded-full border border-rose-800/30">Crédito</span>}
                          {a.isLoan && <span className="text-[9px] bg-amber-950 text-amber-300 px-2 py-0.5 rounded-full border border-amber-800/30">Préstamo</span>}
                        </div>
                        {(a.isCreditCard || a.isLoan) ? (
                          <div className="text-xs text-slate-400 space-y-1">
                            <div>Deuda actual: <span className="text-rose-400 font-bold">{maskAmount(a.cardDebt)}</span></div>
                            
                            {/* REQUISITO: Para tarjeta de crédito, se visualiza también el disponible */}
                            {a.isCreditCard && (
                              <div>Disponible: <span className="text-emerald-400 font-bold">{maskAmount(a.availableLimit)}</span></div>
                            )}

                            {a.dueDay && (
                              <div>Día de Pago: <span className="text-indigo-400 font-bold">
                                {a.isLoan && a.loanFrequency === "quincenal" ? `Días ${a.dueDay} y ${a.dueDay2}` : `Día ${a.dueDay}`}
                              </span></div>
                            )}
                          </div>
                        ) : (
                          <div className="text-emerald-400 font-bold text-sm">{maskAmount(a.balance)}</div>
                        )}
                      </div>
                      <div className="flex gap-1">
                        <button 
                          onClick={() => { 
                            setEditAcc(a); 
                            setAccForm({ 
                              name: a.name, 
                              balance: a.balance || "", 
                              isCreditCard: !!a.isCreditCard,
                              isLoan: !!a.isLoan,
                              totalLimit: a.totalLimit || "",
                              cardDebt: a.cardDebt || "",
                              availableLimit: a.availableLimit || "",
                              dueDay: a.dueDay || "",
                              dueDay2: a.dueDay2 || "",
                              loanFrequency: a.loanFrequency || "mensual"
                            }); 
                          }}
                          className="p-2.5 bg-blue-500/10 hover:bg-blue-500/20 rounded-xl text-blue-400 text-sm transition-all"
                        >
                          ✏️
                        </button>
                        <button 
                          onClick={() => setDeleteAccId(a.id)}
                          className="p-2.5 bg-rose-500/10 hover:bg-rose-500/20 rounded-xl text-rose-400 text-sm transition-all"
                        >
                          🗑️
                        </button>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* PANTALLA: CALENDARIO DE PAGOS (REDISENO CON CLASIFICACION DE CICLOS) */}
            {screen === "payments" && (() => {
              const billAccounts = state.accounts.filter(a => (a.isCreditCard || a.isLoan) && a.dueDay);
              
              // Clasificar en deudas pendientes y completadas de manera dinámica para cada ciclo calculado
              const pendingBills = [];
              const paidBills = [];

              billAccounts.forEach(a => {
                const payInfo = getNextPaymentInfo(a);
                if (payInfo) {
                  if (parseFloat(a.cardDebt) <= 0 || payInfo.isPaid) {
                    paidBills.push({ ...a, payInfo });
                  } else {
                    pendingBills.push({ ...a, payInfo });
                  }
                }
              });

              // Ordenar deudas pendientes de menor a mayor días restantes
              pendingBills.sort((a, b) => a.payInfo.daysLeft - b.payInfo.daysLeft);

              return (
                <div className="p-4 space-y-6">
                  <div className="bg-[#121824] border border-[#1e293b] rounded-3xl p-6 space-y-5">
                    <div className="flex items-center gap-2 mb-2">
                      <span className="text-2xl">📅</span>
                      <div>
                        <h3 className="font-extrabold text-base text-slate-200">Próximos Vencimientos</h3>
                        <p className="text-xs text-slate-400 mt-0.5">Control inteligente para tus deudas recurrentes</p>
                      </div>
                    </div>

                    {/* SECCIÓN: PENDIENTES DE PAGO */}
                    <div className="space-y-3">
                      <h4 className="text-xs font-bold uppercase tracking-wider text-rose-400 flex items-center gap-1.5 mb-1">
                        <span className="w-2 h-2 rounded-full bg-rose-500 animate-ping" />
                        Pendientes este Ciclo ({pendingBills.length})
                      </h4>
                      
                      {pendingBills.map(a => {
                        const daysLeft = a.payInfo.daysLeft;
                        const isAlert = daysLeft !== null && daysLeft <= 5;
                        
                        return (
                          <div 
                            key={a.id} 
                            className={`p-4 rounded-2xl border transition-all ${
                              isAlert 
                                ? "bg-rose-950/20 border-rose-500/40 text-rose-200" 
                                : "bg-[#0b0f19] border-[#1e293b]"
                            }`}
                          >
                            <div className="flex justify-between items-start">
                              <div>
                                <span className="font-bold text-sm block text-slate-200">{a.name}</span>
                                <span className="text-xs text-slate-400 block mt-0.5">
                                  {a.isCreditCard ? "Tarjeta de Crédito" : `Amortización Préstamo (${a.loanFrequency})`} • Próximo Pago: {a.payInfo.dueDate}
                                </span>
                              </div>
                              <div className="text-right">
                                {daysLeft === 0 ? (
                                  <span className="bg-rose-600 text-white text-[10px] font-extrabold uppercase px-2 py-0.5 rounded-full animate-soft-pulse">¡Hoy!</span>
                                ) : daysLeft < 0 ? (
                                  <span className="bg-red-700 text-white text-[10px] font-extrabold px-2 py-0.5 rounded-full">Vencido ({Math.abs(daysLeft)}d)</span>
                                ) : daysLeft <= 5 ? (
                                  <span className="bg-rose-500/20 text-rose-300 text-[10px] font-bold px-2.5 py-0.5 rounded-full border border-rose-500/30 animate-soft-pulse">Vence en {daysLeft} d</span>
                                ) : (
                                  <span className="bg-slate-800 text-slate-400 text-[10px] font-medium px-2.5 py-0.5 rounded-full">Faltan {daysLeft} d</span>
                                )}
                              </div>
                            </div>

                            <div className="flex justify-between items-end mt-4 pt-3 border-t border-slate-800/40">
                              <div>
                                <span className="text-[10px] text-slate-500 uppercase font-semibold">Monto de Deuda</span>
                                <span className="text-sm font-extrabold block text-rose-400">{maskAmount(a.cardDebt)}</span>
                              </div>
                              <div className="flex gap-2">
                                {/* Botón para marcar manualmente como pagado en este ciclo */}
                                <button 
                                  onClick={() => toggleAccountPaymentStatus(a.id)}
                                  className="bg-emerald-600/20 hover:bg-emerald-600/30 text-emerald-400 border border-emerald-500/30 text-[10px] font-bold px-3 py-2 rounded-xl transition-all"
                                  title="Marcar ciclo actual como liquidado"
                                >
                                  ✓ Listo
                                </button>
                                <button 
                                  onClick={() => {
                                    setTrfForm({
                                      fromId: state.accounts.find(x => !x.isCreditCard && !x.isLoan)?.id || "",
                                      toId: a.id,
                                      amount: a.cardDebt.toString(),
                                      date: TODAY()
                                    });
                                    setScreen("transfers");
                                  }}
                                  className="bg-indigo-600/20 hover:bg-indigo-500/30 text-indigo-400 border border-indigo-500/30 text-[10px] font-bold px-3 py-2 rounded-xl transition-all"
                                >
                                  Abonar Deuda
                                </button>
                              </div>
                            </div>
                          </div>
                        );
                      })}

                      {pendingBills.length === 0 && (
                        <div className="text-center text-slate-500 py-6 bg-[#0b0f19] rounded-2xl border border-dashed border-slate-800">
                          <span className="text-2xl block mb-1">🎉</span>
                          <p className="text-xs">¡Felicidades! No tienes cobros o vencimientos activos pendientes para este ciclo.</p>
                        </div>
                      )}
                    </div>

                    {/* SECCIÓN: COMPLETADOS / LIQUIDADOS */}
                    <div className="space-y-2 pt-2 border-t border-slate-800/40">
                      <h4 className="text-xs font-bold uppercase tracking-wider text-emerald-400 mb-2">
                        Ciclos Pagados / Al Corriente ({paidBills.length})
                      </h4>
                      
                      {paidBills.map(a => (
                        <div 
                          key={a.id} 
                          className="p-3.5 rounded-2xl border border-slate-800/60 bg-[#0b0f19]/40 text-slate-400 flex justify-between items-center transition-all hover:bg-[#0b0f19]/60"
                        >
                          <div>
                            <span className="font-bold text-xs block text-slate-300">{a.name}</span>
                            <span className="text-[10px] text-slate-500 block mt-0.5">
                              {parseFloat(a.cardDebt) <= 0 
                                ? "Sin deuda activa" 
                                : `Pagado (Deuda remanente: ${fmt(a.cardDebt)})`
                              }
                            </span>
                          </div>
                          
                          <div className="flex items-center gap-2">
                            <span className="bg-emerald-500/10 text-emerald-400 text-[10px] font-extrabold px-2.5 py-1 rounded-full border border-emerald-500/20">
                              ✓ Al corriente
                            </span>
                            {a.lastPaidCycle && (
                              <button 
                                onClick={() => toggleAccountPaymentStatus(a.id)}
                                className="text-xs text-rose-400 hover:text-rose-300 p-1 bg-rose-500/10 rounded-lg hover:bg-rose-500/20 transition-all"
                                title="Desmarcar pago del ciclo"
                              >
                                ↩️
                              </button>
                            )}
                          </div>
                        </div>
                      ))}
                    </div>

                  </div>
                </div>
              );
            })()}

            {/* PANTALLA: PRESUPUESTOS Y GASTOS RECURRENTES */}
            {screen === "budgets" && (
              <div className="p-4 space-y-6">
                
                {/* CONFIGURACIÓN DE LÍMITES POR CATEGORÍA */}
                <div className="bg-[#121824] border border-[#1e293b] rounded-3xl p-6 space-y-4">
                  <h3 className="font-bold text-sm uppercase text-slate-400 tracking-wider">📊 Presupuesto por Categoría</h3>
                  
                  <div className="grid grid-cols-2 gap-2">
                    <select 
                      value={budgetInput.categoryId}
                      onChange={e => setBudgetInput({ ...budgetInput, categoryId: e.target.value })}
                      className="bg-[#0a0f19] border border-[#1e293b] rounded-xl py-2.5 px-3 text-xs text-white outline-none focus:border-indigo-500"
                    >
                      <option value="">Categoría</option>
                      {state.categories.filter(c => c.type === "expense").map(c => (
                        <option key={c.id} value={c.id}>{c.name}</option>
                      ))}
                    </select>
                    
                    <input 
                      type="number"
                      placeholder="Límite $"
                      value={budgetInput.limit}
                      onChange={e => setBudgetInput({ ...budgetInput, limit: e.target.value })}
                      className="bg-[#0a0f19] border border-[#1e293b] rounded-xl py-2.5 px-3 text-xs text-white outline-none focus:border-indigo-500"
                    />
                  </div>

                  <button 
                    onClick={saveBudgetLimit}
                    className="w-full bg-indigo-600 hover:bg-indigo-500 text-xs font-bold py-3 rounded-xl transition-all"
                  >
                    Establecer Límite
                  </button>

                  {/* Listado y Progreso */}
                  <div className="space-y-4 pt-2">
                    {budgetProgress.map(b => (
                      <div key={b.categoryId} className="bg-[#0b0f19] p-4 rounded-2xl border border-[#1e293b] space-y-2">
                        <div className="flex justify-between items-center text-xs">
                          <span className="font-bold text-slate-200">{b.categoryName}</span>
                          <span className="text-slate-400">
                            {maskAmount(b.spent)} / <strong className="text-indigo-400">{maskAmount(b.limit)}</strong>
                          </span>
                        </div>
                        {/* Barra de Progreso */}
                        <div className="w-full bg-slate-800 rounded-full h-2 overflow-hidden">
                          <div 
                            className={`h-full rounded-full transition-all duration-500 ${
                              b.pct >= 90 ? "bg-rose-500" : b.pct >= 70 ? "bg-amber-500" : "bg-emerald-500"
                            }`}
                            style={{ width: `${b.pct}%` }}
                          />
                        </div>
                        <div className="flex justify-between items-center">
                          <span className="text-[10px] text-slate-500">Consumido: {b.pct.toFixed(0)}%</span>
                          <button 
                            onClick={() => removeBudget(b.categoryId)}
                            className="text-[10px] text-rose-400 hover:underline"
                          >
                            Eliminar
                          </button>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>

                {/* GASTOS RECURRENTES */}
                <div className="bg-[#121824] border border-[#1e293b] rounded-3xl p-6 space-y-4">
                  <h3 className="font-bold text-sm uppercase text-slate-400 tracking-wider">🔄 Gastos Recurrentes</h3>
                  <p className="text-xs text-slate-400">Crea plantillas para registrar gastos recurrentes en 1 clic.</p>

                  <div className="space-y-2">
                    <input 
                      type="text"
                      placeholder="Nombre del Gasto (Ej. Netflix)"
                      value={recurrentForm.name}
                      onChange={e => setRecurrentForm({ ...recurrentForm, name: e.target.value })}
                      className="w-full bg-[#0a0f19] border border-[#1e293b] rounded-xl py-2.5 px-3 text-xs text-white outline-none"
                    />

                    <div className="grid grid-cols-2 gap-2">
                      <select 
                        value={recurrentForm.categoryId}
                        onChange={e => setRecurrentForm({ ...recurrentForm, categoryId: e.target.value })}
                        className="bg-[#0a0f19] border border-[#1e293b] rounded-xl py-2.5 px-3 text-xs text-white outline-none"
                      >
                        <option value="">Categoría</option>
                        {state.categories.filter(c => c.type === "expense").map(c => (
                          <option key={c.id} value={c.id}>{c.name}</option>
                        ))}
                      </select>

                      <select 
                        value={recurrentForm.accountId}
                        onChange={e => setRecurrentForm({ ...recurrentForm, accountId: e.target.value })}
                        className="bg-[#0a0f19] border border-[#1e293b] rounded-xl py-2.5 px-3 text-xs text-white outline-none"
                      >
                        <option value="">Cuenta</option>
                        {state.accounts.map(a => (
                          <option key={a.id} value={a.id}>{a.name}</option>
                        ))}
                      </select>
                    </div>

                    <input 
                      type="number"
                      placeholder="Monto $"
                      value={recurrentForm.amount}
                      onChange={e => setRecurrentForm({ ...recurrentForm, amount: e.target.value })}
                      className="w-full bg-[#0a0f19] border border-[#1e293b] rounded-xl py-2.5 px-3 text-xs text-white outline-none"
                    />
                  </div>

                  <button 
                    onClick={saveRecurrent}
                    className="w-full bg-indigo-600 hover:bg-indigo-500 text-xs font-bold py-3 rounded-xl transition-all"
                  >
                    Guardar Gasto Recurrente
                  </button>

                  <div className="space-y-2 pt-2">
                    {(state.recurrentExpenses || []).map(r => (
                      <div key={r.id} className="bg-[#0b0f19] p-4 rounded-2xl border border-[#1e293b] flex justify-between items-center">
                        <div>
                          <span className="font-bold text-xs block text-slate-200">{r.name}</span>
                          <span className="text-[10px] text-slate-400">
                            {state.categories.find(c => c.id === r.categoryId)?.name || "Gasto"} • {maskAmount(r.amount)}
                          </span>
                        </div>
                        <div className="flex gap-2">
                          <button 
                            onClick={() => applyRecurrentExpense(r)}
                            className="bg-emerald-600/10 hover:bg-emerald-600/20 text-emerald-400 border border-emerald-500/20 text-[10px] font-bold px-3 py-1.5 rounded-lg"
                          >
                            Aplicar
                          </button>
                          <button 
                            onClick={() => removeRecurrent(r.id)}
                            className="text-xs text-rose-400 p-1"
                          >
                            ✕
                          </button>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>

              </div>
            )}

            {/* PANTALLA: SEGURIDAD Y CONFIGURACIÓN DE NIP */}
            {screen === "lock_settings" && (
              <div className="p-4">
                <div className="bg-[#121824] border border-[#1e293b] rounded-3xl p-6 text-center space-y-4">
                  <span className="text-4xl block mb-2">🔒</span>
                  <h3 className="font-extrabold text-lg text-slate-200">Seguridad por NIP</h3>
                  <p className="text-xs text-slate-400 leading-relaxed">
                    Configura un NIP numérico de 4 dígitos para proteger el acceso a tus finanzas cuando la app esté minimizada o inactiva.
                  </p>

                  <div className="p-4 rounded-2xl bg-[#0b0f19] border border-[#1e293b] text-left">
                    <span className="text-xs font-semibold block text-slate-300">Estado de Seguridad:</span>
                    <span className="text-xs font-bold text-emerald-400 block mt-1">
                      {state.nip ? "✓ Activado con NIP de 4 dígitos" : "❌ Sin configurar / Desactivado"}
                    </span>
                  </div>

                  <div className="space-y-3">
                    <input 
                      type="password"
                      maxLength="4"
                      placeholder="Nuevo NIP (4 números)"
                      value={newNip}
                      onChange={e => setNewNip(e.target.value.replace(/\D/g, ''))}
                      className="w-full bg-[#0a0f19] border border-[#1e293b] rounded-xl py-3 px-4 text-center text-lg font-bold text-white tracking-widest outline-none focus:border-indigo-500"
                    />

                    <div className="flex gap-2">
                      <button 
                        onClick={handleSaveNip}
                        className="flex-1 bg-indigo-600 hover:bg-indigo-500 text-xs font-bold py-3 rounded-xl transition-all"
                      >
                        {state.nip ? "Cambiar NIP" : "Activar NIP"}
                      </button>
                      {state.nip && (
                        <button 
                          onClick={handleRemoveNip}
                          className="bg-rose-600/10 hover:bg-rose-600/20 text-rose-400 border border-rose-500/20 text-xs font-bold px-4 rounded-xl transition-all"
                        >
                          Desactivar
                        </button>
                      )}
                    </div>
                  </div>
                </div>
              </div>
            )}

            {/* PANTALLA: CORTES DE PERÍODO */}
            {screen === "period" && (
              <div className="p-4">
                <div className="bg-[#121824] border border-[#1e293b] rounded-3xl p-6 text-center space-y-4">
                  <div className="text-5xl my-4">📅</div>
                  <h2 className="font-extrabold text-xl text-slate-200">Corte de Período</h2>
                  
                  <p className="text-sm text-slate-400 leading-relaxed">
                    Esto guardará y archivará todos los movimientos registrados para comenzar tu contabilidad de presupuesto limpia.
                  </p>

                  <div className="bg-[#0b0f19] p-4 rounded-2xl border border-[#1e293b] text-left space-y-3">
                    <span className="text-xs font-bold uppercase text-indigo-400 tracking-wider block">Frecuencia del Corte:</span>
                    
                    <div className="grid grid-cols-2 gap-2">
                      <button 
                        onClick={() => setPeriodType("quincenal")}
                        className={`py-2 px-3 rounded-xl border text-xs font-bold transition-all text-center ${
                          periodType === "quincenal" 
                            ? "bg-indigo-600/20 text-indigo-400 border-indigo-500/40" 
                            : "border-slate-800 text-slate-400 hover:bg-slate-900"
                        }`}
                      >
                        Quincenal
                      </button>
                      <button 
                        onClick={() => setPeriodType("mensual")}
                        className={`py-2 px-3 rounded-xl border text-xs font-bold transition-all text-center ${
                          periodType === "mensual" 
                            ? "bg-indigo-600/20 text-indigo-400 border-indigo-500/40" 
                            : "border-slate-800 text-slate-400 hover:bg-slate-900"
                        }`}
                      >
                        Mensual
                      </button>
                    </div>

                    <p className="text-[11px] text-slate-500 leading-relaxed pt-1">
                      {periodType === "quincenal" 
                        ? "Ideal si cobras por quincena. Archivará la quincena en curso y tus saldos actuales se mantendrán para la segunda mitad o inicio." 
                        : "Cierre de mes completo. Mantendrá tus saldos iniciales intactos pero reiniciará tus transacciones del mes a cero."
                      }
                    </p>
                  </div>

                  <div className="bg-amber-500/10 border border-amber-500/20 text-amber-300 text-left p-4 rounded-2xl space-y-1">
                    <div className="text-xs font-bold uppercase">Estado actual a archivar:</div>

                      onClick={() => setPeriodConfirm(true)}
                      className="w-full bg-amber-600 hover:bg-amber-500 text-white font-bold py-4 rounded-xl transition-all shadow-lg"

                    <div className="space-y-3 pt-2">

                        <button 
                          onClick={doPeriodCut}
                          className="flex-1 bg-rose-600 hover:bg-rose-500 text-white py-3.5 rounded-xl font-bold text-xs uppercase"
                        >
                          Sí, realizar corte
                        </button>
                        <button 
                          onClick={() => setPeriodConfirm(false)}
                          className="bg-slate-700 hover:bg-slate-600 text-slate-300 px-6 py-3.5 rounded-xl font-semibold text-xs"
                        >
                          Cancelar
                        </button>
                      </div>

                </div>
              </div>

                      <span className="absolute left-4 top-1/2 -translate-y-1/2 text-lg font-bold text-slate-500">$</span>
                      <input 
                        type="number" 
                        placeholder="0.00" 
                        step="0.01"
                        value={form.amount} 
                        onChange={e => setForm({ ...form, amount: e.target.value })}

                  </div>

                    <label className="text-xs font-bold uppercase tracking-wider text-slate-400 block mb-1">Cuenta origen *</label>

                      <option value="">— Selecciona una cuenta —</option>

                        <option key={a.id} value={a.id}>{a.name} ({a.isCreditCard ? `Deuda: ${fmt(a.cardDebt)}` : a.isLoan ? `Deuda: ${fmt(a.cardDebt)}` : fmt(a.balance)})</option>

                  </div>

                    <label className="text-xs font-bold uppercase tracking-wider text-slate-400 block mb-1">Categoría *</label>
                    <select 
                      value={form.categoryId} 
                      onChange={e => setForm({ ...form, categoryId: e.target.value })}

                      placeholder="Ej. Compra de despensa semanal" 
                      value={form.note} 
                      onChange={e => setForm({ ...form, note: e.target.value })}

                  </div>

                  <div>
                    <label className="text-xs font-bold uppercase tracking-wider text-slate-400 block mb-1">Fecha</label>
                    <input 
                      type="date" 
                      value={form.date} 
                      onChange={e => setForm({ ...form, date: e.target.value })}

                    />
                  </div>

                  <button 
                    onClick={submitTransaction}
                    className={`w-full font-bold py-4 rounded-xl mt-4 transition-all shadow-lg text-sm uppercase tracking-wider ${
                      formType === "income" 
                        ? "bg-emerald-600 hover:bg-emerald-500 text-white" 
                        : "bg-rose-600 hover:bg-rose-500 text-white"
                    }`}
                  >
                    {formType === "income" ? "✓ Registrar Ingreso" : "✓ Registrar Egreso"}
                  </button>
                </div>
              </div>
            )}

            {/* PANTALLA: CATEGORÍAS */}
            {screen === "categories" && (
              <div className="p-4 space-y-6">
                <div className="bg-[#121824] border border-[#1e293b] rounded-3xl p-6 space-y-4">
