<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Cartera Pro - Control Financiero</title>
  
  <!-- Tailwind CSS para diseño ultra-moderno -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- React & Babel para ejecución directa -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Configuración estricta de Babel para forzar el motor clásico sin módulos -->
  <script>
    Babel.registerPreset('react-classic', {
      presets: [
        [Babel.availablePresets['react'], { runtime: 'classic' }]
      ]
    });
  </script>

  <!-- Google API e Identity Services para la Sincronización con Drive -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://apis.google.com/js/api.js" async defer></script>

  <style>
    /* Estilo para barra de scroll personalizada y suavizado */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #0f172a; 
    }
    ::-webkit-scrollbar-thumb {
      background: #334155; 
      border-radius: 999px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #475569; 
    }
    @keyframes slide-up {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }
    .animate-slide-up {
      animation: slide-up 0.3s ease-out;
    }
    .no-print {
      -webkit-print-color-adjust: exact;
    }
    @media print {
      body { background-color: white !important; color: black !important; }
      .no-print { display: none !important; }
      .bg-\[\#1e293b\] { background-color: #f1f5f9 !important; border: 1px solid #cbd5e1 !important; color: black !important; }
      .text-slate-400 { color: #475569 !important; }
    }
  </style>
</head>
<body class="bg-[#0b0f19] text-[#f1f5f9] font-sans antialiased">
  <div id="root"></div>

  <script type="text/babel" data-presets="react-classic,env">
    const { useState, useEffect, useRef, useMemo } = React;

    // --- ICONOS INLINE SVG ---
    const IconPlus = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>;
    const IconMinus = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line></svg>;
    const IconTransfer = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17" y1="3" x2="21" y2="7"></path><path d="M21" y1="7" x2="17" y2="11"></path><path d="M3" y1="7" x2="21" y2="7"></path><path d="M7" y1="21" x2="3" y2="17"></path><path d="M3" y1="17" x2="7" y2="13"></path><path d="M21" y1="17" x2="3" y2="17"></path></svg>;
    const IconX = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>;
    const IconTrash = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>;
    const IconEdit = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>;

    // --- ESTADO INICIAL COMPLETO ---
    const initialState = {
      accounts: [
        { id: "1", name: "Efectivo", balance: 1000 },
        { id: "2", name: "Tarjeta de Débito", balance: 5000 },
        { id: "3", name: "Tarjeta de Crédito", balance: 0, isCreditCard: true, cardDebt: 2000, availableLimit: 8000, creditLimit: 10000, cutoffDay: 15, paymentDay: 5 }
      ],
      categories: [
        { id: "1", name: "Alimentos", type: "expense", color: "#f87171", icon: "🍔" },
        { id: "2", name: "Transporte", type: "expense", color: "#fb923c", icon: "🚌" },
        { id: "3", name: "Servicios", type: "expense", color: "#60a5fa", icon: "💡" },
        { id: "4", name: "Sueldo", type: "income", color: "#4ade80", icon: "💰" },
        { id: "5", name: "Ventas", type: "income", color: "#2dd4bf", icon: "🏷️" },
        { id: "6", name: "Transferencia", type: "transfer", color: "#a78bfa", icon: "🔄" },
        { id: "7", name: "Pago de Tarjeta", type: "payment", color: "#facc15", icon: "💳" },
        { id: "8", name: "Suscripciones", type: "expense", color: "#e879f9", icon: "📺" }
      ],
      transactions: [],
      budgets: { "1": 3000, "2": 1000 }, // Presupuesto mensual por categoría
      scheduledPayments: [ // Pagos programados recurrentes
        { id: "sp1", title: "Netflix", amount: 200, categoryId: "8", dayOfMonth: 15, isActive: true },
        { id: "sp2", title: "Luz", amount: 500, categoryId: "3", dayOfMonth: 2, isActive: true }
      ],
      archivedPeriods: [], // Guardar resúmenes de meses anteriores al hacer "Corte"
      currentPeriodStart: new Date().toISOString().split("T")[0],
      cloudSettings: {
        clientId: "", 
        apiKey: "",   
        folderId: ""  
      },
      nip: "1234" // NIP por defecto
    };

    const TODAY = () => new Date().toISOString().split("T")[0];
    function fmt(n) { return new Intl.NumberFormat("es-MX", { style: "currency", currency: "MXN" }).format(n || 0); }

    function App() {
      // --- CARGA Y GUARDADO DE ESTADO ---
      const [state, setState] = useState(() => {
        try {
          const local = localStorage.getItem("expense_app_final");
          return local ? { ...initialState, ...JSON.parse(local) } : initialState;
        } catch { return initialState; }
      });

      useEffect(() => {
        localStorage.setItem("expense_app_final", JSON.stringify(state));
      }, [state]);

      // --- ESTADOS DE LA INTERFAZ ---
      const [screen, setScreen] = useState("home"); 
      const [menuOpen, setMenuOpen] = useState(false);
      const [formType, setFormType] = useState("expense"); 
      const [toast, setToast] = useState(null);
      
      // Módulo de Reset (NIP)
      const [showResetModal, setShowResetModal] = useState(false);
      const [nipAuth, setNipAuth] = useState(false);
      const [resetNipInput, setResetNipInput] = useState("");

      // --- ESTADOS DE FORMULARIOS ---
      const [form, setForm] = useState({ amount: "", accountId: state.accounts[0]?.id || "", categoryId: "", note: "", date: TODAY(), toAccountId: "" });
      const [accountForm, setAccountForm] = useState({ id: "", name: "", type: "debit", balance: "", creditLimit: "", cutoffDay: "", paymentDay: "" });
      const [showAccountModal, setShowAccountModal] = useState(false);
      
      // --- ESTADOS DE GOOGLE DRIVE API ---
      const [syncStatus, setSyncStatus] = useState("disconnected"); 
      const [gapiInited, setGapiInited] = useState(false);
      const [gisInited, setGisInited] = useState(false);
      const [tokenClient, setTokenClient] = useState(null);
      const DRIVE_FILE_NAME = "MiCarteraPro_Backup.json";
      const fileIdRef = useRef(null); 

      // --- ESTADOS DE CONSULTAS Y FILTROS ---
      const [qFilter, setQFilter] = useState({ 
        accountId: "", 
        categoryId: "", 
        dateFrom: new Date(new Date().getFullYear(), new Date().getMonth(), 1).toISOString().split("T")[0], 
        dateTo: new Date(new Date().getFullYear(), new Date().getMonth() + 1, 0).toISOString().split("T")[0],
        type: "all" 
      });

      // --- INICIALIZACIÓN DE GOOGLE API ---
      useEffect(() => {
        if (!state.cloudSettings.clientId || !state.cloudSettings.apiKey) return;

        const initGapi = () => {
          window.gapi.client.init({
            apiKey: state.cloudSettings.apiKey,
            discoveryDocs: ["https://www.googleapis.com/discovery/v1/apis/drive/v3/rest"],
          }).then(() => setGapiInited(true)).catch(err => console.error("Error GAPI", err));
        };

        if (window.gapi) {
          window.gapi.load('client', initGapi);
        }
        
        if (window.google && window.google.accounts && window.google.accounts.oauth2) {
           const tokenClientInit = window.google.accounts.oauth2.initTokenClient({
            client_id: state.cloudSettings.clientId,
            scope: 'https://www.googleapis.com/auth/drive.file',
            callback: (tokenResponse) => {
              if (tokenResponse && tokenResponse.access_token) {
                setSyncStatus("connected");
                showToast("Conectado a Google Drive", "success");
                findOrBackupFile(true); 
              }
            },
          });
          setTokenClient(tokenClientInit);
          setGisInited(true);
        }
      }, [state.cloudSettings.clientId, state.cloudSettings.apiKey]);

      // --- FUNCIONES DE SINCRONIZACIÓN ---
      function handleConnectDrive() {
        if (!state.cloudSettings.clientId) return showToast("Configura primero las credenciales", "error");
        if (tokenClient) {
          setSyncStatus("connecting");
          tokenClient.requestAccessToken({prompt: 'consent'});
        } else {
           showToast("APIs de Google no cargadas aún", "error");
        }
      }

      function handleDisconnectDrive() {
        setSyncStatus("disconnected");
        fileIdRef.current = null;
        showToast("Desconectado de Drive");
      }

      async function findOrBackupFile(isInitialConnect = false) {
        if (!window.gapi || !window.gapi.client || !window.gapi.client.drive) return;
        try {
          let query = `name='${DRIVE_FILE_NAME}' and trashed=false`;
          if (state.cloudSettings.folderId) {
             query += ` and '${state.cloudSettings.folderId}' in parents`;
          }
          const response = await window.gapi.client.drive.files.list({
            q: query,
            fields: 'files(id, name, modifiedTime)',
            spaces: 'drive',
          });
          const files = response.result.files;

          if (files && files.length > 0) {
            fileIdRef.current = files[0].id;
            if (isInitialConnect) {
              if (window.confirm(`Se encontró un respaldo en Drive (modificado: ${new Date(files[0].modifiedTime).toLocaleString()}). ¿Quieres descargar y SOBRESCRIBIR tus datos locales con este respaldo?`)) {
                downloadFromDrive();
              }
            } else {
               uploadToDrive(); 
            }
          } else {
            if (!isInitialConnect) uploadToDrive(true); 
          }
        } catch (err) {
          console.error("Error buscando archivo:", err);
          showToast("Error al buscar en Drive", "error");
        }
      }

      async function uploadToDrive(isNew = false) {
         if (!window.gapi || !window.gapi.client || !window.gapi.client.drive) return;
         setSyncStatus("syncing");
         try {
            const dataToSave = JSON.stringify(state);
            const metadata = {
              name: DRIVE_FILE_NAME,
              mimeType: 'application/json'
            };
            if (isNew && state.cloudSettings.folderId) {
              metadata.parents = [state.cloudSettings.folderId];
            }

            const form = new FormData();
            form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
            form.append('file', new Blob([dataToSave], { type: 'application/json' }));

            let request;
            if (isNew || !fileIdRef.current) {
               request = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
                  method: 'POST',
                  headers: { Authorization: 'Bearer ' + window.gapi.client.getToken().access_token },
                  body: form
               });
            } else {
               request = await fetch(`https://www.googleapis.com/upload/drive/v3/files/${fileIdRef.current}?uploadType=multipart`, {
                  method: 'PATCH',
                  headers: { Authorization: 'Bearer ' + window.gapi.client.getToken().access_token },
                  body: form
               });
            }
            
            const result = await request.json();
            if (result.id) fileIdRef.current = result.id;
            setSyncStatus("connected");
            showToast("Respaldo guardado en Drive", "success");
         } catch (err) {
            console.error("Error subiendo a Drive", err);
            setSyncStatus("connected");
            showToast("Error al subir a Drive", "error");
         }
      }

      async function downloadFromDrive() {
         if (!window.gapi || !window.gapi.client || !window.gapi.client.drive || !fileIdRef.current) return showToast("No hay archivo para descargar", "error");
         setSyncStatus("syncing");
         try {
            const response = await window.gapi.client.drive.files.get({
               fileId: fileIdRef.current,
               alt: 'media'
            });
            const driveData = response.result;
            if (driveData) {
               setState(driveData);
               setSyncStatus("connected");
               showToast("Datos restaurados desde Drive", "success");
            }
         } catch (err) {
             console.error("Error descargando", err);
             setSyncStatus("connected");
             showToast("Error al restaurar", "error");
         }
      }

      function autoSyncToDrive(newState) {
         // Función para autoguardado si lo deseas en un futuro.
      }

      // --- CÁLCULOS OPTIMIZADOS (useMemo) ---
      const filteredTransactions = useMemo(() => {
        let res = [...(state.transactions || [])];
        if (qFilter.accountId) res = res.filter(t => t.accountId === qFilter.accountId || t.toAccountId === qFilter.accountId);
        if (qFilter.categoryId) res = res.filter(t => t.categoryId === qFilter.categoryId);
        if (qFilter.dateFrom) res = res.filter(t => t.date >= qFilter.dateFrom);
        if (qFilter.dateTo) res = res.filter(t => t.date <= qFilter.dateTo);
        if (qFilter.type !== "all") res = res.filter(t => t.type === qFilter.type);
        return res;
      }, [state.transactions, qFilter]);

      const qResults = useMemo(() => filteredTransactions.sort((a, b) => b.date.localeCompare(a.date)), [filteredTransactions]);

      const qIncome = useMemo(() => qResults.filter(t => t.type === "income").reduce((s, t) => s + (t.amount || 0), 0), [qResults]);
      const qExpense = useMemo(() => qResults.filter(t => t.type === "expense").reduce((s, t) => s + (t.amount || 0), 0), [qResults]);
      
      const accountBalanceContext = useMemo(() => {
        let sum = 0;
        const accs = qFilter.accountId ? (state.accounts || []).filter(a => a.id === qFilter.accountId) : (state.accounts || []);
        accs.forEach(a => {
          if (!a.isCreditCard && !a.isLoan) sum += (parseFloat(a.balance) || 0);
          else sum -= (parseFloat(a.cardDebt) || 0);
        });
        return sum;
      }, [state.accounts, qFilter.accountId]);

      const truePeriodNetForAccounts = useMemo(() => {
        let net = 0;
        (state.transactions || []).forEach(t => {
          if (qFilter.accountId) {
            if (t.type === "transfer") {
              if (t.toAccountId === qFilter.accountId) net += parseFloat(t.amount);
              if (t.accountId === qFilter.accountId) net -= parseFloat(t.amount);
            } else {
              if (t.accountId === qFilter.accountId) {
                if (t.type === "income") net += parseFloat(t.amount);
                if (t.type === "expense") net -= parseFloat(t.amount);
              }
            }
          } else {
            if (t.type === "income") net += parseFloat(t.amount);
            if (t.type === "expense") net -= parseFloat(t.amount);
          }
        });
        return net;
      }, [state.transactions, qFilter.accountId]);

      const catForType = useMemo(() => (state.categories || []).filter(c => c.type === formType), [state.categories, formType]);

      // --- FUNCIONES DE UTILIDAD ---
      function showToast(msg, type = "success") {
        setToast({ msg, type });
        setTimeout(() => setToast(null), 3000);
      }

      function openScreen(s, type) {
        setMenuOpen(false);
        if (type) {
          setFormType(type);
          const defaultCat = (state.categories || []).find(c => c.type === type)?.id || "";
          setForm({ amount: "", accountId: state.accounts[0]?.id || "", categoryId: defaultCat, note: "", date: TODAY(), toAccountId: "" });
        }
        setScreen(s);
      } 

      // --- REGISTRO DE TRANSACCIONES ---
      function submitTransaction() {
        if (!form.amount || !form.accountId || (!form.categoryId && formType !== 'transfer' && formType !== 'payment')) {
          return showToast("Completa todos los campos requeridos", "error");
        }
        
        const amt = parseFloat(form.amount);
        if (isNaN(amt) || amt <= 0) return showToast("Monto inválido", "error");
        
        const acc = state.accounts.find(a => a.id === form.accountId);
        if (!acc) return;

        // Validaciones de saldo/límite
        if (formType === "expense" || formType === "transfer") {
          if (acc.isCreditCard) {
            if (acc.availableLimit < amt) return showToast("Límite de crédito disponible insuficiente", "error");
          } else if (acc.isLoan) {
            if (acc.availableLimit < amt) return showToast("Monto de préstamo disponible insuficiente", "error");
          } else {
             // Puedes descomentar la línea inferior si quieres evitar sobregiros de débito
             // if (acc.balance < amt) return showToast("Saldo insuficiente en esa cuenta", "error");
          }
        }

        const newTx = {
          id: Date.now().toString(),
          type: formType,
          amount: amt,
          accountId: form.accountId,
          categoryId: form.categoryId || "transfer_sys",
          note: form.note,
          date: form.date,
          accountName: acc.name,
          categoryName: formType === 'transfer' ? 'Transferencia' : (state.categories || []).find(c => c.id === form.categoryId)?.name || "Sin categoría",
          toAccountId: form.toAccountId
        };

        const newAccounts = state.accounts.map(a => {
          let updatedA = { ...a };
          // 1. Restar/Afectar la cuenta origen
          if (a.id === form.accountId) {
             if (formType === "expense" || formType === "transfer" || formType === "payment") {
                if (a.isCreditCard || a.isLoan) {
                   updatedA.cardDebt = (parseFloat(a.cardDebt) || 0) + amt;
                   updatedA.availableLimit = (parseFloat(a.availableLimit) || 0) - amt;
                   updatedA.balance = -updatedA.cardDebt;
                } else {
                   updatedA.balance -= amt;
                }
             } else if (formType === "income") {
                 if (a.isCreditCard || a.isLoan) {
                     updatedA.cardDebt = Math.max(0, (parseFloat(a.cardDebt) || 0) - amt);
                     updatedA.availableLimit = (parseFloat(a.availableLimit) || 0) + amt;
                     updatedA.balance = -updatedA.cardDebt;
                 } else {
                     updatedA.balance += amt;
                 }
             }
          }
          // 2. Sumar a la cuenta destino
          if (formType === "transfer" && a.id === form.toAccountId) {
              if (a.isCreditCard || a.isLoan) {
                   updatedA.cardDebt = Math.max(0, (parseFloat(a.cardDebt) || 0) - amt);
                   updatedA.availableLimit = (parseFloat(a.availableLimit) || 0) + amt;
                   updatedA.balance = -updatedA.cardDebt;
              } else {
                   updatedA.balance += amt;
              }
          }
          if (formType === "payment" && a.id === form.toAccountId) {
               if (a.isCreditCard || a.isLoan) {
                   updatedA.cardDebt = Math.max(0, (parseFloat(a.cardDebt) || 0) - amt);
                   updatedA.availableLimit = (parseFloat(a.availableLimit) || 0) + amt;
                   updatedA.balance = -updatedA.cardDebt;
               }
          }

          return updatedA;
        });

        const updatedState = { ...state, transactions: [...state.transactions, newTx], accounts: newAccounts };
        setState(updatedState);
        showToast(formType === "income" ? "¡Ingreso registrado!" : formType === "expense" ? "¡Gasto registrado!" : "¡Transferencia/Pago registrado!");
        setScreen("home");
        
        autoSyncToDrive(updatedState);
      }

      function handleDeleteTx(id) {
         if(!window.confirm("¿Eliminar este movimiento y revertir el saldo?")) return;
         
         const tx = state.transactions.find(t => t.id === id);
         if (!tx) return;

         const newAccounts = state.accounts.map(a => {
            let updatedA = { ...a };
            // Revertir en cuenta origen
            if (a.id === tx.accountId) {
               if (tx.type === "expense" || tx.type === "transfer" || tx.type === "payment") {
                   if (a.isCreditCard || a.isLoan) {
                      updatedA.cardDebt = Math.max(0, (parseFloat(a.cardDebt) || 0) - tx.amount);
                      updatedA.availableLimit = (parseFloat(a.availableLimit) || 0) + tx.amount;
                      updatedA.balance = -updatedA.cardDebt;
                   } else {
                      updatedA.balance += tx.amount;
                   }
               } else if (tx.type === "income") {
                   if (a.isCreditCard || a.isLoan) {
                      updatedA.cardDebt = (parseFloat(a.cardDebt) || 0) + tx.amount;
                      updatedA.availableLimit = (parseFloat(a.availableLimit) || 0) - tx.amount;
                      updatedA.balance = -updatedA.cardDebt;
                   } else {
                      updatedA.balance -= tx.amount;
                   }
               }
            }
            // Revertir en cuenta destino
            if ((tx.type === "transfer" || tx.type === "payment") && a.id === tx.toAccountId) {
                if (a.isCreditCard || a.isLoan) {
                   updatedA.cardDebt = (parseFloat(a.cardDebt) || 0) + tx.amount;
                   updatedA.availableLimit = (parseFloat(a.availableLimit) || 0) - tx.amount;
                   updatedA.balance = -updatedA.cardDebt;
               } else {
                   updatedA.balance -= tx.amount;
               }
            }
            return updatedA;
         });

         const newTxs = state.transactions.filter(t => t.id !== id);
         setState({ ...state, transactions: newTxs, accounts: newAccounts });
         showToast("Movimiento eliminado");
      }

      // --- MÓDULO DE RESET DE PERÍODO ---
      function handleResetPeriod() {
        if (resetNipInput !== state.nip) {
          alert("NIP Incorrecto");
          return;
        }
        const periodSummary = {
           date: TODAY(),
           label: "Corte manual",
           income: qIncome,
           expense: qExpense,
           net: qIncome - qExpense,
           accountBalances: state.accounts.map(a => ({ name: a.name, balance: a.balance, debt: a.cardDebt }))
        };

        const updatedState = {
          ...state,
          transactions: [], // Borra historial
          currentPeriodStart: TODAY(),
          archivedPeriods: [...state.archivedPeriods, periodSummary]
        };
        // Las cuentas NO se tocan, mantienen su saldo.
        setState(updatedState);
        setShowResetModal(false);
        setNipAuth(false);
        setResetNipInput("");
        alert("Período reiniciado. Se borró el historial de movimientos pero se preservaron los saldos de las cuentas.");
        autoSyncToDrive(updatedState);
      }

      // --- RENDERIZADO PRINCIPAL ---
      return (
        <div className="min-h-screen bg-[#0e1320] text-[#f1f5f9] max-w-md mx-auto relative border-x border-[#1e293b] pb-24 shadow-2xl">
          
          {/* TOAST NOTIFICACIONES */}
          {toast && (

                <div className="space-y-3">
                   {state.accounts.map(a => (
                      <div key={a.id} className="bg-[#121824] p-5 rounded-3xl border border-slate-800 relative overflow-hidden group">
                         {a.isCreditCard && <div className="absolute top-0 right-0 bg-amber-500/20 text-amber-500 text-[9px] font-bold px-3 py-1 rounded-bl-xl uppercase tracking-wider">Crédito</div>}
                         {a.isLoan && <div className="absolute top-0 right-0 bg-purple-500/20 text-purple-400 text-[9px] font-bold px-3 py-1 rounded-bl-xl uppercase tracking-wider">Préstamo</div>}
                         
                         <div className="flex justify-between items-start mb-2">
                            <div>
                               <h3 className="font-bold text-lg text-slate-100">{a.name}</h3>
                               <p className="text-xs text-slate-500">{a.isCreditCard ? 'Tarjeta de Crédito' : a.isLoan ? 'Préstamo/Deuda' : 'Efectivo / Débito'}</p>
                            </div>
                            <button onClick={() => { setAccountForm({...a, type: a.isCreditCard ? 'credit' : a.isLoan ? 'loan' : 'debit'}); setShowAccountModal(true); }} className="text-slate-500 hover:text-indigo-400 p-2"><IconEdit /></button>
                         </div>

                         {a.isCreditCard || a.isLoan ? (
                            <div className="mt-4 bg-slate-900/50 p-3 rounded-xl border border-slate-800/50">
                               <div className="flex justify-between mb-1">
                                  <span className="text-xs text-slate-400">Deuda Actual</span>
                                  <span className="font-bold text-amber-400">{fmt(a.cardDebt)}</span>
                               </div>
                               <div className="w-full bg-slate-800 rounded-full h-1.5 mb-3">
                                  <div className="bg-amber-500 h-1.5 rounded-full" style={{ width: `${Math.min(100, ((a.cardDebt || 0) / (a.creditLimit || 1)) * 100)}%` }}></div>
                               </div>
                               <div className="flex justify-between text-[10px] text-slate-500">
                                  <span>Límite: {fmt(a.creditLimit)}</span>
                                  <span>Disponible: {fmt(a.availableLimit)}</span>
                               </div>
                               {a.cutoffDay && <div className="mt-2 pt-2 border-t border-slate-800 text-[10px] text-slate-400 flex justify-between">
                                  <span>Corte: día {a.cutoffDay}</span>
                                  <span className="text-rose-400">Pago: día {a.paymentDay}</span>
                               </div>}
                            </div>
                         ) : (
                            <div className="mt-2">
                               <span className="text-2xl font-black text-white">{fmt(a.balance)}</span>
                               <span className="text-xs text-slate-500 ml-2">Saldo a favor</span>
                            </div>
                         )}
                      </div>
                   ))}
                </div>

                {/* MODAL CREAR/EDITAR CUENTA */}
                {showAccountModal && (
                   <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
                      <div className="bg-[#121824] w-full max-w-sm rounded-3xl p-6 border border-[#1e293b]">
                         <div className="flex justify-between items-center mb-5">
                           <h3 className="font-bold text-lg">{accountForm.id ? "Editar Cuenta" : "Nueva Cuenta"}</h3>
                           <button onClick={() => setShowAccountModal(false)} className="text-slate-400 hover:text-white"><IconX /></button>
                         </div>
                         <div className="space-y-4">
                            <div>
                               <label className="text-xs text-slate-500 block mb-1">Tipo de Cuenta</label>
                               <div className="flex gap-2 bg-slate-900 p-1 rounded-xl">
                                  <button onClick={() => setAccountForm({...accountForm, type: 'debit'})} className={`flex-1 py-2 text-xs font-semibold rounded-lg transition-colors ${accountForm.type === 'debit' ? 'bg-indigo-600 text-white' : 'text-slate-400'}`}>Débito/Efec.</button>
                                  <button onClick={() => setAccountForm({...accountForm, type: 'credit'})} className={`flex-1 py-2 text-xs font-semibold rounded-lg transition-colors ${accountForm.type === 'credit' ? 'bg-amber-600 text-white' : 'text-slate-400'}`}>T. Crédito</button>
                                  <button onClick={() => setAccountForm({...accountForm, type: 'loan'})} className={`flex-1 py-2 text-xs font-semibold rounded-lg transition-colors ${accountForm.type === 'loan' ? 'bg-purple-600 text-white' : 'text-slate-400'}`}>Préstamo</button>
                               </div>
                            </div>
                            <div>
                               <label className="text-xs text-slate-500 block mb-1">Nombre</label>
                               <input type="text" className="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-white" value={accountForm.name} onChange={e => setAccountForm({...accountForm, name: e.target.value})} placeholder="Ej. BBVA Débito" />
                            </div>
                            
                            {accountForm.type === 'debit' && (
                               <div>
                                  <label className="text-xs text-slate-500 block mb-1">Saldo Inicial</label>
                                  <input type="number" className="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-white" value={accountForm.balance} onChange={e => setAccountForm({...accountForm, balance: e.target.value})} placeholder="0.00" />
                               </div>
                            )}

                            {(accountForm.type === 'credit' || accountForm.type === 'loan') && (
                               <>
                                  <div className="grid grid-cols-2 gap-3">
                                     <div>
                                        <label className="text-xs text-slate-500 block mb-1">Límite Total</label>
                                        <input type="number" className="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-white" value={accountForm.creditLimit} onChange={e => setAccountForm({...accountForm, creditLimit: e.target.value})} />
                                     </div>
                                     <div>
                                        <label className="text-xs text-slate-500 block mb-1">Deuda Inicial</label>
                                        <input type="number" className="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-white" value={accountForm.balance} onChange={e => setAccountForm({...accountForm, balance: e.target.value})} placeholder="0.00" />
                                     </div>
                                     <div>
                                        <label className="text-xs text-slate-500 block mb-1">Día de Corte</label>
                                        <input type="number" min="1" max="31" className="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-white" value={accountForm.cutoffDay} onChange={e => setAccountForm({...accountForm, cutoffDay: e.target.value})} placeholder="1-31" />
                                     </div>
                                     <div>
                                        <label className="text-xs text-slate-500 block mb-1">Día de Pago</label>
                                        <input type="number" min="1" max="31" className="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-white" value={accountForm.paymentDay} onChange={e => setAccountForm({...accountForm, paymentDay: e.target.value})} placeholder="1-31" />
                                     </div>
                                  </div>
                               </>
                            )}

                            <button onClick={() => {
                               if(!accountForm.name) return showToast("Falta nombre", "error");
                               let newAccs = [...state.accounts];
                               const isCred = accountForm.type === 'credit';
                               const isLoan = accountForm.type === 'loan';
                               const bal = parseFloat(accountForm.balance) || 0;
                               const limit = parseFloat(accountForm.creditLimit) || 0;
                               
                               const newAccData = {
                                  id: accountForm.id || Date.now().toString(),
                                  name: accountForm.name,
                                  isCreditCard: isCred,
                                  isLoan: isLoan,
                                  balance: isCred || isLoan ? -bal : bal,
                                  cardDebt: isCred || isLoan ? bal : undefined,
                                  creditLimit: isCred || isLoan ? limit : undefined,
                                  availableLimit: isCred || isLoan ? limit - bal : undefined,
                                  cutoffDay: accountForm.cutoffDay,
                                  paymentDay: accountForm.paymentDay
                               };

                               if (accountForm.id) {
                                  newAccs = newAccs.map(a => a.id === accountForm.id ? newAccData : a);
                               } else {
                                  newAccs.push(newAccData);
                               }
                               
                               const updatedState = {...state, accounts: newAccs};
                               setState(updatedState);
                               setShowAccountModal(false);
                               showToast("Cuenta guardada");
                               autoSyncToDrive(updatedState);
                            }} className="w-full py-4 bg-indigo-600 font-bold rounded-xl mt-4">Guardar Cuenta</button>
                         </div>
                      </div>
                   </div>
                )}
              </div>
            )}

            {/* PANTALLA: GOOGLE DRIVE SYNC */}
            {screen === "sync_settings" && (
              <div className="animate-slide-up space-y-6">
                <h2 className="text-xl font-bold mb-2">Respaldo en la Nube</h2>
                <p className="text-sm text-slate-400 mb-6">Sincroniza tus datos financieros directamente con tu propio Google Drive. Privado y seguro.</p>

                <div className="bg-[#121824] p-5 rounded-3xl border border-slate-800 space-y-4">
                  <h3 className="font-bold text-slate-300 text-sm uppercase tracking-wider mb-2">Credenciales (Desarrollador)</h3>
                  <div>
                    <label className="text-xs text-slate-500 mb-1 block">Client ID</label>
                    <input type="text" className="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-xs font-mono text-slate-300"
                      value={state.cloudSettings.clientId} onChange={e => setState({...state, cloudSettings: {...state.cloudSettings, clientId: e.target.value}})} placeholder="xxxx.apps.googleusercontent.com" />
                  </div>
                  <div>
                    <label className="text-xs text-slate-500 mb-1 block">API Key</label>
                    <input type="text" className="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-xs font-mono text-slate-300"
                      value={state.cloudSettings.apiKey} onChange={e => setState({...state, cloudSettings: {...state.cloudSettings, apiKey: e.target.value}})} placeholder="AIzaSy..." />
                  </div>
                </div>

                <div className="bg-[#121824] p-5 rounded-3xl border border-slate-800 text-center space-y-4">
                   <div className="w-16 h-16 mx-auto bg-slate-900 rounded-full flex items-center justify-center text-3xl">☁️</div>
                   <div>
                     <div className="font-bold text-lg">{syncStatus === 'connected' ? 'Conectado a Drive' : syncStatus === 'connecting' ? 'Conectando...' : syncStatus === 'syncing' ? 'Sincronizando...' : 'No Conectado'}</div>
                     <div className="text-xs text-slate-500 mt-1">{fileIdRef.current ? 'Respaldo activo encontrado' : 'Ningún respaldo detectado'}</div>
                   </div>

                   {syncStatus !== 'connected' && syncStatus !== 'syncing' ? (
                     <button onClick={handleConnectDrive} className="w-full py-3 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded-xl shadow-lg shadow-blue-900/50 transition-colors">
                       ⚡ Conectar Google Drive
                     </button>
                   ) : (
                     <div className="space-y-3">
                        <div className="grid grid-cols-2 gap-3">
                           <button onClick={() => uploadToDrive()} className="py-3 bg-emerald-600/20 text-emerald-500 border border-emerald-500/50 hover:bg-emerald-600/30 font-bold rounded-xl text-sm">⬆️ Forzar Subida</button>
                           <button onClick={downloadFromDrive} className="py-3 bg-amber-600/20 text-amber-500 border border-amber-500/50 hover:bg-amber-600/30 font-bold rounded-xl text-sm">⬇️ Restaurar</button>
                        </div>
                        <button onClick={handleDisconnectDrive} className="w-full py-3 bg-slate-800 hover:bg-slate-700 text-slate-300 font-bold rounded-xl border border-slate-700 text-sm">
                          Desconectar
                        </button>
                     </div>
                   )}
                </div>
              </div>
            )}

            {/* PANTALLA: PAGOS PROGRAMADOS */}
            {screen === "payments" && (
               <div className="animate-slide-up space-y-6">
                <div className="flex justify-between items-center mb-4">
                  <h2 className="text-xl font-bold">Calendario de Pagos</h2>
                </div>
                <div className="bg-[#121824] p-8 rounded-3xl border border-slate-800 text-center">
                   <div className="text-4xl mb-4">📅</div>
                   <h3 className="font-bold text-lg mb-2">Módulo en Construcción</h3>
                   <p className="text-sm text-slate-400">Aquí podrás ver tus suscripciones y pagos recurrentes agendados.</p>
                </div>
               </div>
            )}

          </main>

          {/* MENÚ DE NAVEGACIÓN INFERIOR */}
          <nav className="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-md bg-[#0e1320]/95 backdrop-blur-md border-t border-[#1e293b] grid grid-cols-5 py-2.5 px-2 z-40 no-print">
            {[
              { label: "Inicio", icon: "🏠", screen: "home" },
              { label: "Cuentas", icon: "💳", screen: "accounts" },
              { label: "Consultas", icon: "🔍", screen: "queries" },
              { label: "Pagos", icon: "📅", screen: "payments" },
              { label: "Nube", icon: "☁️", screen: "sync_settings" }
            ].map(tab => (
              <button 
                key={tab.screen}
                onClick={() => setScreen(tab.screen)}
                className="flex flex-col items-center justify-center transition-all active:scale-90"
              >
                <span className="text-lg">{tab.icon}</span>
                <span className={`text-[10px] font-semibold mt-0.5 ${
                  screen === tab.screen ? "text-indigo-400" : "text-[#64748b]"
                }`}>
                  {tab.label}
                </span>
              </button>
            ))}
          </nav>

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
