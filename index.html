<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Cartera Pro - Control Financiero</title>
  
  <!-- Tailwind CSS para diseño ultra-moderno -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- React & Babel para ejecución directa -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Scripts de Google API e Identity Services para la sincronización con Drive -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://apis.google.com/js/api.js" async defer></script>

  <style>
    /* Estilo para barra de scroll personalizada y suavizado */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #0f172a;
    }
    ::-webkit-scrollbar-thumb {
      background: #334155;
      border-radius: 999px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #475569;
    }
  </style>
</head>
<body class="bg-[#0b0f19] text-[#f1f5f9] font-sans antialiased">

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo } = React;

    // Estado inicial de la aplicación
    const initialState = {
      accounts: [
        { id: "1", name: "Efectivo", balance: 1000, isCreditCard: false, isLoan: false },
        { id: "2", name: "Tarjeta de Débito", balance: 5000, isCreditCard: false, isLoan: false }
      ],
      categories: [
        { id: "1", name: "Alimentos", type: "expense" },
        { id: "2", name: "Servicios", type: "expense" },
        { id: "3", name: "Sueldo", type: "income" },
        { id: "4", name: "Inversiones", type: "income" },
        { id: "5", name: "Transporte", type: "expense" }
      ],
      transactions: [],
      archivedPeriods: [],
      currentPeriodStart: new Date().toISOString().split("T")[0],
    };

    const TODAY = () => new Date().toISOString().split("T")[0];

    // Formateador de moneda MXN
    function fmt(n) {
      return new Intl.NumberFormat("es-MX", { style: "currency", currency: "MXN" }).format(n || 0);
    }

    function App() {
      // --- ESTADOS PRINCIPALES ---
      const [state, setState] = useState(() => {
        try {
          const local = localStorage.getItem("expense_app_v2");
          return local ? JSON.parse(local) : initialState;
        } catch {
          return initialState;
        }
      });

      const [screen, setScreen] = useState("home"); // home | income | expense | accounts | categories | transfers | queries | period | archive | sync_settings | help
      const [menuOpen, setMenuOpen] = useState(false);
      const [showBreakdown, setShowBreakdown] = useState(false);
      const [breakdownTab, setBreakdownTab] = useState("debit"); // debit | credit | loan
      const [toast, setToast] = useState(null);

      // --- DIÁLOGOS Y MODALES PERSONALIZADOS ---
      const [customConfirm, setCustomConfirm] = useState(null); // { title, msg, onConfirm, onCancel, confirmText, cancelText }
      const [deleteAccId, setDeleteAccId] = useState(null);

      // --- CONFIGURACIÓN DE GOOGLE DRIVE ---
      const [gdriveConfig, setGdriveConfig] = useState(() => {
        try {
          const config = localStorage.getItem("gdrive_config");
          return config ? JSON.parse(config) : { clientId: "", apiKey: "" };
        } catch {
          return { clientId: "", apiKey: "" };
        }
      });

      const [gdToken, setGdToken] = useState(null); // Access token de Google
      const [gdFileId, setGdFileId] = useState(null); // ID del archivo en Google Drive
      const [syncStatus, setSyncStatus] = useState("disconnected"); // disconnected | connecting | connected | syncing | success | error
      const [lastSyncTime, setLastSyncTime] = useState(null);

      // --- FORMULARIOS ---
      const [form, setForm] = useState({ amount: "", accountId: "", categoryId: "", note: "", date: TODAY() });
      const [formType, setFormType] = useState("expense");
      const [accForm, setAccForm] = useState({ 
        name: "", 
        balance: "", 
        isCreditCard: false, 
        isLoan: false,
        totalLimit: "", 
        cardDebt: "", 
        availableLimit: "" 
      });
      const [editAcc, setEditAcc] = useState(null);
      const [catForm, setCatForm] = useState({ name: "", type: "expense" });
      const [trfForm, setTrfForm] = useState({ fromId: "", toId: "", amount: "", date: TODAY() });
      const [qFilter, setQFilter] = useState({ categoryId: "", accountId: "", from: "", to: "" });
      const [periodConfirm, setPeriodConfirm] = useState(false);

      // Guardar en localStorage automáticamente ante cualquier cambio local
      useEffect(() => {
        localStorage.setItem("expense_app_v2", JSON.stringify(state));
      }, [state]);

      // Guardar credenciales de Google Drive
      useEffect(() => {
        localStorage.setItem("gdrive_config", JSON.stringify(gdriveConfig));
      }, [gdriveConfig]);

      // --- NOTIFICACIONES TOAST ---
      const showToast = (msg, type = "success") => {
        setToast({ msg, type });
        setTimeout(() => setToast(null), 3000);
      };

      // --- CÁLCULO DE TOTALES ---
      // Patrimonio Neto = Únicamente Cuentas de Débito y Efectivo (No se restan deudas automáticamente)
      const totalBalance = useMemo(() => {
        return state.accounts
          .filter(a => !a.isCreditCard && !a.isLoan)
          .reduce((s, a) => s + (parseFloat(a.balance) || 0), 0);
      }, [state.accounts]);

      // Deuda total acumulada en tarjetas de crédito
      const totalCreditDebt = useMemo(() => {
        return state.accounts
          .filter(a => a.isCreditCard)
          .reduce((s, a) => s + (parseFloat(a.cardDebt) || 0), 0);
      }, [state.accounts]);

      // Deuda total acumulada en préstamos
      const totalLoanDebt = useMemo(() => {
        return state.accounts
          .filter(a => a.isLoan)
          .reduce((s, a) => s + (parseFloat(a.cardDebt) || 0), 0);
      }, [state.accounts]);

      // Total disponible en tarjetas de crédito
      const totalCreditAvailable = useMemo(() => {
        return state.accounts
          .filter(a => a.isCreditCard)
          .reduce((s, a) => s + (parseFloat(a.availableLimit) || 0), 0);
      }, [state.accounts]);

      const recentTx = useMemo(() => {
        return [...state.transactions].sort((a, b) => b.date.localeCompare(a.date)).slice(0, 5);
      }, [state.transactions]);

      // --- MANEJO DE NAVEGACIÓN ---
      function openScreen(s, type) {
        setMenuOpen(false);
        if (type) {
          setFormType(type);
          const defaultCat = state.categories.find(c => c.type === type)?.id || "";
          setForm({ 
            amount: "", 
            accountId: state.accounts[0]?.id || "", 
            categoryId: defaultCat, 
            note: "", 
            date: TODAY() 
          });
        }
        setScreen(s);
      }

      // --- CONTROL DE ACCIONES ---
      function submitTransaction() {
        if (!form.amount || !form.accountId || !form.categoryId) {
          return showToast("Completa todos los campos requeridos", "error");
        }
        const amt = parseFloat(form.amount);
        if (isNaN(amt) || amt <= 0) return showToast("Monto inválido", "error");
        
        const acc = state.accounts.find(a => a.id === form.accountId);
        if (!acc) return;

        // Validaciones por tipo de cuenta
        if (acc.isCreditCard) {
          if (formType === "expense" && acc.availableLimit < amt) {
            return showToast("Límite de crédito disponible insuficiente", "error");
          }
        } else if (acc.isLoan) {
          if (formType === "expense" && acc.availableLimit < amt) {
            return showToast("Límite del préstamo o monto disponible insuficiente", "error");
          }
        } else {
          if (formType === "expense" && acc.balance < amt) {
            return showToast("Saldo insuficiente en esa cuenta", "error");
          }
        }

        const newTx = {
          id: Date.now().toString(),
          type: formType,
          amount: amt,
          accountId: form.accountId,
          categoryId: form.categoryId,
          note: form.note,
          date: form.date,
          accountName: acc.name,
          categoryName: state.categories.find(c => c.id === form.categoryId)?.name || "Sin categoría",
        };

        const newAccounts = state.accounts.map(a => {
          if (a.id === form.accountId) {
            if (a.isCreditCard || a.isLoan) {
              const newDebt = formType === "expense" ? (parseFloat(a.cardDebt) || 0) + amt : Math.max(0, (parseFloat(a.cardDebt) || 0) - amt);
              const newAvailable = formType === "expense" ? (parseFloat(a.availableLimit) || 0) - amt : (parseFloat(a.availableLimit) || 0) + amt;
              return { 
                ...a, 
                cardDebt: newDebt, 
                availableLimit: newAvailable,
                balance: -newDebt // Balance representativo negativo
              };
            } else {
              return { ...a, balance: formType === "income" ? a.balance + amt : a.balance - amt };
            }
          }
          return a;
        });

        const updatedState = { ...state, transactions: [...state.transactions, newTx], accounts: newAccounts };
        setState(updatedState);
        showToast(formType === "income" ? "¡Ingreso registrado con éxito!" : "¡Gasto registrado con éxito!");
        setScreen("home");
        
        if (syncStatus === "connected") {
          autoSyncToDrive(updatedState);
        }
      }

      function submitAccount() {
        if (!accForm.name) return showToast("Escribe un nombre para la cuenta", "error");
        
        let newAccounts;
        if (accForm.isCreditCard || accForm.isLoan) {
          const limit = parseFloat(accForm.totalLimit);
          const debt = parseFloat(accForm.cardDebt);
          const available = parseFloat(accForm.availableLimit);
          
          if (isNaN(limit) || isNaN(debt) || isNaN(available)) {
            return showToast("Completa los montos de la cuenta correctamente", "error");
          }

          const freshAccount = {
            name: accForm.name,
            isCreditCard: accForm.isCreditCard,
            isLoan: accForm.isLoan,
            totalLimit: limit,
            cardDebt: debt,
            availableLimit: available,
            balance: -debt
          };

          if (editAcc) {
            newAccounts = state.accounts.map(a =>
              a.id === editAcc.id ? { ...a, ...freshAccount } : a
            );
            setEditAcc(null);
          } else {
            newAccounts = [...state.accounts, { id: Date.now().toString(), ...freshAccount }];
          }
        } else {
          const bal = parseFloat(accForm.balance);
          if (isNaN(bal)) return showToast("Escribe un saldo válido", "error");

          if (editAcc) {
            newAccounts = state.accounts.map(a =>
              a.id === editAcc.id ? { 
                ...a, 
                name: accForm.name, 
                balance: bal, 
                isCreditCard: false,
                isLoan: false,
                totalLimit: "", cardDebt: "", availableLimit: ""
              } : a
            );
            setEditAcc(null);
          } else {
            const newAcc = { 
              id: Date.now().toString(), 
              name: accForm.name, 
              balance: bal, 
              isCreditCard: false,
              isLoan: false,
              totalLimit: "", cardDebt: "", availableLimit: ""
            };
            newAccounts = [...state.accounts, newAcc];
          }
        }

        const updatedState = { ...state, accounts: newAccounts };
        setState(updatedState);
        setAccForm({ name: "", balance: "", isCreditCard: false, isLoan: false, totalLimit: "", cardDebt: "", availableLimit: "" });
        showToast("Cuenta guardada correctamente");

        if (syncStatus === "connected") autoSyncToDrive(updatedState);
      }

      function deleteAccount(id) {
        const updatedState = {
          ...state,
          accounts: state.accounts.filter(a => a.id !== id),
          transactions: state.transactions.filter(t => t.accountId !== id),
        };
        setState(updatedState);
        showToast("Cuenta y sus movimientos eliminados", "warning");

        if (syncStatus === "connected") autoSyncToDrive(updatedState);
      }

      function submitCategory() {
        if (!catForm.name) return showToast("Escribe un nombre de categoría", "error");
        const newCat = { id: Date.now().toString(), name: catForm.name, type: catForm.type };
        
        const updatedState = { ...state, categories: [...state.categories, newCat] };
        setState(updatedState);
        setCatForm({ name: "", type: "expense" });
        showToast("Categoría agregada con éxito");

        if (syncStatus === "connected") autoSyncToDrive(updatedState);
      }

      function deleteCategory(id) {
        const updatedState = { ...state, categories: state.categories.filter(c => c.id !== id) };
        setState(updatedState);
        showToast("Categoría eliminada", "warning");

        if (syncStatus === "connected") autoSyncToDrive(updatedState);
      }

      function submitTransfer() {
        if (!trfForm.fromId || !trfForm.toId || !trfForm.amount) return showToast("Completa todos los campos", "error");
        if (trfForm.fromId === trfForm.toId) return showToast("Las cuentas deben ser diferentes", "error");
        
        const amt = parseFloat(trfForm.amount);
        if (isNaN(amt) || amt <= 0) return showToast("Monto inválido", "error");
        
        const fromAcc = state.accounts.find(a => a.id === trfForm.fromId);
        const toAcc = state.accounts.find(a => a.id === trfForm.toId);

        // Validar saldo origen
        if (fromAcc.isCreditCard || fromAcc.isLoan) {
          if (fromAcc.availableLimit < amt) return showToast("Crédito disponible insuficiente en cuenta origen", "error");
        } else {
          if (fromAcc.balance < amt) return showToast("Saldo insuficiente en cuenta origen", "error");
        }

        const newAccounts = state.accounts.map(a => {
          // Descontar del origen
          if (a.id === trfForm.fromId) {
            if (a.isCreditCard || a.isLoan) {
              const newDebt = (parseFloat(a.cardDebt) || 0) + amt;
              const newAvailable = (parseFloat(a.availableLimit) || 0) - amt;
              return { ...a, cardDebt: newDebt, availableLimit: newAvailable, balance: -newDebt };
            } else {
              return { ...a, balance: a.balance - amt };
            }
          }
          // Sumar al destino
          if (a.id === trfForm.toId) {
            if (a.isCreditCard || a.isLoan) {
              // Pagar reduce deuda y libera disponible
              const newDebt = Math.max(0, (parseFloat(a.cardDebt) || 0) - amt);
              const newAvailable = (parseFloat(a.availableLimit) || 0) + amt;
              return { ...a, cardDebt: newDebt, availableLimit: newAvailable, balance: -newDebt };
            } else {
              return { ...a, balance: a.balance + amt };
            }
          }
          return a;
        });

        const trfTx = {
          id: Date.now().toString(),
          type: "transfer",
          amount: amt,
          fromId: trfForm.fromId,
          toId: trfForm.toId,
          fromName: fromAcc.name,
          toName: toAcc.name,
          date: trfForm.date,
          note: `Transferencia: ${fromAcc.name} ➔ ${toAcc.name}`,
          accountId: trfForm.fromId,
          categoryId: "__transfer__",
          categoryName: "Transferencia",
          accountName: fromAcc.name,
        };

        const updatedState = { ...state, accounts: newAccounts, transactions: [...state.transactions, trfTx] };
        setState(updatedState);
        setTrfForm({ fromId: "", toId: "", amount: "", date: TODAY() });
        showToast("¡Transferencia realizada con éxito!");
        setScreen("home");

        if (syncStatus === "connected") autoSyncToDrive(updatedState);
      }

      function doMonthEnd() {
        const label = new Date().toLocaleDateString("es-MX", { month: "long", year: "numeric" });
        const period = {
          id: Date.now().toString(),
          label,
          start: state.currentPeriodStart,
          end: TODAY(),
          transactions: state.transactions,
          accounts: state.accounts,
        };

        const updatedState = {
          ...state,
          archivedPeriods: [...state.archivedPeriods, period],
          transactions: [],
          currentPeriodStart: TODAY(),
        };

        setState(updatedState);
        setPeriodConfirm(false);
        showToast(`Corte de ${label} archivado con éxito`);
        setScreen("home");

        if (syncStatus === "connected") autoSyncToDrive(updatedState);
      }

      // --- FILTRADO DE CONSULTAS ---
      const qResults = useMemo(() => {
        return state.transactions.filter(t => {
          if (t.type === "transfer") return false;
          if (qFilter.categoryId && t.categoryId !== qFilter.categoryId) return false;
          if (qFilter.accountId && t.accountId !== qFilter.accountId) return false;
          if (qFilter.from && t.date < qFilter.from) return false;
          if (qFilter.to && t.date > qFilter.to) return false;
          return true;
        }).sort((a, b) => b.date.localeCompare(a.date));
      }, [state.transactions, qFilter]);

      const qIncome = qResults.filter(t => t.type === "income").reduce((s, t) => s + t.amount, 0);
      const qExpense = qResults.filter(t => t.type === "expense").reduce((s, t) => s + t.amount, 0);

      const maxBal = Math.max(...state.accounts.map(a => (a.isCreditCard || a.isLoan) ? (a.totalLimit || 1) : (a.balance || 1)), 1);
      const catForType = state.categories.filter(c => c.type === formType);

      // --- EXPORTAR REPORTES ---
      const exportCSV = () => {
        if (qResults.length === 0) return showToast("No hay movimientos para exportar", "error");
        
        let csvContent = "\uFEFF"; // UTF-8 BOM para soporte correcto de acentos en Excel
        csvContent += "Fecha,Tipo,Categoría,Cuenta,Monto,Nota\n";
        
        qResults.forEach(t => {
          const row = [
            t.date,
            t.type === "income" ? "Ingreso" : "Egreso",
            t.categoryName,
            t.accountName,
            t.amount,
            `"${(t.note || "").replace(/"/g, '""')}"`
          ].join(",");
          csvContent += row + "\n";
        });

        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.setAttribute("href", url);
        link.setAttribute("download", `Reporte_Cartera_${qFilter.from || "Inicio"}_a_${qFilter.to || "Fin"}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        showToast("Reporte descargado correctamente (Excel CSV)");
      };

      const printReport = () => {
        if (qResults.length === 0) return showToast("No hay movimientos para imprimir", "error");
        
        const printWindow = window.open("", "_blank");
        const rowsHTML = qResults.map(t => `
          <tr style="border-bottom: 1px solid #e2e8f0; font-size: 13px;">
            <td style="padding: 10px; color: #475569;">${t.date}</td>
            <td style="padding: 10px; font-weight: bold; color: ${t.type === "income" ? "#10b981" : "#ef4444"}">${t.type === "income" ? "Ingreso" : "Egreso"}</td>
            <td style="padding: 10px; font-weight: 500;">${t.categoryName}</td>
            <td style="padding: 10px; color: #475569;">${t.accountName}</td>
            <td style="padding: 10px; font-weight: bold;">${fmt(t.amount)}</td>
            <td style="padding: 10px; color: #64748b; font-style: italic;">${t.note || "-"}</td>
          </tr>
        `).join("");

        printWindow.document.write(`
          <html>
            <head>
              <title>Reporte Financiero - Mi Cartera Pro</title>
              <style>
                body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; color: #1e293b; margin: 40px; }
                .header { border-bottom: 2px solid #6366f1; padding-bottom: 15px; margin-bottom: 30px; }
                .title { font-size: 24px; font-weight: 800; color: #0f172a; margin: 0; }
                .subtitle { font-size: 12px; color: #64748b; margin-top: 5px; }
                .summary { display: grid; grid-template-cols: repeat(3, 1fr); gap: 15px; margin-bottom: 30px; }
                .sum-card { background: #f8fafc; border: 1px solid #e2e8f0; padding: 15px; border-radius: 12px; }
                .sum-title { font-size: 10px; font-weight: bold; text-transform: uppercase; color: #64748b; }
                .sum-val { font-size: 18px; font-weight: 800; margin-top: 5px; }
                table { width: 100%; border-collapse: collapse; text-align: left; }
                th { background: #f1f5f9; padding: 12px 10px; font-size: 11px; font-weight: bold; text-transform: uppercase; color: #475569; border-bottom: 2px solid #cbd5e1; }
              </style>
            </head>
            <body>
              <div class="header">
                <h1 class="title">Reporte de Control Financiero</h1>
                <div class="subtitle">Generado el ${new Date().toLocaleDateString("es-MX")} | Período: ${qFilter.from || "Inicio"} al ${qFilter.to || "Fin"}</div>
              </div>
              <div class="summary">
                <div class="sum-card">
                  <div class="sum-title" style="color: #10b981;">Total Ingresos</div>
                  <div class="sum-val" style="color: #10b981;">${fmt(qIncome)}</div>
                </div>
                <div class="sum-card">
                  <div class="sum-title" style="color: #ef4444;">Total Gastos</div>
                  <div class="sum-val" style="color: #ef4444;">${fmt(qExpense)}</div>
                </div>
                <div class="sum-card">
                  <div class="sum-title" style="color: #3b82f6;">Balance Neto</div>
                  <div class="sum-val" style="color: #3b82f6;">${fmt(qIncome - qExpense)}</div>
                </div>
              </div>
              <table>
                <thead>
                  <tr>
                    <th>Fecha</th>
                    <th>Tipo</th>
                    <th>Categoría</th>
                    <th>Cuenta</th>
                    <th>Monto</th>
                    <th>Nota</th>
                  </tr>
                </thead>
                <tbody>
                  ${rowsHTML}
                </tbody>
              </table>
              <script>
                window.onload = function() { window.print(); }
              <\/script>
            </body>
          </html>
        `);
        printWindow.document.close();
      };

      // --- INTEGRACIÓN GOOGLE DRIVE API ---
      let tokenClient = useRef(null);

      useEffect(() => {
        const loadGapiAndGis = () => {
          if (typeof gapi !== 'undefined' && typeof google !== 'undefined') {
            gapi.load('client', async () => {
              await gapi.client.init({
                apiKey: gdriveConfig.apiKey,
                discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest'],
              });
            });

            if (gdriveConfig.clientId) {
              tokenClient.current = google.accounts.oauth2.initTokenClient({
                client_id: gdriveConfig.clientId,
                scope: 'https://www.googleapis.com/auth/drive.file',
                callback: async (resp) => {
                  if (resp.error) {
                    setSyncStatus("error");
                    showToast("Error en autorización de Google: " + resp.error, "error");
                    return;
                  }
                  setGdToken(resp.access_token);
                  setSyncStatus("connected");
                  showToast("¡Conectado exitosamente a Google Drive!");
                  await findOrCreateDriveFile(resp.access_token);
                },
              });
            }
          } else {
            setTimeout(loadGapiAndGis, 1000);
          }
        };
        loadGapiAndGis();
      }, [gdriveConfig]);

      const connectGoogleDrive = () => {
        if (!gdriveConfig.clientId || !gdriveConfig.apiKey) {
          setScreen("sync_settings");
          showToast("Ingresa tu Client ID y API Key de Google para conectar", "warning");
          return;
        }
        setSyncStatus("connecting");
        if (tokenClient.current) {
          tokenClient.current.requestAccessToken({ prompt: 'consent' });
        } else {
          setSyncStatus("error");
          showToast("Error al inicializar cliente de Google. Revisa tus credenciales.", "error");
        }
      };

      const disconnectGoogleDrive = () => {
        setGdToken(null);
        setGdFileId(null);
        setSyncStatus("disconnected");
        showToast("Desconectado de Google Drive", "warning");
      };

      const findOrCreateDriveFile = async (token) => {
        try {
          setSyncStatus("syncing");
          gapi.client.setToken({ access_token: token });
          
          const response = await gapi.client.drive.files.list({
            q: "name = 'mi_cartera_data.json' and trashed = false",
            fields: 'files(id, name)',
            spaces: 'drive'
          });

          const files = response.result.files;
          if (files && files.length > 0) {
            const fileId = files[0].id;
            setGdFileId(fileId);
            
            // Reemplazando window.confirm con Diálogo Personalizado
            setCustomConfirm({
              title: "Nube Detectada ☁️",
              msg: "Se encontró un respaldo financiero en tu cuenta de Google Drive.\n\n¿Quieres CARGAR los datos de la nube (reemplazará los actuales en este dispositivo) o prefieres SOBREESCRIBIR la nube con tus datos locales?",
              confirmText: "Cargar desde Nube",
              cancelText: "Sobreescribir Nube",
              onConfirm: () => {
                loadDataFromDrive(fileId);
                setCustomConfirm(null);
              },
              onCancel: () => {
                uploadDataToDrive(fileId, state);
                setCustomConfirm(null);
              }
            });
          } else {
            await createDriveFile(state);
          }
        } catch (err) {
          console.error(err);
          setSyncStatus("error");
          showToast("Error buscando el archivo en Drive", "error");
        }
      };

      const createDriveFile = async (dataToSave) => {
        try {
          setSyncStatus("syncing");
          const metadata = {
            name: 'mi_cartera_data.json',
            mimeType: 'application/json'
          };
          
          const boundary = '314159265358979323846';
          const delimiter = "\r\n--" + boundary + "\r\n";
          const close_delim = "\r\n--" + boundary + "--";

          const body =
              delimiter +
              'Content-Type: application/json\r\n\r\n' +
              JSON.stringify(metadata) +
              delimiter +
              'Content-Type: application/json\r\n\r\n' +
              JSON.stringify(dataToSave) +
              close_delim;

          const response = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
            method: 'POST',
            headers: {
              'Authorization': 'Bearer ' + gapi.client.getToken().access_token,
              'Content-Type': 'multipart/related; boundary=' + boundary
            },
            body: body
          });

          const file = await response.json();
          setGdFileId(file.id);
          setSyncStatus("connected");
          setLastSyncTime(new Date().toLocaleTimeString());
          showToast("¡Base de datos creada con éxito en Google Drive!");
        } catch (err) {
          console.error(err);
          setSyncStatus("error");
          showToast("Error creando archivo en Drive", "error");
        }
      };

      const uploadDataToDrive = async (fileId, dataToSave) => {
        try {
          setSyncStatus("syncing");
          const response = await fetch(`https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=media`, {
            method: 'PATCH',
            headers: {
              'Authorization': 'Bearer ' + gapi.client.getToken().access_token,
              'Content-Type': 'application/json'
            },
            body: JSON.stringify(dataToSave)
          });

          if (response.ok) {
            setSyncStatus("connected");
            setLastSyncTime(new Date().toLocaleTimeString());
            showToast("✓ Datos sincronizados con Google Drive");
          } else {
            throw new Error("No se pudo actualizar el archivo");
          }
        } catch (err) {
          console.error(err);
          setSyncStatus("error");
          showToast("Error de sincronización con la nube", "error");
        }
      };

      const loadDataFromDrive = async (fileId) => {
        try {
          setSyncStatus("syncing");
          const response = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, {
            headers: {
              'Authorization': 'Bearer ' + gapi.client.getToken().access_token
            }
          });
          const cloudData = await response.json();
          
          if (cloudData && cloudData.accounts) {
            setState(cloudData);
            setSyncStatus("connected");
            setLastSyncTime(new Date().toLocaleTimeString());
            showToast("✓ Datos cargados con éxito desde Google Drive");
            setScreen("home");
          } else {
            throw new Error("Formato de datos inválido en la nube");
          }
        } catch (err) {
          console.error(err);
          setSyncStatus("error");
          showToast("Error descargando datos desde Google Drive", "error");
        }
      };

      const autoSyncToDrive = async (updatedState) => {
        if (!gdFileId || !gapi.client.getToken()) return;
        try {
          await fetch(`https://www.googleapis.com/upload/drive/v3/files/${gdFileId}?uploadType=media`, {
            method: 'PATCH',
            headers: {
              'Authorization': 'Bearer ' + gapi.client.getToken().access_token,
              'Content-Type': 'application/json'
            },
            body: JSON.stringify(updatedState)
          });
          setLastSyncTime(new Date().toLocaleTimeString());
        } catch (err) {
          console.error("Auto-sync fallido:", err);
        }
      };

      // --- RESPALDO MANUAL LOCAL ---
      const exportLocalJSON = () => {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(state, null, 2));
        const downloadAnchor = document.createElement('a');
        downloadAnchor.setAttribute("href", dataStr);
        downloadAnchor.setAttribute("download", `mi_cartera_respaldo_${new Date().toISOString().split('T')[0]}.json`);
        document.body.appendChild(downloadAnchor);
        downloadAnchor.click();
        downloadAnchor.remove();
        showToast("Copia de seguridad local descargada");
      };

      const importLocalJSON = (e) => {
        const fileReader = new FileReader();
        fileReader.onload = event => {
          try {
            const importedState = JSON.parse(event.target.result);
            if (importedState.accounts && importedState.categories) {
              setState(importedState);
              showToast("Respaldo restaurado exitosamente");
              setScreen("home");
              if (syncStatus === "connected") autoSyncToDrive(importedState);
            } else {
              showToast("El archivo de respaldo no es válido", "error");
            }
          } catch {
            showToast("Error leyendo el archivo", "error");
          }
        };
        fileReader.readAsText(e.target.files[0]);
      };

      return (
        <div className="min-h-screen bg-[#0e1320] text-[#f1f5f9] flex flex-col max-w-md mx-auto relative border-x border-[#1e293b] shadow-2xl shadow-indigo-950/20">
          
          {/* TOAST SYSTEM */}
          {toast && (
            <div className={`fixed top-4 left-1/2 -translate-x-1/2 px-4 py-3 rounded-xl font-semibold z-[9999] text-sm shadow-xl flex items-center gap-2 border transition-all duration-300 transform scale-100 ${
              toast.type === "error" ? "bg-rose-950/90 text-rose-300 border-rose-500/30" : 
              toast.type === "warning" ? "bg-amber-950/90 text-amber-300 border-amber-500/30" :
              "bg-emerald-950/90 text-emerald-300 border-emerald-500/30"
            }`}>
              {toast.type === "error" ? <span className="text-rose-400">⚠️</span> : <span className="text-emerald-400">✓</span>}
              <span>{toast.msg}</span>
            </div>
          )}

          {/* CUSTOM CONFIRM DIALOG MODAL (Sustituto de confirm() nativo) */}
          {customConfirm && (
            <div className="fixed inset-0 z-[9999] flex items-center justify-center p-4 bg-black/75 backdrop-blur-sm animate-fade-in">
              <div className="bg-[#121824] border border-[#1e293b] rounded-3xl p-6 w-full max-w-sm space-y-4 shadow-2xl">
                <h4 className="font-extrabold text-lg text-indigo-400">{customConfirm.title}</h4>
                <p className="text-sm text-slate-300 whitespace-pre-wrap leading-relaxed">{customConfirm.msg}</p>
                <div className="flex gap-2.5 pt-2">
                  <button 
                    onClick={customConfirm.onConfirm}
                    className="flex-1 bg-indigo-600 hover:bg-indigo-500 py-3 rounded-xl font-bold text-xs uppercase text-white transition-all shadow-lg"
                  >
                    {customConfirm.confirmText || "Aceptar"}
                  </button>
                  <button 
                    onClick={customConfirm.onCancel}
                    className="flex-1 bg-slate-800 hover:bg-slate-700 py-3 rounded-xl font-bold text-xs uppercase text-slate-300 transition-all border border-[#1e293b]"
                  >
                    {customConfirm.cancelText || "Cancelar"}
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* DIÁLOGO CONFIRMACIÓN PARA ELIMINAR CUENTA (Sin confirm() nativo) */}
          {deleteAccId && (
            <div className="fixed inset-0 z-[9999] flex items-center justify-center p-4 bg-black/75 backdrop-blur-sm animate-fade-in">
              <div className="bg-[#121824] border border-[#1e293b] rounded-3xl p-6 w-full max-w-sm space-y-4">
                <h4 className="font-extrabold text-lg text-rose-400">¿Eliminar Cuenta?</h4>
                <p className="text-sm text-slate-300 leading-relaxed">
                  ¿Estás completamente seguro de eliminar esta cuenta? Se borrarán permanentemente todos sus movimientos asociados.
                </p>
                <div className="flex gap-2.5 pt-2">
                  <button 
                    onClick={() => {
                      deleteAccount(deleteAccId);
                      setDeleteAccId(null);
                    }}
                    className="flex-1 bg-rose-600 hover:bg-rose-500 py-3 rounded-xl font-bold text-xs uppercase text-white transition-all"
                  >
                    Eliminar
                  </button>
                  <button 
                    onClick={() => setDeleteAccId(null)}
                    className="flex-1 bg-slate-800 hover:bg-slate-700 py-3 rounded-xl font-bold text-xs uppercase text-slate-300 transition-all"
                  >
                    Conservar
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* MENÚ LATERAL DESLIZABLE */}
          {menuOpen && (
            <div className="fixed inset-0 z-50 flex">
              <div className="absolute inset-0 bg-black/60 backdrop-blur-xs transition-opacity" onClick={() => setMenuOpen(false)} />
              <div className="relative w-85 bg-[#121824] border-r border-[#1e293b] flex flex-col p-6 animate-slide-in">
                <div className="flex items-center justify-between pb-6 border-b border-[#1e293b] mb-4">
                  <div className="flex items-center gap-2">
                    <div className="p-2 bg-indigo-600/20 rounded-lg">
                      <span className="text-xl">💳</span>
                    </div>
                    <span className="text-lg font-bold text-indigo-400">Mi Cartera Pro</span>
                  </div>
                  <button onClick={() => setMenuOpen(false)} className="text-[#94a3b8] hover:text-[#f1f5f9]">✕</button>
                </div>
                
                <div className="bg-[#1a2336] p-3 rounded-xl mb-6 border border-[#27354f]">
                  <div className="text-xs text-[#94a3b8] mb-1">Estado de Sincronización</div>
                  <div className="flex items-center gap-2">
                    <span className={`w-2.5 h-2.5 rounded-full ${
                      syncStatus === "connected" ? "bg-emerald-400 animate-pulse" :
                      syncStatus === "syncing" ? "bg-indigo-400 animate-spin" :
                      syncStatus === "error" ? "bg-rose-400" : "bg-slate-500"
                    }`} />
                    <span className="text-sm font-semibold capitalize">
                      {syncStatus === "connected" ? "Sincronizado" :
                       syncStatus === "syncing" ? "Sincronizando..." :
                       syncStatus === "connecting" ? "Conectando..." :
                       syncStatus === "error" ? "Error de conexión" : "Nube Desconectada"}
                    </span>
                  </div>
                  {lastSyncTime && (
                    <div className="text-[10px] text-[#64748b] mt-1">Último cambio: {lastSyncTime}</div>
                  )}
                </div>

                <div className="flex-1 space-y-1 overflow-y-auto">
                  {[
                    { label: "💳 Mis Cuentas", screen: "accounts" },
                    { label: "🔄 Transferencias", screen: "transfers" },
                    { label: "🏷️ Categorías", screen: "categories" },
                    { label: "🔍 Consultas y Reportes", screen: "queries" },
                    { label: "📦 Períodos Archivados", screen: "archive" },
                    { label: "📅 Cerrar Período (Mes)", screen: "period" },
                    { label: "☁️ Sincronizar Google Drive", screen: "sync_settings" },
                    { label: "❓ Ayuda e Instalación", screen: "help" },
                  ].map(item => (
                    <button 
                      key={item.screen} 
                      onClick={() => openScreen(item.screen)}
                      className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl text-left text-sm font-medium transition-colors ${
                        screen === item.screen ? "bg-indigo-600/20 text-indigo-400 border border-indigo-500/20" : "text-[#94a3b8] hover:bg-slate-800/40 hover:text-[#f1f5f9]"
                      }`}
                    >
                      <span>{item.label}</span>
                    </button>
                  ))}
                </div>

                <div className="pt-4 border-t border-[#1e293b] text-center text-xs text-[#64748b]">
                  Mi Cartera Pro v2.3 • Créditos & Préstamos
                </div>
              </div>
            </div>
          )}

          {/* DESGLOSE DE SALDOS POR CUENTA MODAL (ORGANIZADO POR PESTAÑAS) */}
          {showBreakdown && (
            <div className="fixed inset-0 z-50 flex items-end justify-center bg-black/60 backdrop-blur-xs animate-fade-in">
              <div className="w-full max-w-md bg-[#121824] rounded-t-3xl border-t border-[#1e293b] p-6 pb-8 max-h-[90vh] flex flex-col animate-slide-up">
                <div className="w-12 h-1 bg-slate-700 rounded-full mx-auto mb-6 flex-shrink-0" />
                <div className="text-center font-bold text-lg mb-4">💰 Desglose General de Saldos</div>
                
                {/* SELECTOR DE PESTAÑAS DENTRO DEL DESGLOSE */}
                <div className="flex bg-[#0b0f19] p-1 rounded-xl mb-4 border border-[#1e293b] text-xs font-semibold flex-shrink-0">
                  <button 
                    onClick={() => setBreakdownTab("debit")}
                    className={`flex-1 py-2.5 rounded-lg transition-all ${breakdownTab === "debit" ? "bg-indigo-600 text-white shadow-md" : "text-slate-400 hover:text-[#f1f5f9]"}`}
                  >
                    💵 Débito/Cash
                  </button>
                  <button 
                    onClick={() => setBreakdownTab("credit")}
                    className={`flex-1 py-2.5 rounded-lg transition-all ${breakdownTab === "credit" ? "bg-indigo-600 text-white shadow-md" : "text-slate-400 hover:text-[#f1f5f9]"}`}
                  >
                    💳 Tarjetas
                  </button>
                  <button 
                    onClick={() => setBreakdownTab("loan")}
                    className={`flex-1 py-2.5 rounded-lg transition-all ${breakdownTab === "loan" ? "bg-indigo-600 text-white shadow-md" : "text-slate-400 hover:text-[#f1f5f9]"}`}
                  >
                    🤝 Préstamos
                  </button>
                </div>

                {/* CONTENIDO DE LA PESTAÑA */}
                <div className="space-y-4 overflow-y-auto pr-1 flex-1">
                  
                  {breakdownTab === "debit" && (
                    <div className="space-y-3">
                      <div className="text-xs font-bold uppercase tracking-wider text-slate-400 mb-2">Efectivo y Tarjetas de Débito</div>
                      {state.accounts.filter(a => !a.isCreditCard && !a.isLoan).map(a => (
                        <div key={a.id} className="bg-[#1a2336] p-4 rounded-xl border border-[#27354f] flex justify-between items-center">
                          <span className="font-semibold text-slate-200">{a.name}</span>
                          <span className="font-bold text-emerald-400">{fmt(a.balance)}</span>
                        </div>
                      ))}
                      {state.accounts.filter(a => !a.isCreditCard && !a.isLoan).length === 0 && (
                        <div className="text-center text-[#64748b] py-6 text-sm">No hay cuentas de débito o efectivo.</div>
                      )}
                      
                      <div className="flex justify-between items-center font-bold text-base mt-4 pt-3 border-t border-[#1e293b] text-slate-300">
                        <span>Total Patrimonio Neto:</span>
                        <span className="text-emerald-400 text-lg">{fmt(totalBalance)}</span>
                      </div>
                    </div>
                  )}

                  {breakdownTab === "credit" && (
                    <div className="space-y-3">
                      <div className="text-xs font-bold uppercase tracking-wider text-slate-400 mb-2">Límites y Deuda de Tarjetas</div>
                      {state.accounts.filter(a => a.isCreditCard).map(a => (
                        <div key={a.id} className="bg-[#1a2336] p-4 rounded-xl border border-[#27354f] space-y-2">
                          <div className="flex justify-between items-center font-semibold">
                            <span className="text-slate-200">{a.name}</span>
                            <span className="text-rose-400">Deuda: {fmt(a.cardDebt)}</span>
                          </div>
                          <div className="text-[11px] text-slate-400 flex justify-between">
                            <span>Disponible: <strong className="text-emerald-400">{fmt(a.availableLimit)}</strong></span>
                            <span>Crédito Total: {fmt(a.totalLimit)}</span>
                          </div>
                        </div>
                      ))}
                      {state.accounts.filter(a => a.isCreditCard).length === 0 && (
                        <div className="text-center text-[#64748b] py-6 text-sm">No hay tarjetas de crédito creadas.</div>
                      )}

                      <div className="flex justify-between items-center font-bold text-base mt-4 pt-3 border-t border-[#1e293b] text-slate-300">
                        <span>Total Deuda Tarjetas:</span>
                        <span className="text-rose-400 text-lg">{fmt(totalCreditDebt)}</span>
                      </div>
                    </div>
                  )}

                  {breakdownTab === "loan" && (
                    <div className="space-y-3">
                      <div className="text-xs font-bold uppercase tracking-wider text-slate-400 mb-2">Financiamientos y Préstamos</div>
                      {state.accounts.filter(a => a.isLoan).map(a => (
                        <div key={a.id} className="bg-[#1a2336] p-4 rounded-xl border border-[#27354f] space-y-2">
                          <div className="flex justify-between items-center font-semibold">
                            <span className="text-slate-200">{a.name}</span>
                            <span className="text-orange-400">Deuda: {fmt(a.cardDebt)}</span>
                          </div>
                          <div className="text-[11px] text-slate-400 flex justify-between">
                            <span>Monto Pagado: <strong className="text-emerald-400">{fmt(a.availableLimit)}</strong></span>
                            <span>Monto Prestado: {fmt(a.totalLimit)}</span>
                          </div>
                        </div>
                      ))}
                      {state.accounts.filter(a => a.isLoan).length === 0 && (
                        <div className="text-center text-[#64748b] py-6 text-sm">No hay préstamos creados.</div>
                      )}

                      <div className="flex justify-between items-center font-bold text-base mt-4 pt-3 border-t border-[#1e293b] text-slate-300">
                        <span>Total Deuda Préstamos:</span>
                        <span className="text-orange-400 text-lg">{fmt(totalLoanDebt)}</span>
                      </div>
                    </div>
                  )}

                </div>

                <button 
                  onClick={() => setShowBreakdown(false)}
                  className="w-full bg-indigo-600 hover:bg-indigo-500 py-3 rounded-xl font-bold mt-6 transition-all flex-shrink-0"
                >
                  Listo
                </button>
              </div>
            </div>
          )}

          {/* HEADER PRINCIPAL */}
          <header className="sticky top-0 bg-[#0e1320]/90 backdrop-blur-md z-40 border-b border-[#1e293b] px-4 py-4 flex items-center justify-between">
            {screen !== "home" ? (
              <button onClick={() => setScreen("home")} className="p-2 hover:bg-slate-800/60 rounded-xl transition-all">
                <span className="text-xl">←</span>
              </button>
            ) : (
              <button onClick={() => setMenuOpen(true)} className="p-2 hover:bg-slate-800/60 rounded-xl transition-all">
                <span className="text-xl">☰</span>
              </button>
            )}

            <h1 className="font-bold text-base tracking-wide uppercase text-slate-200">
              {screen === "home" ? "Mi Cartera" :
               screen === "accounts" ? "Cuentas" :
               screen === "categories" ? "Categorías" :
               screen === "transfers" ? "Transferencias" :
               screen === "queries" ? "Consultas & Filtros" :
               screen === "period" ? "Corte del Período" :
               screen === "archive" ? "Períodos Archivados" :
               screen === "income" ? "Registrar Ingreso" :
               screen === "expense" ? "Registrar Gasto" :
               screen === "sync_settings" ? "Google Drive Sync" : "Ayuda de Instalación"}
            </h1>

            <button onClick={() => setScreen("sync_settings")} className="p-2 hover:bg-slate-800/60 rounded-xl transition-all relative">
              <span className={`absolute top-1.5 right-1.5 w-2 h-2 rounded-full ${
                syncStatus === "connected" ? "bg-emerald-400" :
                syncStatus === "syncing" ? "bg-indigo-400 animate-pulse" : "bg-slate-600"
              }`} />
              <span className="text-lg">☁️</span>
            </button>
          </header>

          {/* CONTENIDO PRINCIPAL */}
          <main className="flex-1 pb-24 overflow-y-auto">

            {/* PANTALLA: HOME */}
            {screen === "home" && (
              <div className="p-4 space-y-6">
                
                {/* TARJETA DE BALANCE PRINCIPAL */}
                <div className="bg-gradient-to-br from-indigo-950 to-indigo-850 rounded-3xl p-6 text-white shadow-lg shadow-indigo-950/40 border border-indigo-500/20 relative overflow-hidden space-y-4">
                  <div className="absolute -right-10 -bottom-10 opacity-5 text-9xl">💰</div>
                  
                  <div>
                    <div className="text-indigo-200 text-xs font-semibold uppercase tracking-wider mb-1">Patrimonio Disponible Neto</div>
                    <div className="text-3xl font-extrabold tracking-tight">{fmt(totalBalance)}</div>
                    <div className="text-[10px] text-slate-400 mt-1">(Suma únicamente de efectivo y cuentas de débito)</div>
                  </div>

                  {/* RUBRO: DISPONIBLE EN TARJETAS DE CRÉDITO */}
                  <div className="bg-[#121824]/80 p-3 rounded-2xl border border-slate-700/30 flex items-center justify-between">
                    <div>
                      <span className="text-[10px] text-slate-400 uppercase font-bold tracking-wider block">Disponible en Tarjetas</span>
                      <span className="text-sm font-extrabold text-indigo-400 mt-0.5 inline-block">{fmt(totalCreditAvailable)}</span>
                    </div>
                    <span className="text-xl">💳</span>
                  </div>
                  
                  <div className="flex justify-between items-center pt-2 border-t border-indigo-500/20">
                    <button 
                      onClick={() => {
                        setBreakdownTab("debit");
                        setShowBreakdown(true);
                      }}
                      className="text-xs bg-white/5 hover:bg-white/10 active:bg-white/20 transition-all px-4 py-2 rounded-xl flex items-center gap-1.5 font-medium"
                    >
                      <span>Ver Cuentas</span> ➔
                    </button>
                    {syncStatus === "connected" ? (
                      <span className="text-[10px] text-emerald-300 font-medium flex items-center gap-1">
                        <span className="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-ping" />
                        Sincronizado
                      </span>
                    ) : (
                      <button 
                        onClick={() => setScreen("sync_settings")} 
                        className="text-[10px] bg-red-500/10 hover:bg-red-500/20 border border-red-500/30 text-red-200 px-3 py-1 rounded-lg"
                      >
                        Conectar Nube
                      </button>
                    )}
                  </div>
                </div>

                {/* INDICADORES ADICIONALES DE DEUDAS (NUEVAS TARJETAS DINÁMICAS) */}
                <div className="grid grid-cols-2 gap-4">
                  {/* INDICADOR DEUDA DE TARJETAS */}
                  <button 
                    onClick={() => {
                      setBreakdownTab("credit");
                      setShowBreakdown(true);
                    }}
                    className={`p-4 rounded-2xl border transition-all text-left flex flex-col justify-between ${
                      totalCreditDebt > 0 
                        ? "bg-rose-950/20 border-rose-500/30 text-rose-300 hover:bg-rose-950/30" 
                        : "bg-[#121824] border-[#1e293b] text-slate-400 hover:border-slate-800"
                    }`}
                  >
                    <div className="flex justify-between items-center w-full mb-2">
                      <span className="text-[10px] font-bold uppercase tracking-wider block">Deuda Tarjetas</span>
                      <span className="text-sm">💳</span>
                    </div>
                    <div>
                      <span className="text-base font-extrabold tracking-tight block">
                        {fmt(totalCreditDebt)}
                      </span>
                      {totalCreditDebt > 0 && <span className="text-[8px] text-rose-400 block mt-0.5">⚠️ Requiere Pago - Ver Detalle</span>}
                    </div>
                  </button>

                  {/* INDICADOR DEUDA DE PRÉSTAMOS */}
                  <button 
                    onClick={() => {
                      setBreakdownTab("loan");
                      setShowBreakdown(true);
                    }}
                    className={`p-4 rounded-2xl border transition-all text-left flex flex-col justify-between ${
                      totalLoanDebt > 0 
                        ? "bg-amber-950/20 border-amber-500/30 text-amber-300 hover:bg-amber-950/30" 
                        : "bg-[#121824] border-[#1e293b] text-slate-400 hover:border-slate-800"
                    }`}
                  >
                    <div className="flex justify-between items-center w-full mb-2">
                      <span className="text-[10px] font-bold uppercase tracking-wider block">Deuda Préstamos</span>
                      <span className="text-sm">🤝</span>
                    </div>
                    <div>
                      <span className="text-base font-extrabold tracking-tight block">
                        {fmt(totalLoanDebt)}
                      </span>
                      {totalLoanDebt > 0 && <span className="text-[8px] text-amber-400 block mt-0.5">📋 En Amortización - Ver Detalle</span>}
                    </div>
                  </button>
                </div>

                {/* BOTONES DE TRANSACCIÓN DIRECTA */}
                <div className="grid grid-cols-2 gap-4">
                  <button 
                    onClick={() => openScreen("income", "income")}
                    className="bg-[#121c22] hover:bg-[#16272e] border border-emerald-500/20 rounded-2xl py-4 flex flex-col items-center justify-center gap-1 transition-all group active:scale-95"
                  >
                    <div className="w-10 h-10 rounded-full bg-emerald-500/10 flex items-center justify-center text-emerald-400 mb-1 group-hover:scale-110 transition-transform">
                      <span className="text-xl font-bold">↑</span>
                    </div>
                    <span className="text-xs text-slate-400 font-semibold uppercase tracking-wider">Ingreso</span>
                    <span className="text-xs text-emerald-400 font-medium">Registrar</span>
                  </button>

                  <button 
                    onClick={() => openScreen("expense", "expense")}
                    className="bg-[#1f161c] hover:bg-[#2e1d27] border border-rose-500/20 rounded-2xl py-4 flex flex-col items-center justify-center gap-1 transition-all group active:scale-95"
                  >
                    <div className="w-10 h-10 rounded-full bg-rose-500/10 flex items-center justify-center text-rose-400 mb-1 group-hover:scale-110 transition-transform">
                      <span className="text-xl font-bold">↓</span>
                    </div>
                    <span className="text-xs text-slate-400 font-semibold uppercase tracking-wider">Egreso</span>
                    <span className="text-xs text-rose-400 font-medium">Registrar</span>
                  </button>
                </div>

                {/* MOVIMIENTOS RECIENTES */}
                <div>
                  <div className="flex justify-between items-center mb-3">
                    <h3 className="text-xs font-bold uppercase text-slate-400 tracking-wider">Últimos Movimientos</h3>
                    <button onClick={() => setScreen("queries")} className="text-xs text-indigo-400 font-semibold">Ver todos</button>
                  </div>

                  <div className="space-y-2">
                    {recentTx.map(t => (
                      <div key={t.id} className="bg-[#121824] border border-[#1e293b] rounded-2xl p-4 flex items-center justify-between transition-all hover:border-[#2a364f]">
                        <div className="flex items-center gap-3">
                          <div className={`w-10 h-10 rounded-xl flex items-center justify-center text-lg font-bold ${
                            t.type === "income" ? "bg-emerald-500/10 text-emerald-400" :
                            t.type === "transfer" ? "bg-blue-500/10 text-blue-400" : "bg-rose-500/10 text-rose-400"
                          }`}>
                            {t.type === "income" ? "📈" : t.type === "transfer" ? "⇄" : "📉"}
                          </div>
                          <div>
                            <div className="font-semibold text-sm text-slate-200">{t.categoryName}</div>
                            <div className="text-[11px] text-slate-500">{t.accountName} • {t.date}</div>
                            {t.note && <div className="text-xs text-[#94a3b8] italic mt-0.5">"{t.note}"</div>}
                          </div>
                        </div>

                        <div className={`font-bold text-sm tracking-tight ${
                          t.type === "income" ? "text-emerald-400" : 
                          t.type === "transfer" ? "text-blue-400" : "text-rose-400"
                        }`}>
                          {t.type === "income" ? "+" : t.type === "transfer" ? "" : "-"}{fmt(t.amount)}
                        </div>
                      </div>
                    ))}

                    {recentTx.length === 0 && (
                      <div className="bg-[#121824] border border-dashed border-[#1e293b] rounded-2xl p-8 text-center">
                        <div className="text-2xl mb-2">💸</div>
                        <p className="text-sm text-[#64748b]">Aún no registras movimientos en este período.</p>
                      </div>
                    )}
                  </div>
                </div>

                {/* ACCESO RÁPIDO A DRIVE */}
                {syncStatus !== "connected" && (
                  <div className="bg-[#121c2d] border border-blue-500/20 p-4 rounded-2xl flex items-center justify-between">
                    <div>
                      <h4 className="font-semibold text-xs text-blue-300 uppercase tracking-wider">¿Sincronizar con Google Drive?</h4>
                      <p className="text-[11px] text-slate-400 mt-1">Sube tus tarjetas y saldo a tu nube privada de Drive.</p>
                    </div>
                    <button 
                      onClick={() => setScreen("sync_settings")}
                      className="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded-xl text-xs font-bold whitespace-nowrap transition-all"
                    >
                      Conectar
                    </button>
                  </div>
                )}

              </div>
            )}

            {/* PANTALLA: FORMULARIO DE INGRESO / GASTO */}
            {(screen === "income" || screen === "expense") && (
              <div className="p-4">
                <div className="bg-[#121824] border border-[#1e293b] rounded-3xl p-6 space-y-4">
                  <div>
                    <label className="text-xs font-bold uppercase tracking-wider text-slate-400 block mb-1">Monto *</label>
                    <div className="relative">
                      <span className="absolute left-4 top-1/2 -translate-y-1/2 text-lg font-bold text-slate-500">$</span>
                      <input 
                        type="number" 
                        placeholder="0.00" 
                        step="0.01"
                        value={form.amount} 
                        onChange={e => setForm({ ...form, amount: e.target.value })}
                        className="w-full bg-[#0a0f19] border border-[#1e293b] rounded-xl py-3.5 pl-8 pr-4 text-white text-lg font-bold focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 outline-none"
                      />
                    </div>
                  </div>

                  <div>
                    <label className="text-xs font-bold uppercase tracking-wider text-slate-400 block mb-1">Cuenta *</label>
                    <select 
                      value={form.accountId} 
                      onChange={e => setForm({ ...form, accountId: e.target.value })}
                      className="w-full bg-[#0a0f19] border border-[#1e293b] rounded-xl py-3 px-4 text-white text-sm focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 outline-none"
                    >
                      <option value="">— Selecciona una cuenta —</option>
                      {state.accounts.map(a => (
                        <option key={a.id} value={a.id}>
                          {a.name} ({a.isCreditCard ? `Disp: ${fmt(a.availableLimit)}` : a.isLoan ? `Pagado: ${fmt(a.availableLimit)}` : fmt(a.balance)})
                        </option>
                      ))}
                    </select>
                  </div>

                  <div>
                    <label className="text-xs font-bold uppercase tracking-wider text-slate-400 block mb-1">Categoría *</label>
                    <select 
                      value={form.categoryId} 
                      onChange={e => setForm({ ...form, categoryId: e.target.value })}
                      className="w-full bg-[#0a0f19] border border-[#1e293b] rounded-xl py-3 px-4 text-white text-sm focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 outline-none"
                    >
                      <option value="">— Selecciona categoría —</option>
                      {catForType.map(c => (
                        <option key={c.id} value={c.id}>{c.name}</option>
                      ))}
                    </select>
                    {catForType.length === 0 && (
                      <p className="text-xs text-amber-400 mt-1">⚠️ No hay categorías para este tipo de movimiento. Crea una primero en el menú.</p>
                    )}
                  </div>

                  <div>
                    <label className="text-xs font-bold uppercase tracking-wider text-slate-400 block mb-1">Nota (Opcional)</label>
                    <input 
                      type="text" 
                      placeholder="Ej. Pago mensual, Abono crédito..." 
                      value={form.note} 
                      onChange={e => setForm({ ...form, note: e.target.value })}
                      className="w-full bg-[#0a0f19] border border-[#1e293b] rounded-xl py-3 px-4 text-white text-sm focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 outline-none"
                    />
                  </div>

                  <div>
                    <label className="text-xs font-bold uppercase tracking-wider text-slate-400 block mb-1">Fecha</label>
                    <input 
                      type="date" 
                      value={form.date} 
                      onChange={e => setForm({ ...form, date: e.target.value })}
                      className="w-full bg-[#0a0f19] border border-[#1e293b] rounded-xl py-3 px-4 text-white text-sm focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 outline-none"
                    />
                  </div>

                  <button 
                    onClick={submitTransaction}
                    className={`w-full font-bold py-4 rounded-xl mt-4 transition-all shadow-lg text-sm uppercase tracking-wider ${
                      formType === "income" 
                        ? "bg-emerald-600 hover:bg-emerald-500 shadow-emerald-950/20 text-white" 
                        : "bg-rose-600 hover:bg-rose-500 shadow-rose-950/20 text-white"
                    }`}
                  >
                    {formType === "income" ? "✓ Registrar Ingreso" : "✓ Registrar Egreso"}
                  </button>
                </div>
              </div>
            )}

            {/* PANTALLA: GESTIONAR CUENTAS */}
            {screen === "accounts" && (
              <div className="p-4 space-y-6">
                <div className="bg-[#121824] border border-[#1e293b] rounded-3xl p-6 space-y-4">
                  <h3 className="font-bold text-sm uppercase text-slate-400 tracking-wider">
                    {editAcc ? "✏️ Editar cuenta" : "💳 Agregar nueva cuenta"}
                  </h3>
                  
                  {/* Selector de Tipo de Cuenta de 3 Vías */}
                  <div>
                    <label className="text-xs font-bold uppercase tracking-wider text-slate-400 block mb-2">Tipo de Cuenta</label>
                    <div className="grid grid-cols-3 gap-1.5">
                      <button 
                        onClick={() => setAccForm({ ...accForm, isCreditCard: false, isLoan: false })}
                        className={`py-3 rounded-xl border text-[10px] font-bold uppercase tracking-wider transition-all text-center ${
                          (!accForm.isCreditCard && !accForm.isLoan) 
                            ? "bg-indigo-600/20 text-indigo-400 border-indigo-500/40" 
                            : "border-[#1e293b] text-slate-400 hover:bg-slate-800/40"
                        }`}
                      >
                        💵 Débito
                      </button>
                      <button 
                        onClick={() => setAccForm({ ...accForm, isCreditCard: true, isLoan: false })}
                        className={`py-3 rounded-xl border text-[10px] font-bold uppercase tracking-wider transition-all text-center ${
                          accForm.isCreditCard 
                            ? "bg-rose-500/10 text-rose-400 border-rose-500/40" 
                            : "border-[#1e293b] text-slate-400 hover:bg-slate-800/40"
                        }`}
                      >
                        💳 Tarjeta
                      </button>
                      <button 
                        onClick={() => setAccForm({ ...accForm, isCreditCard: false, isLoan: true })}
                        className={`py-3 rounded-xl border text-[10px] font-bold uppercase tracking-wider transition-all text-center ${
                          accForm.isLoan 
                            ? "bg-amber-500/10 text-amber-400 border-amber-500/40" 
                            : "border-[#1e293b] text-slate-400 hover:bg-slate-800/40"
                        }`}
                      >
                        🤝 Préstamo
                      </button>
                    </div>
                  </div>

                  <div>
                    <label className="text-xs font-bold uppercase tracking-wider text-slate-400 block mb-1">Nombre de la Cuenta</label>
                    <input 
                      type="text" 
                      placeholder="Ej. Tarjeta Banamex, Efectivo, Crédito Personal" 
                      value={accForm.name} 
                      onChange={e => setAccForm({ ...accForm, name: e.target.value })}
                      className="w-full bg-[#0a0f19] border border-[#1e293b] rounded-xl py-3 px-4 text-white text-sm focus:border-indigo-500 outline-none"
                    />
                  </div>

                  {/* Campos condicionales según el tipo de cuenta */}
                  {(!accForm.isCreditCard && !accForm.isLoan) ? (
                    <div>
                      <label className="text-xs font-bold uppercase tracking-wider text-slate-400 block mb-1">
                        Saldo {editAcc ? "actual" : "inicial"}
                      </label>
                      <input 
                        type="number" 
                        placeholder="0.00" 
                        value={accForm.balance} 
                        onChange={e => setAccForm({ ...accForm, balance: e.target.value })}
                        className="w-full bg-[#0a0f19] border border-[#1e293b] rounded-xl py-3 px-4 text-white text-sm focus:border-indigo-500 outline-none"
                      />
                    </div>
                  ) : (
                    <div className="space-y-4 border-t border-slate-700/50 pt-4">
                      <div className="grid grid-cols-2 gap-3">
                        <div>
                          <label className="text-[10px] font-bold uppercase tracking-wider text-slate-400 block mb-1">
                            {accForm.isCreditCard ? "Límite Otorgado" : "Monto Prestado"}
                          </label>
                          <input 
                            type="number" 
                            placeholder="Ej. 15000" 
                            value={accForm.totalLimit} 
                            onChange={e => {
                              const limit = parseFloat(e.target.value) || 0;
                              const debt = parseFloat(accForm.cardDebt) || 0;
                              setAccForm({ 
                                ...accForm, 
                                totalLimit: e.target.value,
                                availableLimit: (limit - debt).toString()
                              });
                            }}
                            className="w-full bg-[#0a0f19] border border-[#1e293b] rounded-xl py-2.5 px-3 text-white text-xs focus:border-indigo-500 outline-none"
                          />
                        </div>
                        <div>
                          <label className="text-[10px] font-bold uppercase tracking-wider text-slate-400 block mb-1">Deuda actual (Saldo utilizado)</label>
                          <input 
                            type="number" 
                            placeholder="Ej. 3000" 
                            value={accForm.cardDebt} 
                            onChange={e => {
                              const limit = parseFloat(accForm.totalLimit) || 0;
                              const debt = parseFloat(e.target.value) || 0;
                              setAccForm({ 
                                ...accForm, 
                                cardDebt: e.target.value,
                                availableLimit: (limit - debt).toString()
                              });
                            }}
                            className="w-full bg-[#0a0f19] border border-[#1e293b] rounded-xl py-2.5 px-3 text-white text-xs focus:border-indigo-500 outline-none"
                          />
                        </div>
                      </div>

                      <div>
                        <label className="text-xs font-bold uppercase tracking-wider text-slate-400 block mb-1">
                          {accForm.isCreditCard ? "Monto Disponible actual" : "Monto Pagado / Amortizado"}
                        </label>
                        <input 
                          type="number" 
                          placeholder="Calculado automáticamente" 
                          value={accForm.availableLimit} 
                          onChange={e => setAccForm({ ...accForm, availableLimit: e.target.value })}
                          className="w-full bg-[#0a0f19]/60 border border-indigo-500/20 text-indigo-300 font-bold rounded-xl py-3 px-4 text-sm focus:border-indigo-500 outline-none"
                        />
                      </div>
                    </div>
                  )}

                  <div className="flex gap-2 pt-2">
                    <button 
                      onClick={submitAccount}
                      className="flex-1 bg-indigo-600 hover:bg-indigo-500 py-3.5 rounded-xl font-bold text-sm transition-all shadow-lg"
                    >
                      {editAcc ? "Guardar" : "Agregar Cuenta"}
                    </button>
                    {editAcc && (
                      <button 
                        onClick={() => { 
                          setEditAcc(null); 
                          setAccForm({ name: "", balance: "", isCreditCard: false, isLoan: false, totalLimit: "", cardDebt: "", availableLimit: "" }); 
                        }}
                        className="bg-slate-700 hover:bg-slate-600 px-5 py-3.5 rounded-xl font-semibold text-sm transition-all"
                      >
                        Cancelar
                      </button>
                    )}
                  </div>
                </div>

                {/* Lista de cuentas creadas */}
                <div className="space-y-2">
                  <h4 className="text-xs font-bold uppercase text-slate-400 tracking-wider">Cuentas creadas</h4>
                  {state.accounts.map(a => (
                    <div key={a.id} className="bg-[#121824] border border-[#1e293b] rounded-2xl p-4 flex items-center justify-between">
                      <div className="space-y-1">
                        <div className="font-semibold text-sm text-slate-200 flex items-center gap-1.5">
                          {a.name} 
                          {a.isCreditCard && <span className="text-[9px] font-bold bg-rose-950 text-rose-300 border border-rose-800/30 px-2 py-0.5 rounded-full">Crédito</span>}
                          {a.isLoan && <span className="text-[9px] font-bold bg-amber-950 text-amber-300 border border-amber-800/30 px-2 py-0.5 rounded-full">Préstamo</span>}
                        </div>
                        
                        {(a.isCreditCard || a.isLoan) ? (
                          <div className="text-xs text-slate-400 space-y-0.5">
                            <div>Deuda actual: <span className="text-rose-400 font-bold">{fmt(a.cardDebt)}</span></div>
                            <div>
                              {a.isCreditCard ? "Disp: " : "Pagado: "}
                              <span className="text-emerald-400 font-bold">{fmt(a.availableLimit)}</span> 
                              {" | "} 
                              {a.isCreditCard ? "Límite: " : "Total: "}
                              <span className="text-slate-300">{fmt(a.totalLimit)}</span>
                            </div>
                          </div>
                        ) : (
                          <div className="text-emerald-400 font-bold text-sm">{fmt(a.balance)}</div>
                        )}
                      </div>
                      <div className="flex gap-1">
                        <button 
                          onClick={() => { 
                            setEditAcc(a); 
                            setAccForm({ 
                              name: a.name, 
                              balance: a.balance || "", 
                              isCreditCard: !!a.isCreditCard,
                              isLoan: !!a.isLoan,
                              totalLimit: a.totalLimit || "",
                              cardDebt: a.cardDebt || "",
                              availableLimit: a.availableLimit || ""
                            }); 
                          }}
                          className="p-2.5 bg-blue-500/10 hover:bg-blue-500/20 rounded-xl text-blue-400 text-sm transition-all"
                          title="Editar cuenta"
                        >
                          ✏️
                        </button>
                        <button 
                          onClick={() => setDeleteAccId(a.id)}
                          className="p-2.5 bg-rose-500/10 hover:bg-rose-500/20 rounded-xl text-rose-400 text-sm transition-all"
                          title="Eliminar cuenta"
                        >
                          🗑️
                        </button>
                      </div>
                    </div>
                  ))}
                  {state.accounts.length === 0 && (
                    <p className="text-center text-[#64748b] text-sm py-4">No tienes cuentas. Agrega una arriba.</p>
                  )}
                </div>
              </div>
            )}

            {/* PANTALLA: GESTIONAR CATEGORÍAS */}
            {screen === "categories" && (
              <div className="p-4 space-y-6">
                <div className="bg-[#121824] border border-[#1e293b] rounded-3xl p-6 space-y-4">
                  <h3 className="font-bold text-sm uppercase text-slate-400 tracking-wider">Nueva categoría</h3>
                  
                  <div>
                    <label className="text-xs font-bold uppercase tracking-wider text-slate-400 block mb-1">Nombre</label>
                    <input 
                      type="text" 
                      placeholder="Ej. Supermercado, Gimnasio, Renta" 
                      value={catForm.name} 
                      onChange={e => setCatForm({ ...catForm, name: e.target.value })}
                      className="w-full bg-[#0a0f19] border border-[#1e293b] rounded-xl py-3 px-4 text-white text-sm focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 outline-none"
                    />
                  </div>

                  <div>
                    <label className="text-xs font-bold uppercase tracking-wider text-slate-400 block mb-2">Tipo de flujo</label>
                    <div className="flex gap-2">
                      <button
