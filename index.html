<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Cartera Pro - Control Financiero</title>
  
  <!-- Tailwind CSS para diseño ultra-moderno -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- React & Babel para ejecución directa -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Google API e Identity Services para la Sincronización con Drive -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://apis.google.com/js/api.js" async defer></script>

</head>
<body class="bg-[#0b0f19] text-[#f1f5f9] font-sans antialiased">

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo } = React;

    // Estado inicial de la aplicación actualizado con las nuevas características de ciclo de préstamos
    const initialState = {
      accounts: [
        { id: "1", name: "Efectivo", balance: 1000, isCreditCard: false, isLoan: false },
        { id: "2", name: "Tarjeta de Débito", balance: 5000, isCreditCard: false, isLoan: false }
      ],
      categories: [
        { id: "1", name: "Alimentos", type: "expense" },
        { id: "2", name: "Servicios", type: "expense" },
        { id: "3", name: "Sueldo", type: "income" },
        { id: "4", name: "Inversiones", type: "income" },
        { id: "5", name: "Transporte", type: "expense" }
      ],
      transactions: [],
      archivedPeriods: [],
      currentPeriodStart: new Date().toISOString().split("T")[0],
      budgets: {}, // { categoryId: limite }
      recurrentExpenses: [], // [ { id, name, categoryId, amount, accountId } ]
      nip: "", // PIN de bloqueo de 4 dígitos (vacío por defecto)
    };

    const TODAY = () => new Date().toISOString().split("T")[0];

    // Formateador de moneda MXN
    function fmt(n) {
      return new Intl.NumberFormat("es-MX", { style: "currency", currency: "MXN" }).format(n || 0);
    }

    // Helper inteligente para calcular el próximo vencimiento de tarjetas o préstamos (mensual o quincenal)
    function getNextPaymentInfo(account) {
      if (!account.dueDay) return null;
      
      const now = new Date();
      const year = now.getFullYear();
      const month = now.getMonth();
      const today = now.getDate();
      
      let nextDueDate = null;
      let cycleId = ""; // Identificador único de ciclo para evitar marcas de pago fantasma
      
      if (account.isLoan && account.loanFrequency === "quincenal") {
        const day1 = parseInt(account.dueDay, 10) || 15;
        const day2 = parseInt(account.dueDay2, 10) || 30;
        
        const date1Current = new Date(year, month, day1);
        const date2Current = new Date(year, month, day2);
        const date1Next = new Date(year, month + 1, day1);
        
        const todayStart = new Date(year, month, today);
        
        if (todayStart <= date1Current) {
          nextDueDate = date1Current;
          cycleId = `${year}-${String(month + 1).padStart(2, '0')}-Q1`;
        } else if (todayStart <= date2Current) {
          nextDueDate = date2Current;
          cycleId = `${year}-${String(month + 1).padStart(2, '0')}-Q2`;
        } else {
          nextDueDate = date1Next;
          const nextMonth = (month + 1) % 12;
          const nextYear = year + Math.floor((month + 1) / 12);
          cycleId = `${nextYear}-${String(nextMonth + 1).padStart(2, '0')}-Q1`;
        }
      } else {
        // Lógica mensual estándar (Para Tarjetas de Crédito y Préstamos Mensuales)
        const day = parseInt(account.dueDay, 10);
        const dateCurrent = new Date(year, month, day);
        const dateNext = new Date(year, month + 1, day);
        const todayStart = new Date(year, month, today);
        
        if (todayStart <= dateCurrent) {
          nextDueDate = dateCurrent;
          cycleId = `${year}-${String(month + 1).padStart(2, '0')}-M`;
        } else {
          nextDueDate = dateNext;
          const nextMonth = (month + 1) % 12;
          const nextYear = year + Math.floor((month + 1) / 12);
          cycleId = `${nextYear}-${String(nextMonth + 1).padStart(2, '0')}-M`;
        }
      }
      
      // Calcular diferencia en días exactos
      const diffTime = nextDueDate.getTime() - new Date(year, month, today).getTime();
      const daysLeft = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
      
      // Saber si ya está pagado en este ciclo
      const isPaid = account.lastPaidCycle === cycleId || (account.lastPaidMonth && cycleId.startsWith(account.lastPaidMonth));
      
      return {
        dueDate: nextDueDate.toISOString().split("T")[0],
        daysLeft,
        cycleId,
        isPaid
      };
    }

    function App() {
      // --- ESTADOS PRINCIPALES ---
      const [state, setState] = useState(() => {
        try {
          const local = localStorage.getItem("expense_app_v2");
          return local ? JSON.parse(local) : initialState;
        } catch {
          return initialState;
        }
      });

      const [screen, setScreen] = useState("home"); // home | accounts | categories | transfers | queries | period | archive | sync_settings | budgets | lock_settings | payments | print_preview
      const [menuOpen, setMenuOpen] = useState(false);
      const [showBreakdown, setShowBreakdown] = useState(false);
      const [breakdownTab, setBreakdownTab] = useState("debit"); // debit | credit | loan
      const [toast, setToast] = useState(null);

      // --- OPCIONES DE PRIVACIDAD Y SEGURIDAD ---
      const [hideAmounts, setHideAmounts] = useState(true); // Ocultar saldos por defecto
      const [isLocked, setIsLocked] = useState(false); // Bloqueo por NIP activo
      const [nipInput, setNipInput] = useState(""); // Captura de NIP en desbloqueo
      const [newNip, setNewNip] = useState(""); // Formulario de nuevo NIP

      // --- DIÁLOGOS Y MODALES PERSONALIZADOS ---
      const [customConfirm, setCustomConfirm] = useState(null); // { title, msg, onConfirm, onCancel, confirmText, cancelText }
      const [deleteAccId, setDeleteAccId] = useState(null);
      const [editingTx, setEditingTx] = useState(null); // Transacción activa para editar { id, categoryId, note, date, amount }
      const [editingTransfer, setEditingTransfer] = useState(null); // Transferencia activa para editar { id, fromId, toId, amount, date, note }

      // --- CONFIGURACIÓN DE GOOGLE DRIVE ---
      const [gdriveConfig, setGdriveConfig] = useState(() => {
        try {
          const config = localStorage.getItem("gdrive_config");
          return config ? JSON.parse(config) : { clientId: "", apiKey: "" };
        } catch {
          return { clientId: "", apiKey: "" };
        }
      });

      const [gdToken, setGdToken] = useState(null);
      const [gdFileId, setGdFileId] = useState(null);
      const [syncStatus, setSyncStatus] = useState("disconnected"); // disconnected | connecting | connected | syncing | success | error
      const [lastSyncTime, setLastSyncTime] = useState(null);

      // --- FORMULARIOS ---
      const [form, setForm] = useState({ amount: "", accountId: "", categoryId: "", note: "", date: TODAY() });
      const [formType, setFormType] = useState("expense");
      const [accForm, setAccForm] = useState({ 
        name: "", 
        balance: "", 
        isCreditCard: false, 
        isLoan: false,
        totalLimit: "", 
        cardDebt: "", 
        availableLimit: "",
        dueDay: "", // Día de pago (1-31)
        loanFrequency: "mensual", // mensual | quincenal
        dueDay2: "", // Segundo día de pago en caso de ser quincenal
      });
      const [editAcc, setEditAcc] = useState(null);
      const [catForm, setCatForm] = useState({ name: "", type: "expense" });
      const [trfForm, setTrfForm] = useState({ fromId: "", toId: "", amount: "", date: TODAY() });
      const [qFilter, setQFilter] = useState({ categoryId: "", accountId: "", from: "", to: "" });
      const [periodConfirm, setPeriodConfirm] = useState(false);
      const [periodType, setPeriodType] = useState("mensual"); // mensual | quincenal

      // --- FORMULARIOS PRESUPUESTO Y RECURRENTES ---
      const [budgetInput, setBudgetInput] = useState({ categoryId: "", limit: "" });
      const [recurrentForm, setRecurrentForm] = useState({ name: "", categoryId: "", amount: "", accountId: "" });

      // Guardar en localStorage automáticamente ante cualquier cambio local
      useEffect(() => {
        localStorage.setItem("expense_app_v2", JSON.stringify(state));
      }, [state]);

      // Guardar credenciales de Google Drive
      useEffect(() => {
        localStorage.setItem("gdrive_config", JSON.stringify(gdriveConfig));
      }, [gdriveConfig]);

      // Si el NIP está configurado, bloquear la app al iniciar
      useEffect(() => {
        if (state.nip && state.nip.length === 4) {
          setIsLocked(true);
        }
      }, []);

      // --- NOTIFICACIONES TOAST ---
      const showToast = (msg, type = "success") => {
        setToast({ msg, type });
        setTimeout(() => setToast(null), 3000);
      };

      // Patrimonio Neto = Únicamente Cuentas de Débito y Efectivo
      const totalBalance = useMemo(() => {
        return state.accounts
          .filter(a => !a.isCreditCard && !a.isLoan)
          .reduce((s, a) => s + (parseFloat(a.balance) || 0), 0);
      }, [state.accounts]);

      // Deuda total acumulada en tarjetas de crédito
      const totalCreditDebt = useMemo(() => {
        return state.accounts
          .filter(a => a.isCreditCard)
          .reduce((s, a) => s + (parseFloat(a.cardDebt) || 0), 0);
      }, [state.accounts]);

      // Deuda total acumulada en préstamos
      const totalLoanDebt = useMemo(() => {
        return state.accounts
          .filter(a => a.isLoan)
          .reduce((s, a) => s + (parseFloat(a.cardDebt) || 0), 0);
      }, [state.accounts]);

      // Total disponible en tarjetas de crédito
      const totalCreditAvailable = useMemo(() => {
        return state.accounts
          .filter(a => a.isCreditCard)
          .reduce((s, a) => s + (parseFloat(a.availableLimit) || 0), 0);
      }, [state.accounts]);

      // Movimientos recientes
      const recentTx = useMemo(() => {
        return [...state.transactions].sort((a, b) => b.date.localeCompare(a.date)).slice(0, 5);
      }, [state.transactions]);

      // Historial completo de transferencias para pestaña interna
      const transfersHistory = useMemo(() => {
        return state.transactions
          .filter(t => t.type === "transfer")
          .sort((a, b) => b.date.localeCompare(a.date));
      }, [state.transactions]);

      // Alertas de deudas que vencen en 5 días o menos (y no han sido pagadas este mes o ciclo)
      const urgentPayments = useMemo(() => {
        return state.accounts
          .filter(a => (a.isCreditCard || a.isLoan) && a.dueDay && parseFloat(a.cardDebt) > 0)
          .map(a => {
            const payInfo = getNextPaymentInfo(a);
            return { ...a, payInfo };
          })
          .filter(a => a.payInfo && !a.payInfo.isPaid && a.payInfo.daysLeft <= 5)
          .sort((a, b) => a.payInfo.daysLeft - b.payInfo.daysLeft);
      }, [state.accounts]);

      // Presupuesto consumido por categoría en el período actual
      const budgetProgress = useMemo(() => {
        const spentByCategory = {};
        state.transactions
          .filter(t => t.type === "expense")
          .forEach(t => {
            spentByCategory[t.categoryId] = (spentByCategory[t.categoryId] || 0) + t.amount;
          });

        return Object.keys(state.budgets || {}).map(catId => {
          const category = state.categories.find(c => c.id === catId);
          const limit = parseFloat(state.budgets[catId]) || 0;
          const spent = spentByCategory[catId] || 0;
          return {
            categoryId: catId,
            categoryName: category ? category.name : "Desconocido",
            limit,
            spent,
            pct: limit > 0 ? Math.min(100, (spent / limit) * 100) : 0
          };
        });
      }, [state.transactions, state.budgets, state.categories]);

      // --- FILTRADO DE CONSULTAS: DOBLE ENTRADA VIRTUALIZADA PARA TRANSFERENCIAS ---
      const qResults = useMemo(() => {
        const list = [];
        state.transactions.forEach(t => {
          if (t.type === "transfer") {
            const matchFrom = !qFilter.accountId || t.fromId === qFilter.accountId;
            const matchTo = !qFilter.accountId || t.toId === qFilter.accountId;
            
            if (!qFilter.accountId) {
              list.push({
                ...t,
                id: `${t.id}_from`,
                virtualType: "expense",
                accountId: t.fromId,
                accountName: t.fromName,
                categoryName: "Transferencia (Salida)",
                categoryId: "__transfer__",
                displayAmount: -t.amount,
                note: t.note || `Hacia ${t.toName}`
              });
              
              list.push({
                ...t,
                id: `${t.id}_to`,
                virtualType: "income",
                accountId: t.toId,
                accountName: t.toName,
                categoryName: "Transferencia (Entrada)",
                categoryId: "__transfer__",
                displayAmount: t.amount,
                note: t.note || `Desde ${t.fromName}`
              });
            } else {
              if (matchFrom) {
                list.push({
                  ...t,
                  id: `${t.id}_from`,
                  virtualType: "expense",
                  accountId: t.fromId,
                  accountName: t.fromName,
                  categoryName: "Transferencia (Salida)",
                  categoryId: "__transfer__",
                  displayAmount: -t.amount,
                  note: t.note || `Hacia ${t.toName}`
                });
              }
              if (matchTo) {
                list.push({
                  ...t,
                  id: `${t.id}_to`,
                  virtualType: "income",
                  accountId: t.toId,
                  accountName: t.toName,
                  categoryName: "Transferencia (Entrada)",
                  categoryId: "__transfer__",
                  displayAmount: t.amount,
                  note: t.note || `Desde ${t.fromName}`
                });
              }
            }
          } else {
            if (qFilter.categoryId && t.categoryId !== qFilter.categoryId) return;
            if (qFilter.accountId && t.accountId !== qFilter.accountId) return;
            
            list.push({
              ...t,
              displayAmount: t.type === "income" ? t.amount : -t.amount,
              virtualType: t.type
            });
          }
        });

        return list.filter(t => {
          if (qFilter.from && t.date < qFilter.from) return false;
          if (qFilter.to && t.date > qFilter.to) return false;
          return true;
        }).sort((a, b) => b.date.localeCompare(a.date));
      }, [state.transactions, qFilter]);
// --- CÁLCULOS: FLUJO Y ACUMULADOS PARA CONSULTAS ---
		  const qIncome = useMemo(() => {
			return qResults.filter(t => t.type === "income").reduce((s, t) => s + (parseFloat(t.amount) || 0), 0);
		  }, [qResults]);

		  const qExpense = useMemo(() => {
			return qResults.filter(t => t.type === "expense").reduce((s, t) => s + (parseFloat(t.amount) || 0), 0);
		  }, [qResults]);

		  const accountBalanceContext = useMemo(() => {
			let sum = 0;
			const accs = qFilter.accountId ? (state.accounts || []).filter(a => a.id === qFilter.accountId) : (state.accounts || []);
			accs.forEach(a => {
			  if (!a.isCreditCard && !a.isLoan) sum += (parseFloat(a.balance) || 0);
			  else sum -= (parseFloat(a.cardDebt) || 0);
			});
			return sum;
		  }, [state.accounts, qFilter.accountId]);

		  const truePeriodNetForAccounts = useMemo(() => {
			let net = 0;
			(state.transactions || []).forEach(t => {
			  if (qFilter.accountId) {
				if (t.type === "transfer") {
				  if (t.toAccountId === qFilter.accountId) net += parseFloat(t.amount);
				  if (t.accountId === qFilter.accountId) net -= parseFloat(t.amount);
				} else {
				  if (t.accountId === qFilter.accountId) {
					if (t.type === "income") net += parseFloat(t.amount);
					if (t.type === "expense") net -= parseFloat(t.amount);
				  }
				}
			  } else {
				if (t.type === "income") net += parseFloat(t.amount);
				if (t.type === "expense") net -= parseFloat(t.amount);
			  }
			});
			return net;
		  }, [state.transactions, qFilter.accountId]);
      // --- CÁLCULO DE GRÁFICO DE CATEGORÍAS ---
      const categoryChartData = useMemo(() => {
        const expenses = qResults.filter(t => t.virtualType === "expense");
        const totalExpense = expenses.reduce((s, t) => s + Math.abs(t.displayAmount), 0);
        
        const aggregated = {};
        expenses.forEach(t => {
          aggregated[t.categoryId] = (aggregated[t.categoryId] || 0) + Math.abs(t.displayAmount);
        });

        const colorPalette = [
          "#6366f1", "#ec4899", "#f59e0b", "#10b981", "#3b82f6", 
          "#8b5cf6", "#f43f5e", "#06b6d4", "#14b8a6", "#a855f7"
        ];

        return Object.keys(aggregated).map((catId, index) => {
          let name = "Otros";
          if (catId === "__transfer__") {
            name = "Transferencia (Salida)";
          } else {
            const category = state.categories.find(c => c.id === catId);
            if (category) name = category.name;
          }
          const amount = aggregated[catId];
          const pct = totalExpense > 0 ? (amount / totalExpense) * 100 : 0;
          return {
            categoryId: catId,
            name: name,
            amount,
            pct,
            color: colorPalette[index % colorPalette.length]
          };
        }).sort((a, b) => b.amount - a.amount);
      }, [qResults, state.categories]);

      const qIncome = useMemo(() => {
        return qResults.filter(t => t.virtualType === "income").reduce((s, t) => s + Math.abs(t.displayAmount), 0);
      }, [qResults]);

      const qExpense = useMemo(() => {
        return qResults.filter(t => t.virtualType === "expense").reduce((s, t) => s + Math.abs(t.displayAmount), 0);
      }, [qResults]);

      const maxBal = useMemo(() => {
        const balances = state.accounts.map(a => Math.abs(parseFloat(a.balance) || 0));
        return Math.max(...balances, 1);
      }, [state.accounts]);

      const catForType = useMemo(() => {
        return state.categories.filter(c => c.type === formType);
      }, [state.categories, formType]);

      // --- MANEJO DE NAVEGACIÓN ---
      function openScreen(s, type) {
        setMenuOpen(false);
        if (type) {
          setFormType(type);
          const defaultCat = state.categories.find(c => c.type === type)?.id || "";
          setForm({ 
            amount: "", 
            accountId: state.accounts[0]?.id || "", 
            categoryId: defaultCat, 
            note: "", 
            date: TODAY() 
          });
        }
        setScreen(s);
      }

      // --- MÁSCARA DE PRIVACIDAD (SOLO EN HOME) ---
      function maskAmount(amountValue, isHome = true) {
        if (isHome && hideAmounts) {
          return "$ ••••";
        }
        return fmt(amountValue);
      }

      // Registrar transacción
      function submitTransaction() {
        if (!form.amount || !form.accountId || !form.categoryId) {
          return showToast("Completa todos los campos requeridos", "error");
        }
        const amt = parseFloat(form.amount);
        if (isNaN(amt) || amt <= 0) return showToast("Monto inválido", "error");
        
        const acc = state.accounts.find(a => a.id === form.accountId);
        if (!acc) return;

        if (acc.isCreditCard) {
          if (formType === "expense" && acc.availableLimit < amt) {
            return showToast("Límite de crédito disponible insuficiente", "error");
          }
        } else if (acc.isLoan) {
          if (formType === "expense" && acc.availableLimit < amt) {
            return showToast("Límite del préstamo o monto disponible insuficiente", "error");
          }
        } else {
          if (formType === "expense" && acc.balance < amt) {
            return showToast("Saldo insuficiente en esa cuenta", "error");
          }
        }

        const newTx = {
          id: Date.now().toString(),
          type: formType,
          amount: amt,
          accountId: form.accountId,
          categoryId: form.categoryId,
          note: form.note,
          date: form.date,
          accountName: acc.name,
          categoryName: state.categories.find(c => c.id === form.categoryId)?.name || "Sin categoría",
        };

        const newAccounts = state.accounts.map(a => {
          if (a.id === form.accountId) {
            if (a.isCreditCard || a.isLoan) {
              const newDebt = formType === "expense" ? (parseFloat(a.cardDebt) || 0) + amt : Math.max(0, (parseFloat(a.cardDebt) || 0) - amt);
              const newAvailable = formType === "expense" ? (parseFloat(a.availableLimit) || 0) - amt : (parseFloat(a.availableLimit) || 0) + amt;
              return { 
                ...a, 
                cardDebt: newDebt, 
                availableLimit: newAvailable,
                balance: -newDebt 
              };
            } else {
              return { ...a, balance: formType === "income" ? a.balance + amt : a.balance - amt };
            }
          }
          return a;
        });

        const updatedState = { ...state, transactions: [...state.transactions, newTx], accounts: newAccounts };
        setState(updatedState);
        showToast(formType === "income" ? "¡Ingreso registrado con éxito!" : "¡Gasto registrado con éxito!");
        setScreen("home");
        
        if (syncStatus === "connected") {
          autoSyncToDrive(updatedState);
        }
      }

      // --- MODIFICAR TRANSACCIÓN REGISTRADA CON RECALCULO ---
      function handleOpenEditTx(t) {
        setEditingTx({
          id: t.id,
          categoryId: t.categoryId,
          note: t.note || "",
          date: t.date,
          amount: t.amount,
          accountId: t.accountId,
          type: t.type
        });
      }

      function handleSaveEditedTx() {
        if (!editingTx.accountId || !editingTx.categoryId || !editingTx.amount) {
          return showToast("Faltan datos obligatorios", "error");
        }
        
        const originalTx = state.transactions.find(t => t.id === editingTx.id);
        if (!originalTx) return;

        const newAmount = parseFloat(editingTx.amount);
        if (isNaN(newAmount) || newAmount <= 0) return showToast("Monto inválido", "error");

        let updatedAccounts = [...state.accounts];

        // 1. REVERTIR EL IMPACTO ORIGINAL en la cuenta original
        updatedAccounts = updatedAccounts.map(a => {
          if (a.id === originalTx.accountId) {
            if (a.isCreditCard || a.isLoan) {
              const isExpense = originalTx.type === "expense";
              const debtAdj = isExpense ? -originalTx.amount : originalTx.amount;
              const newDebt = Math.max(0, (parseFloat(a.cardDebt) || 0) + debtAdj);
              const newAvailable = (parseFloat(a.totalLimit) || 0) - newDebt;
              return {
                ...a,
                cardDebt: newDebt,
                availableLimit: newAvailable,
                balance: -newDebt
              };
            } else {
              const isExpense = originalTx.type === "expense";
              const balAdj = isExpense ? originalTx.amount : -originalTx.amount;
              return {
                ...a,
                balance: (parseFloat(a.balance) || 0) + balAdj
              };
            }
          }
          return a;
        });

        // 2. VALIDAR fondos/límites en la nueva cuenta
        const targetAcc = updatedAccounts.find(a => a.id === editingTx.accountId);
        if (!targetAcc) return showToast("La cuenta seleccionada ya no existe", "error");

        if (originalTx.type === "expense") {
          if (targetAcc.isCreditCard || targetAcc.isLoan) {
            if (targetAcc.availableLimit < newAmount) {
              return showToast("Límite de crédito disponible insuficiente en la cuenta seleccionada", "error");
            }
          } else {
            if (targetAcc.balance < newAmount) {
              return showToast("Saldo de débito insuficiente en la cuenta seleccionada", "error");
            }
          }
        }

        // 3. APLICAR EL NUEVO IMPACTO en la nueva cuenta
        updatedAccounts = updatedAccounts.map(a => {
          if (a.id === editingTx.accountId) {
            if (a.isCreditCard || a.isLoan) {
              const isExpense = originalTx.type === "expense";
              const debtAdj = isExpense ? newAmount : -newAmount;
              const newDebt = Math.max(0, (parseFloat(a.cardDebt) || 0) + debtAdj);
              const newAvailable = (parseFloat(a.totalLimit) || 0) - newDebt;
              return {
                ...a,
                cardDebt: newDebt,
                availableLimit: newAvailable,
                balance: -newDebt
              };
            } else {
              const isExpense = originalTx.type === "expense";
              const balAdj = isExpense ? -newAmount : newAmount;
              return {
                ...a,
                balance: (parseFloat(a.balance) || 0) + balAdj
              };
            }
          }
          return a;
        });

        // 4. ACTUALIZAR HISTORIAL
        const updatedTransactions = state.transactions.map(t => {
          if (t.id === editingTx.id) {
            const categoryName = state.categories.find(c => c.id === editingTx.categoryId)?.name || t.categoryName;
            const accountName = updatedAccounts.find(a => a.id === editingTx.accountId)?.name || t.accountName;
            return {
              ...t,
              accountId: editingTx.accountId,
              accountName: accountName,
              categoryId: editingTx.categoryId,
              categoryName: categoryName,
              note: editingTx.note,
              date: editingTx.date,
              amount: newAmount
            };
          }
          return t;
        });

        const updatedState = {
          ...state,
          accounts: updatedAccounts,
          transactions: updatedTransactions
        };

        setState(updatedState);
        setEditingTx(null);
        showToast("Transacción modificada correctamente");
        if (syncStatus === "connected") autoSyncToDrive(updatedState);
      }

      // --- MARCAR/DESMARCAR MANUALMENTE EL PAGO DE UN CICLO DE TARJETA O PRÉSTAMO ---
      function toggleAccountPaymentStatus(accountId) {
        const acc = state.accounts.find(a => a.id === accountId);
        if (!acc) return;
        
        const payInfo = getNextPaymentInfo(acc);
        if (!payInfo) return;

        const newAccounts = state.accounts.map(a => {
          if (a.id === accountId) {
            const alreadyPaid = a.lastPaidCycle === payInfo.cycleId;
            return {
              ...a,
              lastPaidCycle: alreadyPaid ? "" : payInfo.cycleId,
              lastPaidMonth: alreadyPaid ? "" : payInfo.cycleId.substring(0, 7) // retrocompatibilidad
            };
          }
          return a;
        });
        
        const updatedState = { ...state, accounts: newAccounts };
        setState(updatedState);
        const isNowPaid = newAccounts.find(a => a.id === accountId).lastPaidCycle === payInfo.cycleId;
        showToast(isNowPaid ? "✓ Cuenta marcada como pagada para este ciclo" : "Pago del ciclo desmarcado");
        if (syncStatus === "connected") autoSyncToDrive(updatedState);
      }

      // Guardar cambios de una transferencia editada con recalculo automático
      function handleSaveEditedTransfer() {
        if (!editingTransfer.fromId || !editingTransfer.toId || !editingTransfer.amount) {
          return showToast("Completa todos los campos obligatorios", "error");
        }
        if (editingTransfer.fromId === editingTransfer.toId) {
          return showToast("Las cuentas deben ser diferentes", "error");
        }
        const newAmount = parseFloat(editingTransfer.amount);
        if (isNaN(newAmount) || newAmount <= 0) {
          return showToast("Monto inválido", "error");
        }

        const originalTx = state.transactions.find(t => t.id === editingTransfer.id);
        if (!originalTx) return;

        let updatedAccounts = [...state.accounts];

        // 1. Revertir origen antiguo (regresar fondos)
        updatedAccounts = updatedAccounts.map(a => {
          if (a.id === originalTx.fromId) {
            if (a.isCreditCard || a.isLoan) {
              const newDebt = Math.max(0, (parseFloat(a.cardDebt) || 0) - originalTx.amount);
              const newAvailable = (parseFloat(a.totalLimit) || 0) - newDebt;
              return { ...a, cardDebt: newDebt, availableLimit: newAvailable, balance: -newDebt };
            } else {
              return { ...a, balance: (parseFloat(a.balance) || 0) + originalTx.amount };
            }
          }
          return a;
        });

        // 2. Revertir destino antiguo
        updatedAccounts = updatedAccounts.map(a => {
          if (a.id === originalTx.toId) {
            if (a.isCreditCard || a.isLoan) {
              const newDebt = (parseFloat(a.cardDebt) || 0) + originalTx.amount;
              const newAvailable = (parseFloat(a.totalLimit) || 0) - newDebt;
              return { ...a, cardDebt: newDebt, availableLimit: newAvailable, balance: -newDebt };
            } else {
              return { ...a, balance: (parseFloat(a.balance) || 0) - originalTx.amount };
            }
          }
          return a;
        });

        // Validar fondos del nuevo origen tras la reversión
        const sourceAcc = updatedAccounts.find(a => a.id === editingTransfer.fromId);
        if (!sourceAcc) return showToast("La cuenta de origen ya no existe", "error");
        if (sourceAcc.isCreditCard || sourceAcc.isLoan) {
          if (sourceAcc.availableLimit < newAmount) {
            return showToast("Límite de crédito disponible insuficiente en el origen", "error");
          }
        } else {
          if (sourceAcc.balance < newAmount) {
            return showToast("Saldo de débito insuficiente en el origen", "error");
          }
        }

        // 3. Aplicar nuevo origen
        updatedAccounts = updatedAccounts.map(a => {
          if (a.id === editingTransfer.fromId) {
            if (a.isCreditCard || a.isLoan) {
              const newDebt = (parseFloat(a.cardDebt) || 0) + newAmount;
              const newAvailable = (parseFloat(a.totalLimit) || 0) - newDebt;
              return { ...a, cardDebt: newDebt, availableLimit: newAvailable, balance: -newDebt };
            } else {
              return { ...a, balance: (parseFloat(a.balance) || 0) - newAmount };
            }
          }
          return a;
        });

        // 4. Aplicar nuevo destino (Y MARCAR COMO PAGADA LA TARJETA/PRÉSTAMO AUTOMÁTICAMENTE)
        const toAccObj = updatedAccounts.find(a => a.id === editingTransfer.toId);
        const nextPayInfo = getNextPaymentInfo(toAccObj);
        const targetCycleId = nextPayInfo ? nextPayInfo.cycleId : "";
        
        updatedAccounts = updatedAccounts.map(a => {
          if (a.id === editingTransfer.toId) {
            if (a.isCreditCard || a.isLoan) {
              const newDebt = Math.max(0, (parseFloat(a.cardDebt) || 0) - newAmount);
              const newAvailable = (parseFloat(a.totalLimit) || 0) - newDebt;
              return { 
                ...a, 
                cardDebt: newDebt, 
                availableLimit: newAvailable, 
                balance: -newDebt,
                lastPaidCycle: targetCycleId, // Considerada pagada en el ciclo actual calculado
                lastPaidMonth: targetCycleId ? targetCycleId.substring(0, 7) : "" 
              };
            } else {
              return { ...a, balance: (parseFloat(a.balance) || 0) + newAmount };
            }
          }
          return a;
        });

        // 5. Actualizar la transacción
        const fromAccName = updatedAccounts.find(a => a.id === editingTransfer.fromId)?.name || "Desconocida";
        const toAccName = updatedAccounts.find(a => a.id === editingTransfer.toId)?.name || "Desconocida";

        const updatedTransactions = state.transactions.map(t => {
          if (t.id === editingTransfer.id) {
            return {
              ...t,
              fromId: editingTransfer.fromId,
              toId: editingTransfer.toId,
              fromName: fromAccName,
              toName: toAccName,
              amount: newAmount,
              date: editingTransfer.date,
              note: editingTransfer.note || `Transferencia: ${fromAccName} ➔ ${toAccName}`,
              accountId: editingTransfer.fromId,
              accountName: fromAccName,
            };
          }
          return t;
        });

        const updatedState = {
          ...state,
          accounts: updatedAccounts,
          transactions: updatedTransactions
        };

        setState(updatedState);
        setEditingTransfer(null);
        showToast("¡Transferencia modificada con éxito!");
        if (syncStatus === "connected") autoSyncToDrive(updatedState);
      }

      // Agregar o editar cuenta
      function submitAccount() {
        if (!accForm.name) return showToast("Escribe un nombre para la cuenta", "error");
        
        let newAccounts;
        const parsedDueDay = accForm.dueDay ? Math.min(31, Math.max(1, parseInt(accForm.dueDay, 10))) : "";
        const parsedDueDay2 = accForm.isLoan && accForm.loanFrequency === "quincenal" && accForm.dueDay2
          ? Math.min(31, Math.max(1, parseInt(accForm.dueDay2, 10)))
          : "";

        if (accForm.isCreditCard || accForm.isLoan) {
          const limit = parseFloat(accForm.totalLimit);
          const debt = parseFloat(accForm.cardDebt);
          const available = parseFloat(accForm.availableLimit);
          
          if (isNaN(limit) || isNaN(debt) || isNaN(available)) {
            return showToast("Completa los montos de la cuenta correctamente", "error");
          }

          const freshAccount = {
            name: accForm.name,
            isCreditCard: accForm.isCreditCard,
            isLoan: accForm.isLoan,
            totalLimit: limit,
            cardDebt: debt,
            availableLimit: available,
            balance: -debt,
            dueDay: parsedDueDay,
            dueDay2: parsedDueDay2,
            loanFrequency: accForm.isLoan ? (accForm.loanFrequency || "mensual") : "",
            lastPaidMonth: "",
            lastPaidCycle: ""
          };

          if (editAcc) {
            newAccounts = state.accounts.map(a =>
              a.id === editAcc.id ? { ...a, ...freshAccount } : a
            );
            setEditAcc(null);
          } else {
            newAccounts = [...state.accounts, { id: Date.now().toString(), ...freshAccount }];
          }
        } else {
          const bal = parseFloat(accForm.balance);
          if (isNaN(bal)) return showToast("Escribe un saldo válido", "error");

          if (editAcc) {
            newAccounts = state.accounts.map(a =>
              a.id === editAcc.id ? { 
                ...a, 
                name: accForm.name, 
                balance: bal, 
                isCreditCard: false,
                isLoan: false,
                totalLimit: "", cardDebt: "", availableLimit: "", dueDay: "", dueDay2: "", loanFrequency: ""
              } : a
            );
            setEditAcc(null);
          } else {
            const newAcc = { 
              id: Date.now().toString(), 
              name: accForm.name, 
              balance: bal, 
              isCreditCard: false,
              isLoan: false,
              totalLimit: "", cardDebt: "", availableLimit: "", dueDay: "", dueDay2: "", loanFrequency: ""
            };
            newAccounts = [...state.accounts, newAcc];
          }
        }

        const updatedState = { ...state, accounts: newAccounts };
        setState(updatedState);
        setAccForm({ 
          name: "", 
          balance: "", 
          isCreditCard: false, 
          isLoan: false, 
          totalLimit: "", 
          cardDebt: "", 
          availableLimit: "", 
          dueDay: "", 
          dueDay2: "", 
          loanFrequency: "mensual" 
        });
        showToast("Cuenta guardada correctamente");

        if (syncStatus === "connected") autoSyncToDrive(updatedState);
      }

      // Aplicar un gasto recurrente como transacción real actual
      function applyRecurrentExpense(rec) {
        const acc = state.accounts.find(a => a.id === rec.accountId);
        if (!acc) return showToast("La cuenta asociada ya no existe", "error");
        if (!acc.isCreditCard && !acc.isLoan && acc.balance < rec.amount) {
          return showToast("Saldo insuficiente en cuenta origen", "error");
        }

        const newTx = {
          id: Date.now().toString(),
          type: "expense",
          amount: rec.amount,
          accountId: rec.accountId,
          categoryId: rec.categoryId,
          note: `Recurrente: ${rec.name}`,
          date: TODAY(),
          accountName: acc.name,
          categoryName: state.categories.find(c => c.id === rec.categoryId)?.name || "Sin categoría",
        };

        const newAccounts = state.accounts.map(a => {
          if (a.id === rec.accountId) {
            if (a.isCreditCard || a.isLoan) {
              const newDebt = (parseFloat(a.cardDebt) || 0) + rec.amount;
              const newAvailable = (parseFloat(a.availableLimit) || 0) - rec.amount;
              return { ...a, cardDebt: newDebt, availableLimit: newAvailable, balance: -newDebt };
            } else {
              return { ...a, balance: a.balance - rec.amount };
            }
          }
          return a;
        });

        const updatedState = { ...state, transactions: [...state.transactions, newTx], accounts: newAccounts };
        setState(updatedState);
        showToast(`✓ Aplicado: ${rec.name}`);
        if (syncStatus === "connected") autoSyncToDrive(updatedState);
      }

      // Registrar transferencia y MARCAR TARJETA/PRÉSTAMO COMO PAGADA
      function submitTransfer() {
        if (!trfForm.fromId || !trfForm.toId || !trfForm.amount) return showToast("Completa todos los campos", "error");
        if (trfForm.fromId === trfForm.toId) return showToast("Las cuentas deben ser diferentes", "error");
        
        const amt = parseFloat(trfForm.amount);
        if (isNaN(amt) || amt <= 0) return showToast("Monto inválido", "error");
        
        const fromAcc = state.accounts.find(a => a.id === trfForm.fromId);
        const toAcc = state.accounts.find(a => a.id === trfForm.toId);

        if (fromAcc.isCreditCard || fromAcc.isLoan) {
          if (fromAcc.availableLimit < amt) return showToast("Crédito disponible insuficiente", "error");
        } else {
          if (fromAcc.balance < amt) return showToast("Saldo insuficiente", "error");
        }

        const nextPayInfo = getNextPaymentInfo(toAcc);
        const targetCycleId = nextPayInfo ? nextPayInfo.cycleId : "";

        const newAccounts = state.accounts.map(a => {
          if (a.id === trfForm.fromId) {
            if (a.isCreditCard || a.isLoan) {
              const newDebt = (parseFloat(a.cardDebt) || 0) + amt;
              const newAvailable = (parseFloat(a.availableLimit) || 0) - amt;
              return { ...a, cardDebt: newDebt, availableLimit: newAvailable, balance: -newDebt };
            } else {
              return { ...a, balance: a.balance - amt };
            }
          }
          if (a.id === trfForm.toId) {
            if (a.isCreditCard || a.isLoan) {
              const newDebt = Math.max(0, (parseFloat(a.cardDebt) || 0) - amt);
              const newAvailable = (parseFloat(a.availableLimit) || 0) + amt;
              return { 
                ...a, 
                cardDebt: newDebt, 
                availableLimit: newAvailable, 
                balance: -newDebt,
                lastPaidCycle: targetCycleId, // Marcada como pagada en el ciclo calculado
                lastPaidMonth: targetCycleId ? targetCycleId.substring(0, 7) : ""
              };
            } else {
              return { ...a, balance: a.balance + amt };
            }
          }
          return a;
        });

        const trfTx = {
          id: Date.now().toString(),
          type: "transfer",
          amount: amt,
          fromId: trfForm.fromId,
          toId: trfForm.toId,
          fromName: fromAcc.name,
          toName: toAcc.name,
          date: trfForm.date,
          note: `Transferencia: ${fromAcc.name} ➔ ${toAcc.name}`,
          accountId: trfForm.fromId,
          categoryId: "__transfer__",
          categoryName: "Transferencia",
          accountName: fromAcc.name,
        };

        const updatedState = { ...state, accounts: newAccounts, transactions: [...state.transactions, trfTx] };
        setState(updatedState);
        setTrfForm({ fromId: "", toId: "", amount: "", date: TODAY() });
        showToast("¡Transferencia y abono realizados con éxito!");
        setScreen("home");

        if (syncStatus === "connected") autoSyncToDrive(updatedState);
      }

      // Corte de período adaptable (Mensual o Quincenal)
      function doPeriodCut() {
        const d = new Date();
        const year = d.getFullYear();
        let label = "";

        if (periodType === "quincenal") {
          const day = d.getDate();
          const quincena = day <= 15 ? "1ra Quincena" : "2da Quincena";
          const monthLabel = d.toLocaleDateString("es-MX", { month: "long" });
          label = `${quincena} de ${monthLabel}, ${year}`;
        } else {
          label = d.toLocaleDateString("es-MX", { month: "long", year: "numeric" });
        }

        const period = {
          id: Date.now().toString(),
          label,
          type: periodType,
          start: state.currentPeriodStart,
          end: TODAY(),
          transactions: state.transactions,
          accounts: state.accounts,
        };

        const updatedState = {
          ...state,
          archivedPeriods: [...state.archivedPeriods, period],
          transactions: [],
          currentPeriodStart: TODAY(),
        };

        setState(updatedState);
        setPeriodConfirm(false);
        showToast(`Cierre (${periodType}) guardado con éxito`);
        setScreen("home");

        if (syncStatus === "connected") autoSyncToDrive(updatedState);
      }

      // --- INTEGRACIÓN GOOGLE DRIVE ---
      let tokenClient = useRef(null);

      useEffect(() => {
        const loadGapiAndGis = () => {
          if (typeof gapi !== 'undefined' && typeof google !== 'undefined') {
            gapi.load('client', async () => {
              await gapi.client.init({
                apiKey: gdriveConfig.apiKey,
                discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest'],
              });
            });

            if (gdriveConfig.clientId) {
              tokenClient.current = google.accounts.oauth2.initTokenClient({
                client_id: gdriveConfig.clientId,
                scope: 'https://www.googleapis.com/auth/drive.file',
                callback: async (resp) => {
                  if (resp.error) {
                    setSyncStatus("error");
                    showToast("Error en autorización de Google: " + resp.error, "error");
                    return;
                  }
                  setGdToken(resp.access_token);
                  setSyncStatus("connected");
                  showToast("¡Conectado exitosamente a Google Drive!");
                  await findOrCreateDriveFile(resp.access_token);
                },
              });
            }
          } else {
            setTimeout(loadGapiAndGis, 1000);
          }
        };
        loadGapiAndGis();
      }, [gdriveConfig]);

      const connectGoogleDrive = () => {
        if (!gdriveConfig.clientId || !gdriveConfig.apiKey) {
          setScreen("sync_settings");
          showToast("Ingresa tu Client ID y API Key de Google para conectar", "warning");
          return;
        }
        setSyncStatus("connecting");
        if (tokenClient.current) {
          tokenClient.current.requestAccessToken({ prompt: 'consent' });
        } else {
          setSyncStatus("error");
          showToast("Error al inicializar cliente de Google.", "error");
        }
      };

      const disconnectGoogleDrive = () => {
        setGdToken(null);
        setGdFileId(null);
        setSyncStatus("disconnected");
        showToast("Desconectado de Google Drive", "warning");
      };

      const findOrCreateDriveFile = async (token) => {
        try {
          setSyncStatus("syncing");
          gapi.client.setToken({ access_token: token });
          
          const response = await gapi.client.drive.files.list({
            q: "name = 'mi_cartera_data.json' and trashed = false",
            fields: 'files(id, name)',
            spaces: 'drive'
          });

          const files = response.result.files;
          if (files && files.length > 0) {
            const fileId = files[0].id;
            setGdFileId(fileId);
            
            setCustomConfirm({
              title: "Nube Detectada ☁️",
              msg: "Se encontró un respaldo financiero en tu Google Drive.\n\n¿Quieres CARGAR los datos de la nube (reemplazará los actuales en este dispositivo) o prefieres SOBREESCRIBIR la nube con tus datos locales actuales?",
              confirmText: "Cargar desde Nube",
              cancelText: "Sobreescribir Nube",
              onConfirm: () => {
                loadDataFromDrive(fileId);
                setCustomConfirm(null);
              },
              onCancel: () => {
                uploadDataToDrive(fileId, state);
                setCustomConfirm(null);
              }
            });
          } else {
            await createDriveFile(state);
          }
        } catch (err) {
          console.error(err);
          setSyncStatus("error");
          showToast("Error buscando el archivo en Drive", "error");
        }
      };

      const createDriveFile = async (dataToSave) => {
        try {
          setSyncStatus("syncing");
          const metadata = {
            name: 'mi_cartera_data.json',
            mimeType: 'application/json'
          };
          
          const boundary = '314159265358979323846';
          const delimiter = "\r\n--" + boundary + "\r\n";
          const close_delim = "\r\n--" + boundary + "--";

          const body =
              delimiter +
              'Content-Type: application/json\r\n\r\n' +
              JSON.stringify(metadata) +
              delimiter +
              'Content-Type: application/json\r\n\r\n' +
              JSON.stringify(dataToSave) +
              close_delim;

          const response = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
            method: 'POST',
            headers: {
              'Authorization': 'Bearer ' + gapi.client.getToken().access_token,
              'Content-Type': 'multipart/related; boundary=' + boundary
            },
            body: body
          });

          const file = await response.json();
          setGdFileId(file.id);
          setSyncStatus("connected");
          setLastSyncTime(new Date().toLocaleTimeString());
          showToast("¡Base de datos creada en Google Drive!");
        } catch (err) {
          console.error(err);
          setSyncStatus("error");
          showToast("Error creando archivo en Drive", "error");
        }
      };

      const uploadDataToDrive = async (fileId, dataToSave) => {
        try {
          setSyncStatus("syncing");
          const response = await fetch(`https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=media`, {
            method: 'PATCH',
            headers: {
              'Authorization': 'Bearer ' + gapi.client.getToken().access_token,
              'Content-Type': 'application/json'
            },
            body: JSON.stringify(dataToSave)
          });

          if (response.ok) {
            setSyncStatus("connected");
            setLastSyncTime(new Date().toLocaleTimeString());
            showToast("✓ Sincronizado en Drive");
          } else {
            throw new Error("No se pudo actualizar");
          }
        } catch (err) {
          console.error(err);
          setSyncStatus("error");
          showToast("Error de Sincronización", "error");
        }
      };

      const loadDataFromDrive = async (fileId) => {
        try {
          setSyncStatus("syncing");
          const response = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, {
            headers: {
              'Authorization': 'Bearer ' + gapi.client.getToken().access_token
            }
          });
          const cloudData = await response.json();
          
          if (cloudData && cloudData.accounts) {
            setState(cloudData);
            setSyncStatus("connected");
            setLastSyncTime(new Date().toLocaleTimeString());
            showToast("✓ Datos cargados de Drive");
            setScreen("home");
          } else {
            throw new Error("Datos inválidos");
          }
        } catch (err) {
          console.error(err);
          setSyncStatus("error");
          showToast("Error descargando datos", "error");
        }
      };

      const autoSyncToDrive = async (updatedState) => {
        if (!gdFileId || !gapi.client.getToken()) return;
        try {
          await fetch(`https://www.googleapis.com/upload/drive/v3/files/${gdFileId}?uploadType=media`, {
            method: 'PATCH',
            headers: {
              'Authorization': 'Bearer ' + gapi.client.getToken().access_token,
              'Content-Type': 'application/json'
            },
            body: JSON.stringify(updatedState)
          });
          setLastSyncTime(new Date().toLocaleTimeString());
        } catch (err) {
          console.error("Auto-sync fallido:", err);
        }
      };

      // Respaldos manuales offline
      const exportLocalJSON = () => {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(state, null, 2));
        const downloadAnchor = document.createElement('a');
        downloadAnchor.setAttribute("href", dataStr);
        downloadAnchor.setAttribute("download", `mi_cartera_respaldo_${new Date().toISOString().split('T')[0]}.json`);
        document.body.appendChild(downloadAnchor);
        downloadAnchor.click();
        downloadAnchor.remove();
        showToast("Copia de seguridad descargada");
      };

      const importLocalJSON = (e) => {
        const fileReader = new FileReader();
        fileReader.onload = event => {
          try {
            const importedState = JSON.parse(event.target.result);
            if (importedState.accounts && importedState.categories) {
              setState(importedState);
              showToast("Respaldo restaurado exitosamente");
              setScreen("home");
              if (syncStatus === "connected") autoSyncToDrive(importedState);
            } else {
              showToast("El archivo no es válido", "error");
            }
          } catch {
            showToast("Error leyendo el archivo", "error");
          }
        };
        fileReader.readAsText(e.target.files[0]);
      };

      // --- EXPORTACIÓN DE REPORTES ---
      function exportToCSV() {
        if (qResults.length === 0) return showToast("No hay datos para exportar", "error");
        let csvContent = "\uFEFF"; // BOM para asegurar UTF-8 en Excel
        csvContent += "Fecha,Categoría,Cuenta,Nota,Tipo,Monto\r\n";
        
        qResults.forEach(t => {
          const row = [
            t.date,
            `"${t.categoryName}"`,
            `"${t.accountName}"`,
            `"${(t.note || "").replace(/"/g, '""')}"`,
            t.virtualType === "income" ? "Ingreso" : "Gasto",
            Math.abs(t.displayAmount)
          ].join(",");
          csvContent += row + "\r\n";
        });

        const blob = new Blob([csvContent], { type: "text/csv;charset=utf-8;" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.setAttribute("href", url);
        link.setAttribute("download", `reporte_cartera_${TODAY()}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        showToast("Reporte CSV descargado");
      }

      return (
        <div className="min-h-screen bg-[#0e1320] text-[#f1f5f9] flex flex-col max-w-md mx-auto relative border-x border-[#1e293b] shadow-2xl shadow-indigo-950/20">

              toast.type === "error" ? "bg-rose-950/90 text-rose-300 border-rose-500/30" : 
              toast.type === "warning" ? "bg-amber-950/90 text-amber-300 border-amber-500/30" :
              "bg-emerald-950/90 text-emerald-300 border-emerald-500/30"

          {/* DIÁLOGO ELIMINAR CUENTA */}

                  <div>

                    <label className="text-[10px] font-bold uppercase tracking-wider text-slate-400 block mb-1">Fecha</label>
                    <input

                  <button 
                    onClick={() => setEditingTx(null)}

                    Cancelar
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* MODAL EDITAR TRANSFERENCIA */}
          {editingTransfer && (

              <div className="bg-[#121824] border border-[#1e293b] rounded-3xl p-6 w-full max-w-sm space-y-4 shadow-2xl">
                <h4 className="font-extrabold text-lg text-indigo-400">✏️ Modificar Transferencia</h4>
                
                <div className="space-y-3 text-left">
                  <div>
                    <label className="text-[10px] font-bold uppercase tracking-wider text-slate-400 block mb-1">Monto</label>
                    <input 
                      type="number" 
                      value={editingTransfer.amount} 
                      onChange={e => setEditingTransfer({ ...editingTransfer, amount: e.target.value })}
                      className="w-full bg-[#0a0f19] border border-[#1e293b] rounded-xl py-2 px-3 text-white text-sm outline-none"
                    />
                  </div>
                  <div>
                    <label className="text-[10px] font-bold uppercase tracking-wider text-slate-400 block mb-1">Cuenta Origen</label>
                    <select 
                      value={editingTransfer.fromId} 
                      onChange={e => setEditingTransfer({ ...editingTransfer, fromId: e.target.value })}
                      className="w-full bg-[#0a0f19] border border-[#1e293b] rounded-xl py-2 px-3 text-white text-sm outline-none"
                    >
                      {state.accounts.map(a => (
                        <option key={a.id} value={a.id}>{a.name}</option>

                    </select>
                  </div>
                  <div>
                    <label className="text-[10px] font-bold uppercase tracking-wider text-slate-400 block mb-1">Cuenta Destino</label>
                    <select

                  <div>
                    <label className="text-[10px] font-bold uppercase tracking-wider text-slate-400 block mb-1">Nota</label>
                    <input 
                      type="text" 
                      value={editingTransfer.note} 
                      onChange={e => setEditingTransfer({ ...editingTransfer, note: e.target.value })}
                      className="w-full bg-[#0a0f19] border border-[#1e293b] rounded-xl py-2 px-3 text-white text-sm outline-none"

                  <div>
                    <label className="text-[10px] font-bold uppercase tracking-wider text-slate-400 block mb-1">Fecha</label>

          {/* PANTALLA COMPLETA DE BLOQUEO POR NIP */}

            <div className="fixed inset-0 z-[9999] bg-[#0b0f19]/95 backdrop-blur-md flex flex-col justify-center items-center p-6">

          {menuOpen && (

                  <div className="flex items-center gap-2">
                    <div className="p-2 bg-indigo-600/20 rounded-lg">
                      <span className="text-xl">💳</span>
                    </div>
                    <span className="text-lg font-bold text-indigo-400">Mi Cartera Pro</span>
                  </div>
                  <button onClick={() => setMenuOpen(false)} className="text-[#94a3b8] hover:text-[#f1f5f9]">✕</button>
                </div>

                <div className="flex-1 space-y-1 overflow-y-auto">
                  {[
                    { label: "💳 Mis Cuentas", screen: "accounts" },
                    { label: "🔄 Transferencias", screen: "transfers" },
                    { label: "🏷️ Categorías", screen: "categories" },
                    { label: "📊 Presupuesto y Recurrentes", screen: "budgets" },
                    { label: "🔒 Seguridad (PIN)", screen: "lock_settings" },
                    { label: "🔍 Consultas y Reportes", screen: "queries" },
                    { label: "📦 Períodos Archivados", screen: "archive" },
                    { label: "📅 Cerrar Período", screen: "period" },
                    { label: "☁️ Sincronizar Google Drive", screen: "sync_settings" },
                  ].map(item => (
                    <button 
                      key={item.screen} 
                      onClick={() => openScreen(item.screen)}
                      className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl text-left text-sm font-medium transition-colors ${
                        screen === item.screen ? "bg-indigo-600/20 text-indigo-400 border border-indigo-500/20" : "text-[#94a3b8] hover:bg-slate-800/40 hover:text-[#f1f5f9]"
